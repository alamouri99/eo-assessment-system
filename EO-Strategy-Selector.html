<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrepreneurs Oasis MENA — Strategy Selector</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root {
    --eo-dark: #050A12;
    --eo-orange: #FF6600;
    --eo-beige: #0C1220;
    --eo-card-bg: #111827;
    --eo-gray-text: #94A3B8;
    --eo-gray-border: rgba(255,255,255,0.06);
    --eo-radius: 14px;
    --eo-radius-sm: 8px;
    --eo-transition: 300ms ease;
    --green: #22C55E;
    --red: #EF4444;
    --gold: #D97706;
    --teal: #0D9488;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--eo-dark); color: #FFFFFF; min-height: 100vh; line-height: 1.5; -webkit-font-smoothing: antialiased; }
body.rtl { direction: rtl; text-align: right; }
body.rtl .nav-buttons { flex-direction: row-reverse; }
body.rtl .option-card { text-align: right; }
body.rtl .pattern-break-card { border-left: none; border-right: 4px solid var(--eo-orange); }
body.rtl .acknowledgment-card { border-left: none; border-right: 3px solid var(--eo-orange); }
body.rtl .raise-card { border-left: none; border-right: 4px solid var(--eo-orange); }
.rtl-toggle { position: fixed; top: 12px; right: 12px; z-index: 999; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 6px 14px; border-radius: var(--eo-radius-sm); cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 600; transition: all var(--eo-transition); }
.rtl-toggle:hover { background: rgba(255,255,255,0.2); }
.eo-header { text-align: center; padding: 28px 20px 12px; }
.eo-header h1 { font-size: 22px; font-weight: 800; }
.eo-header h1 span { color: var(--eo-orange); }
.screen { display: none; }
.screen.active { display: block; }

/* Auth */
.auth-screen { max-width: 480px; margin: 60px auto; padding: 0 20px; text-align: center; }
.auth-screen h2 { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
.auth-screen p { color: #9CA3AF; font-size: 14px; margin-bottom: 24px; line-height: 1.5; }
.intro-badge { display: inline-block; background: rgba(255,102,0,0.15); color: var(--eo-orange); font-size: 12px; font-weight: 700; padding: 6px 16px; border-radius: 20px; margin-bottom: 16px; letter-spacing: 1px; }
.email-box { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: var(--eo-radius); padding: 28px 24px; text-align: left; }
.email-box label { display: block; font-size: 11px; font-weight: 700; color: var(--eo-orange); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.email-input { width: 100%; padding: 14px 16px; border: 2px solid #2D2D44; border-radius: var(--eo-radius-sm); background: rgba(255,255,255,0.05); color: #fff; font-size: 16px; font-family: inherit; outline: none; transition: border-color var(--eo-transition); margin-bottom: 16px; }
.email-input:focus { border-color: var(--eo-orange); }
.email-input::placeholder { color: #6B7280; }
.btn-full { width: 100%; padding: 14px 32px; background: var(--eo-orange); color: #fff; border: none; border-radius: var(--eo-radius-sm); font-size: 16px; font-weight: 700; cursor: pointer; font-family: inherit; transition: background var(--eo-transition); }
.btn-full:hover { background: #E65C00; }
.btn-secondary { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); padding: 10px 20px; border-radius: var(--eo-radius-sm); font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }

/* Progress */
.progress-wrapper { max-width: 640px; margin: 0 auto 24px; padding: 0 20px; }
.progress-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.section-label { font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: #9CA3AF; text-align: center; margin-bottom: 4px; }
.progress-counter { font-size: 13px; color: #9CA3AF; }
.progress-track { height: 6px; background: #2D2D44; border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--eo-orange); border-radius: 3px; transition: width 0.3s ease; }

/* Question */
.question-card { max-width: 640px; margin: 0 auto; padding: 28px 24px; background: var(--eo-beige); border-radius: var(--eo-radius); box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
.question-text { font-size: 20px; font-weight: 700; color: #FFFFFF; margin-bottom: 8px; line-height: 1.4; }
.question-help { font-size: 13px; color: var(--eo-gray-text); margin-bottom: 20px; line-height: 1.5; font-style: italic; }
.options-list { display: flex; flex-direction: column; gap: 10px; }
.option-card { background: var(--eo-card-bg); border: 2px solid var(--eo-gray-border); border-radius: var(--eo-radius-sm); padding: 16px 20px; cursor: pointer; font-size: 15px; font-weight: 500; color: #E2E8F0; transition: border-color var(--eo-transition), background var(--eo-transition), color var(--eo-transition); user-select: none; line-height: 1.4; }
.option-card:hover { border-color: var(--eo-orange); }
.option-card.selected { background: var(--eo-orange); border-color: var(--eo-orange); color: #FFFFFF; }
.option-card.focused { outline: 2px solid var(--eo-orange); outline-offset: 2px; }
.freetext-input { width: 100%; min-height: 160px; padding: 14px 16px; border: 2px solid var(--eo-gray-border); border-radius: var(--eo-radius-sm); font-family: inherit; font-size: 15px; color: #E2E8F0; resize: vertical; outline: none; background: var(--eo-card-bg); line-height: 1.5; transition: border-color var(--eo-transition); }
.freetext-input:focus { border-color: var(--eo-orange); }
.freetext-input::placeholder { color: #9CA3AF; }
.char-count { font-size: 12px; color: var(--eo-gray-text); text-align: right; margin-top: 6px; }
.char-count.over { color: #EF4444; font-weight: 600; }

/* Nav */
.nav-buttons { max-width: 640px; margin: 20px auto 60px; padding: 0 20px; display: flex; justify-content: space-between; gap: 12px; }
.btn { padding: 12px 28px; border-radius: var(--eo-radius-sm); font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; border: none; transition: all var(--eo-transition); }
.btn-prev { background: rgba(255,255,255,0.1); color: #FFFFFF; border: 1px solid rgba(255,255,255,0.2); }
.btn-prev:hover { background: rgba(255,255,255,0.2); }
.btn-prev.hidden { visibility: hidden; }
.btn-next { background: var(--eo-orange); color: #FFFFFF; margin-left: auto; }
.btn-next:hover { background: #E65C00; }
.btn-next:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-primary { background: var(--eo-orange); color: #FFFFFF; border: none; padding: 14px 32px; border-radius: var(--eo-radius-sm); font-size: 16px; font-weight: 700; cursor: pointer; font-family: inherit; transition: background var(--eo-transition); }
.btn-primary:hover { background: #E65C00; }
.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: #1E293B; color: #FFFFFF; padding: 14px 28px; border-radius: var(--eo-radius-sm); font-size: 14px; font-weight: 500; z-index: 1000; opacity: 0; transition: all 0.3s ease; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.loading-overlay { display: none; position: fixed; inset: 0; background: rgba(26,26,46,0.9); z-index: 2000; justify-content: center; align-items: center; flex-direction: column; gap: 20px; }
.loading-overlay.active { display: flex; }
.spinner { width: 48px; height: 48px; border: 4px solid #2D2D44; border-top-color: var(--eo-orange); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-overlay p { font-size: 16px; font-weight: 500; }

/* Results */
.results-container { max-width: 720px; margin: 0 auto; padding: 0 20px 60px; }
.results-card { background: rgba(255,255,255,0.06); border-radius: var(--eo-radius); padding: 24px; margin-bottom: 20px; }
.results-card h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; color: #FFFFFF; }

/* Strategy Path Cards */
.strategy-card { background: linear-gradient(135deg, rgba(255,102,0,0.15), rgba(255,102,0,0.05)); border: 1px solid rgba(255,102,0,0.3); border-radius: var(--eo-radius); padding: 28px; margin-bottom: 20px; }
.strategy-card h3 { font-size: 20px; font-weight: 800; color: var(--eo-orange); margin-bottom: 4px; }
.strategy-card .path-desc { font-size: 14px; color: #D1D5DB; margin-bottom: 16px; line-height: 1.5; }
.strategy-card .why-section { margin-top: 16px; }
.strategy-card .why-label { font-size: 11px; font-weight: 700; color: var(--eo-orange); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.strategy-card .why-item { font-size: 13px; color: #D1D5DB; padding: 4px 0 4px 16px; position: relative; line-height: 1.5; }
.strategy-card .why-item::before { content: '→'; position: absolute; left: 0; color: var(--eo-orange); }

.secondary-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: var(--eo-radius); padding: 20px; margin-bottom: 20px; }
.secondary-card h4 { font-size: 14px; font-weight: 700; color: #D1D5DB; margin-bottom: 4px; }
.secondary-card .activate { font-size: 12px; color: var(--eo-orange); font-style: italic; margin-bottom: 8px; }
.secondary-card p { font-size: 13px; color: #9CA3AF; line-height: 1.5; }

/* Archetype Badge */
.archetype-badge { text-align: center; margin-bottom: 20px; padding: 24px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: var(--eo-radius); }
.archetype-icon { width: 60px; height: 60px; border-radius: 50%; background: rgba(255,102,0,0.15); display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; font-size: 28px; }
.archetype-name { font-size: 18px; font-weight: 800; color: var(--eo-orange); margin-bottom: 4px; }
.archetype-desc { font-size: 13px; color: #9CA3AF; line-height: 1.5; }

/* Roadmap */
.roadmap-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 12px; }
.roadmap-col { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: var(--eo-radius-sm); padding: 16px; }
.roadmap-col h4 { font-size: 13px; font-weight: 700; color: var(--eo-orange); margin-bottom: 10px; text-align: center; }
.roadmap-item { font-size: 12px; color: #D1D5DB; padding: 4px 0; line-height: 1.4; border-bottom: 1px solid rgba(255,255,255,0.04); }
.roadmap-item:last-child { border-bottom: none; }

/* Raise Cards */
.raise-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-left: 4px solid var(--eo-orange); border-radius: var(--eo-radius-sm); padding: 20px; margin-bottom: 14px; }
.raise-card h4 { font-size: 14px; font-weight: 700; color: var(--eo-orange); margin-bottom: 8px; }
.raise-card p { font-size: 13px; color: #D1D5DB; line-height: 1.6; }

/* Engagement */
.pattern-break { max-width: 640px; margin: 0 auto 24px; padding: 0 20px; }
.pattern-break-card { background: linear-gradient(135deg, #1a1a1a, #0f0f0f); border-left: 4px solid var(--eo-orange); border-radius: var(--eo-radius-sm); padding: 20px 24px; }
.pattern-break-card .pb-label { font-size: 11px; font-weight: 700; color: var(--eo-orange); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.pattern-break-card .pb-text { font-size: 14px; color: #D1D5DB; line-height: 1.6; }
.investment-signal { max-width: 640px; margin: 0 auto 16px; padding: 0 20px; }
.investment-signal-card { background: rgba(255,102,0,0.08); border-radius: var(--eo-radius-sm); padding: 12px 16px; font-size: 12px; color: #D1D5DB; font-style: italic; }
.acknowledgment { max-width: 640px; margin: 0 auto 16px; padding: 0 20px; }
.acknowledgment-card { background: rgba(255,255,255,0.04); border-radius: var(--eo-radius-sm); padding: 12px 16px; font-size: 13px; color: #D1D5DB; font-style: italic; border-left: 3px solid var(--eo-orange); }

/* CTAs */
.results-cta { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-top: 32px; }
.results-cta a, .results-cta button { min-width: 280px; text-align: center; }
.btn-download-md { background: transparent; border: 2px solid var(--eo-orange); color: var(--eo-orange); padding: 12px 28px; border-radius: var(--eo-radius-sm); font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all var(--eo-transition); }
.btn-download-md:hover { background: var(--eo-orange); color: #FFFFFF; }
.btn-retake { background: transparent; border: 2px solid #FFFFFF; color: #FFFFFF; padding: 12px 28px; border-radius: var(--eo-radius-sm); font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all var(--eo-transition); }
.btn-retake:hover { background: rgba(255,255,255,0.15); }

@keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-6px); } 40%, 80% { transform: translateX(6px); } }
.shake { animation: shake 0.4s ease; }

@media (max-width: 680px) {
    .question-card { margin: 0 16px; padding: 24px 20px; }
    .nav-buttons { padding: 0 16px; }
    .question-text { font-size: 18px; }
    .progress-wrapper { padding: 0 16px; }
    .auth-screen { padding: 0 16px; }
    .results-container { padding: 0 16px 60px; }
    .roadmap-grid { grid-template-columns: 1fr; }
    .email-box { padding: 24px 20px; }
}
@media (max-width: 400px) {
    .nav-buttons { flex-direction: column; }
    .btn-prev.hidden { display: none; }
    .option-card { padding: 14px 16px; font-size: 14px; }
    .question-text { font-size: 17px; }
}
</style>
</head>
<body>
<button class="rtl-toggle" onclick="toggleRTL()">EN / عربي</button>
<div class="toast" id="toast"></div>
<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div><p>Building your strategy recommendation...</p></div>
<div class="eo-header"><h1>Entrepreneurs <span>Oasis MENA</span></h1></div>

<!-- Auth Screen -->
<div class="screen active" id="screenAuth">
    <div class="auth-screen">
        <div class="intro-badge">STEP 4 OF 5</div>
        <h2>Strategy <em>Selector</em></h2>
        <p>10 questions. ~20 minutes. Find your optimal strategy path.</p>
        <div class="email-box">
            <label>YOUR EMAIL</label>
            <input type="email" id="auth-email" class="email-input" placeholder="founder@company.com" required>
            <button class="btn-full" onclick="handleEmailEntry()">Continue →</button>
            <div id="venture-selector" style="display:none;margin-top:16px"></div>
            <div id="auth-error" style="color:#EF4444;font-size:13px;margin-top:12px;display:none"></div>
        </div>
        <div id="retrieval-banner" style="display:none"></div>
    </div>
</div>

<!-- Stepper -->
<div class="screen" id="screenStepper">
    <div class="progress-wrapper">
        <div class="progress-meta">
            <div class="section-label" id="sectionLabel">FOUNDER PROFILE</div>
            <div class="progress-counter" id="progressCounter">Question 1 of 10</div>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    </div>
    <div id="engagementSlot"></div>
    <div class="question-card" id="questionCard">
        <div class="question-text" id="questionText"></div>
        <div class="question-help" id="questionHelp" style="display:none;"></div>
        <div class="options-list" id="optionsList"></div>
    </div>
    <div class="nav-buttons">
        <button class="btn btn-prev hidden" id="btnPrev">Previous</button>
        <button class="btn btn-next" id="btnNext" disabled>Next</button>
    </div>
</div>

<!-- Results -->
<div class="screen" id="screenResults">
    <div class="results-container" id="resultsContent"></div>
</div>

<script>
/* ═══════════════════════════════════════════════════
   EO STRATEGY SELECTOR v3.0 — SCORECARD 4
   10 Questions | TYPE 3 RESULTS (Recommendation)
   Prerequisites: SC1 + SC2 + SC3
   ═══════════════════════════════════════════════════ */
(function() {
    'use strict';

    var SC_NUMBER = 4;
    var Q_MC = 1;
    var Q_FREETEXT = 2;

    /* ===================================
       SHARED PATTERNS (EXACT COPY)
       =================================== */
    function slugify(text) {
      return text.toString().toLowerCase().trim()
        .replace(/\s+/g, '-').replace(/[^\w\-]+/g, '').replace(/\-\-+/g, '-').replace(/^-+/, '').replace(/-+$/, '');
    }
    function getVentures(email) { try { return JSON.parse(localStorage.getItem('eo_ventures_' + email) || '[]'); } catch(e) { return []; } }
    function saveVenture(email, vName) {
      var slug = slugify(vName); var ventures = getVentures(email);
      var existing = ventures.find(function(v) { return v.venture_slug === slug; });
      if (existing) { existing.last_active = new Date().toISOString().split('T')[0]; localStorage.setItem('eo_ventures_' + email, JSON.stringify(ventures)); return { venture_name: existing.venture_name, venture_slug: slug, isNew: false }; }
      var v = { venture_name: vName.trim(), venture_slug: slug, created_at: new Date().toISOString().split('T')[0], last_active: new Date().toISOString().split('T')[0] };
      ventures.push(v); localStorage.setItem('eo_ventures_' + email, JSON.stringify(ventures)); return { venture_name: v.venture_name, venture_slug: slug, isNew: true };
    }
    function updateVentureActivity(email, slug) { var v = getVentures(email); var f = v.find(function(x) { return x.venture_slug === slug; }); if (f) { f.last_active = new Date().toISOString().split('T')[0]; localStorage.setItem('eo_ventures_' + email, JSON.stringify(v)); } }
    function storageKey(type, scNum, email, slug) { return 'eo_sc' + scNum + '_' + type + '_' + email + '_' + slug; }
    function getScores(email, slug) { try { return JSON.parse(localStorage.getItem('eo_scores_' + email + '_' + slug) || '{}'); } catch(e) { return {}; } }
    function saveScore(email, slug, scNum, score) { var s = getScores(email, slug); s['sc' + scNum] = score; localStorage.setItem('eo_scores_' + email + '_' + slug, JSON.stringify(s)); }
    function getUpstreamAnswers(scNum, email, slug) { try { return JSON.parse(localStorage.getItem(storageKey('answers', scNum, email, slug)) || '{}'); } catch(e) { return {}; } }
    function getUpstreamResult(scNum, email, slug) { try { return JSON.parse(localStorage.getItem(storageKey('result', scNum, email, slug)) || 'null'); } catch(e) { return null; } }
    function migrateOldData() {
      for (var i = 0; i < localStorage.length; i++) { var key = localStorage.key(i); var m = key.match(/^eo_sc(\d)_answers_([^_]+@[^_]+\.[^_]+)$/);
        if (m) { var p = {}; try { p = JSON.parse(localStorage.getItem('eo_migration_pending') || '{}'); } catch(e) {} if (!p[m[2]]) p[m[2]] = []; if (p[m[2]].indexOf(parseInt(m[1])) === -1) p[m[2]].push(parseInt(m[1])); localStorage.setItem('eo_migration_pending', JSON.stringify(p)); } }
    }
    function showError(msg) { var el = document.getElementById('auth-error'); el.innerHTML = msg; el.style.display = 'block'; setTimeout(function() { el.style.display = 'none'; }, 8000); }

    /* ===================================
       STRATEGY PATHS
       =================================== */
    var STRATEGY_PATHS = [
        { id: 'replicate', name: 'Replicate & Localize', desc: 'Take a proven global product and adapt it for your specific MENA market. Leverages proven demand with local execution advantage.' },
        { id: 'consulting', name: 'Consulting-First SaaS', desc: 'Sell services first for fast revenue and deep learning, then productize into SaaS. Low risk, relationship-driven, revenue from day 1.' },
        { id: 'microsaas', name: 'Boring Micro-SaaS', desc: 'Build a minimal product, charge from day 1, and optimize unit economics. Lean, fast, profitable. No investor needed.' },
        { id: 'hammering', name: 'Hammering Deep', desc: 'Go vertical and deep in one niche. Own it completely before expanding. Patient, defensible, high retention.' }
    ];

    /* Path-specific execution questions (Q6-Q9) */
    var PATH_QUESTIONS = {
        0: [ /* Replicate & Localize */
            { text: 'Which global product will you replicate and localize?', help: 'Name a specific product or category you\'ll adapt for MENA.',
              options: [ { label: 'Named product identified + researched', score: 5 }, { label: 'Category identified, specific product TBD', score: 3 }, { label: 'Not yet identified', score: 1 } ] },
            { text: 'What\'s your localization advantage?', help: 'Why can YOU localize this better than someone else?',
              options: [ { label: 'Cultural expertise + language + existing network', score: 5 }, { label: 'Language fluency + market knowledge', score: 4 }, { label: 'Existing network in target market', score: 3 }, { label: 'Unsure of my advantage', score: 1 } ] },
            { text: 'When can you launch the localized version?', help: 'Speed to market matters.',
              options: [ { label: 'Less than 3 months', score: 5 }, { label: '3-6 months', score: 4 }, { label: '6-12 months', score: 3 }, { label: 'More than 1 year', score: 1 } ] },
            { text: 'How will you reach your first customers?', help: 'Go-to-market for replicated products needs local distribution.',
              options: [ { label: 'Partnership with global vendor', score: 5 }, { label: 'Community/network-based distribution', score: 5 }, { label: 'Direct sales team', score: 4 }, { label: 'Unsure', score: 1 } ] }
        ],
        1: [ /* Consulting-First SaaS */
            { text: 'What service will you sell first?', help: 'Your consulting offer should be clearly defined and priced.',
              options: [ { label: 'Defined, priced, 3+ pilot clients lined up', score: 5 }, { label: 'Defined and priced, no pilots yet', score: 3 }, { label: 'Vague idea of the service', score: 1 }, { label: 'Not defined yet', score: 0 } ] },
            { text: 'Can you personally deliver the service?', help: 'Founder-delivered is ideal for learning.',
              options: [ { label: 'Yes, for 20+ clients/month', score: 5 }, { label: 'Yes, for 5-10 clients/month', score: 4 }, { label: 'Need to hire help', score: 2 }, { label: 'Can\'t deliver this myself', score: 0 } ] },
            { text: 'When will you start building the SaaS product?', help: 'Consulting funds the build. Don\'t build too early.',
              options: [ { label: 'Month 4-6 (consulting funded)', score: 5 }, { label: 'Year 2 (consulting stabilized first)', score: 4 }, { label: 'Unknown timeline', score: 1 }, { label: 'Won\'t productize — staying consulting', score: 1 } ] },
            { text: 'Do you have a signed client for month 1?', help: 'Fastest path to revenue.',
              options: [ { label: 'Yes, signed LOI or contract', score: 5 }, { label: 'Verbal commitment from named buyer', score: 4 }, { label: 'Warm lead in progress', score: 3 }, { label: 'Cold outreach only', score: 1 }, { label: 'No leads yet', score: 0 } ] }
        ],
        2: [ /* Boring Micro-SaaS */
            { text: 'What is your MVP scope?', help: 'Lean is key. 1-3 core features max.',
              options: [ { label: '1-3 core features, buildable in 2 weeks', score: 5 }, { label: 'Clear features, needs 4-6 weeks', score: 4 }, { label: 'Vague scope, need to narrow', score: 1 }, { label: 'Undefined', score: 0 } ] },
            { text: 'Can you build the MVP?', help: 'Technical capability is key for Micro-SaaS.',
              options: [ { label: 'Myself, in under 4 weeks', score: 5 }, { label: 'With 1 co-founder/partner', score: 5 }, { label: 'Need to hire a developer', score: 3 }, { label: 'Can\'t build — no technical path', score: 0 } ] },
            { text: 'When will you charge customers?', help: 'Micro-SaaS = charge from day 1.',
              options: [ { label: 'Less than 4 weeks', score: 5 }, { label: '4-8 weeks', score: 4 }, { label: '8-12 weeks', score: 3 }, { label: 'More than 12 weeks', score: 1 } ] },
            { text: 'How will you get your first 10 paying customers?', help: 'Acquisition plan matters.',
              options: [ { label: 'Defined channel + 20+ outreach attempts in pipeline', score: 5 }, { label: 'Rough plan for a specific channel', score: 3 }, { label: 'Untested channel idea', score: 1 }, { label: 'No acquisition plan', score: 0 } ] }
        ],
        3: [ /* Hammering Deep */
            { text: 'How deep is your niche?', help: 'Specific role + company size + geography = ideal.',
              options: [ { label: 'Specific role + company size + geography', score: 5 }, { label: 'Specific role + geography', score: 3 }, { label: 'Broad role only', score: 1 }, { label: 'Undefined niche', score: 0 } ] },
            { text: 'What\'s your unique advantage in this niche?', help: 'Domain expertise, network, lived experience.',
              options: [ { label: 'Domain expertise + strong network in niche', score: 5 }, { label: '1-2 specific advantages', score: 4 }, { label: 'Unclear advantage', score: 1 }, { label: 'Generic — no niche advantage', score: 0 } ] },
            { text: 'How long will you focus on this niche?', help: 'Hammering Deep requires patience.',
              options: [ { label: '12+ months committed', score: 5 }, { label: '6-12 months', score: 4 }, { label: 'Less than 6 months', score: 2 }, { label: 'Will expand immediately', score: 0 } ] },
            { text: 'Do you have proof this niche is winnable?', help: 'Customers, advisors, or advocates who confirm the opportunity.',
              options: [ { label: 'Customers/advisors already in niche', score: 5 }, { label: 'Conversations with 5+ niche people', score: 4 }, { label: 'Research done but no conversations', score: 2 }, { label: 'Assumption only', score: 0 } ] }
        ]
    };

    /* ===================================
       10 QUESTIONS (reduced from 20)
       =================================== */
    var SECTION_LABELS = {
        founder: 'FOUNDER PROFILE',
        strategy: 'STRATEGY HYPOTHESIS',
        execution: 'EXECUTION READINESS',
        mena: 'MENA FIT'
    };

    var allQuestions = [
        /* Q1-Q4: Founder Profile (MC) */
        { id: 'core_skill', section: 'founder', type: Q_MC, maxScore: 5,
          text: 'What\'s your strongest skill set?', help: 'Be honest. This shapes which strategy path fits you best.',
          options: [
              { label: 'Technical — I can build products', score: 5, archetype: 'builder' },
              { label: 'Sales — I can close deals', score: 5, archetype: 'closer' },
              { label: 'Content — I can teach and write', score: 4, archetype: 'educator' },
              { label: 'Operations — I can systematize', score: 5, archetype: 'operator' },
              { label: 'Relationships — I have a deep network', score: 5, archetype: 'connector' }
          ] },
        { id: 'capital', section: 'founder', type: Q_MC, maxScore: 5,
          text: 'How much can you invest in the next 90 days?', help: 'All budgets work — different paths need different capital levels.',
          options: [
              { label: '$0 (time only)', score: 5 },
              { label: '$500-2K', score: 5 },
              { label: '$2K-10K', score: 5 },
              { label: '$10K-50K', score: 4 },
              { label: '$50K+', score: 3 }
          ] },
        { id: 'time', section: 'founder', type: Q_MC, maxScore: 5,

          options: [
              { label: '<10 hrs/week (side project)', score: 5 },
              { label: '10-20 hrs/week (serious side)', score: 5 },
              { label: '20-40 hrs/week (part-time founder)', score: 4 },
              { label: '40+ hrs/week (full-time)', score: 5 }
          ] },
        { id: 'risk', section: 'founder', type: Q_MC, maxScore: 5,
          text: 'What\'s your risk profile?', help: 'Conservative = need revenue fast. Aggressive = can wait for bigger payoff.',
          options: [
              { label: 'Conservative — need revenue in 30 days', score: 5 },
              { label: 'Moderate — 90 days to revenue is fine', score: 5 },
              { label: 'Aggressive — 6+ months runway available', score: 4 },
              { label: 'Already have other income — can be patient', score: 5 }
          ] },

        /* Q5: Strategy Hypothesis (Free-text) */
        { id: 'strategy_hypothesis', section: 'strategy', type: Q_FREETEXT, maxScore: 10, wordLimit: 200,
          text: 'Based on everything you know about your market and ICP, which of these 4 strategy paths feels right and why?\n\n(1) Replicate & Localize\n(2) Consulting-First SaaS\n(3) Boring Micro-SaaS\n(4) Hammering Deep',
          help: 'Choose one path and explain WHY it matches your market, ICP, and founder profile. Reference your SC1-SC3 insights.',
          placeholder: 'e.g., "Consulting-First SaaS feels right because: (1) My SC3 showed complex buying decisions in my market — relationships matter; (2) I have sales skills and an existing network; (3) I need revenue within 30 days; (4) My ICP (finance managers) trusts advisors more than software demos..."' },

        /* Q6-Q9: Dynamic path-specific execution (MC) */
        { id: 'exec_d1', section: 'execution', type: Q_MC, maxScore: 5, dynamic: true },
        { id: 'exec_d2', section: 'execution', type: Q_MC, maxScore: 5, dynamic: true },
        { id: 'exec_d3', section: 'execution', type: Q_MC, maxScore: 5, dynamic: true },
        { id: 'exec_d4', section: 'execution', type: Q_MC, maxScore: 5, dynamic: true },

        /* Q10: MENA Fit (Free-text) */
        { id: 'mena_fit', section: 'mena', type: Q_FREETEXT, maxScore: 10, wordLimit: 150,
          text: 'What\'s your MENA execution advantage, and what\'s the biggest challenge you\'ll face in your target geography?',
          help: 'Consider: relationship-based selling, WhatsApp preference, trust-first buying, payment infrastructure, Arabic content, regulatory requirements.',
          placeholder: 'e.g., "Advantage: I grew up in Riyadh and have a network of 200+ HR managers from my previous role. Challenge: Payment infrastructure — most SMBs prefer bank transfers over card payments, so I need to support both..."' }
    ];

    /* ===================================
       STATE
       =================================== */
    var userEmail = '';
    var ventureSlug = '';
    var ventureName = '';
    var answers = {};
    var currentIndex = 0;
    var focusedOptionIndex = -1;
    var autoAdvanceTimer = null;
    var selectedPathIndex = -1;
    var upstreamPD = null;
    var upstreamICP = null;
    var upstreamMAS = null;

    var $toast, $sectionLabel, $progressCounter, $progressFill;
    var $questionText, $questionHelp, $optionsList, $questionCard;
    var $btnPrev, $btnNext, $engagementSlot, $resultsContent, $loadingOverlay;

    /* ===================================
       INIT
       =================================== */
    function init() {
        $toast = document.getElementById('toast');
        $sectionLabel = document.getElementById('sectionLabel');
        $progressCounter = document.getElementById('progressCounter');
        $progressFill = document.getElementById('progressFill');
        $questionText = document.getElementById('questionText');
        $questionHelp = document.getElementById('questionHelp');
        $optionsList = document.getElementById('optionsList');
        $questionCard = document.getElementById('questionCard');
        $btnPrev = document.getElementById('btnPrev');
        $btnNext = document.getElementById('btnNext');
        $engagementSlot = document.getElementById('engagementSlot');
        $resultsContent = document.getElementById('resultsContent');
        $loadingOverlay = document.getElementById('loadingOverlay');

        $btnPrev.addEventListener('click', prevQuestion);
        $btnNext.addEventListener('click', nextQuestion);
        document.addEventListener('keydown', handleKeyboard);

        try { if (localStorage.getItem('eo-rtl') === '1') { document.body.classList.add('rtl'); document.documentElement.lang = 'ar'; document.documentElement.dir = 'rtl'; } } catch(e) {}
        try { var e = localStorage.getItem('eo_user_email'); if (e) document.getElementById('auth-email').value = e; } catch(e) {}
        migrateOldData();
    }

    function showScreen(id) { var s = document.querySelectorAll('.screen'); for (var i = 0; i < s.length; i++) s[i].classList.remove('active'); document.getElementById(id).classList.add('active'); }
    function showToast(msg) { $toast.textContent = msg; $toast.classList.add('show'); setTimeout(function() { $toast.classList.remove('show'); }, 3000); }

    /* ===================================
       AUTH: VENTURE SELECTOR
       =================================== */
    window.handleEmailEntry = function() {
        var email = document.getElementById('auth-email').value.trim().toLowerCase();
        if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showError('Please enter a valid email address'); return; }
        userEmail = email;
        try { localStorage.setItem('eo_user_email', email); } catch(e) {}
        var ventures = getVentures(email);
        if (ventures.length === 0) { showError('No assessment found for this email. <a href="EO-Project-Definition-Scoring.html" style="color:var(--eo-orange)">Complete Step 1 first →</a>'); return; }
        if (ventures.length === 1) selectVenture(ventures[0]);
        else showVentureSelector(ventures);
    };

    function showVentureSelector(ventures) {
        var sel = document.getElementById('venture-selector');
        sel.innerHTML = '<label style="display:block;font-size:11px;font-weight:700;color:var(--eo-orange);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;">SELECT VENTURE</label>' +
            '<select id="venture-select" class="email-input" onchange="handleVentureSelect()">' +
            '<option value="">— Choose your venture —</option>' +
            ventures.map(function(v) { return '<option value="' + v.venture_slug + '">' + v.venture_name + '</option>'; }).join('') + '</select>';
        sel.style.display = 'block';
    }

    window.handleVentureSelect = function() {
        var slug = document.getElementById('venture-select').value;
        if (!slug) return;
        var v = getVentures(userEmail).find(function(x) { return x.venture_slug === slug; });
        if (v) selectVenture(v);
    };

    function selectVenture(venture) {
        ventureSlug = venture.venture_slug;
        ventureName = venture.venture_name;
        updateVentureActivity(userEmail, ventureSlug);
        var existing = getUpstreamResult(SC_NUMBER, userEmail, ventureSlug);
        if (existing) showRetrievalBanner(existing);
        else checkPrerequisites();
    }

    function showRetrievalBanner(result) {
        var b = document.getElementById('retrieval-banner');
        b.innerHTML = '<div style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-left:4px solid var(--green);border-radius:var(--eo-radius);padding:20px;max-width:440px;margin:24px auto 0">' +
            '<div style="display:flex;align-items:center;gap:12px;margin-bottom:12px"><div style="width:44px;height:44px;border-radius:50%;background:rgba(255,102,0,0.15);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:var(--eo-orange)">' + (result.score || 0) + '</div>' +
            '<div><div style="font-weight:700;color:#FFFFFF;font-size:15px">Previously Completed</div><div style="font-size:12px;color:#64748B">' + (result.band || '') + ' — ' + (result.completed_at || '') + '</div></div></div>' +
            '<div style="display:flex;gap:10px"><button class="btn-secondary" onclick="viewPreviousResults()" style="flex:1;padding:10px">View Results</button><button class="btn-full" onclick="startFresh()" style="flex:1;padding:10px;font-size:14px">Start Fresh</button></div></div>';
        b.style.display = 'block';
    }

    window.viewPreviousResults = function() { var r = getUpstreamResult(SC_NUMBER, userEmail, ventureSlug); if (r) renderResults(r); };
    window.startFresh = function() {
        localStorage.removeItem(storageKey('answers', SC_NUMBER, userEmail, ventureSlug));
        localStorage.removeItem(storageKey('result', SC_NUMBER, userEmail, ventureSlug));
        document.getElementById('retrieval-banner').style.display = 'none';
        checkPrerequisites();
    };

    function checkPrerequisites() {
        var scores = getScores(userEmail, ventureSlug);
        var missing = [1, 2, 3].filter(function(n) { var s = scores['sc' + n]; return s === null || s === undefined; });
        if (missing.length > 0) {
            var names = { 1: 'Project Definition', 2: 'ICP Clarity', 3: 'Market Attractiveness' };
            var files = { 1: 'EO-Project-Definition-Scoring.html', 2: 'EO-ICP-Clarity-Scoring.html', 3: 'EO-Market-Attractiveness-Scoring.html' };
            showError('Please complete <a href="' + files[missing[0]] + '" style="color:var(--eo-orange)">' + names[missing[0]] + '</a> first.');
            return;
        }
        startQuestions();
    }

    function startQuestions() {
        upstreamPD = getUpstreamAnswers(1, userEmail, ventureSlug);
        upstreamICP = getUpstreamAnswers(2, userEmail, ventureSlug);
        upstreamMAS = getUpstreamAnswers(3, userEmail, ventureSlug);
        try { var s = localStorage.getItem(storageKey('answers', SC_NUMBER, userEmail, ventureSlug)); if (s) answers = JSON.parse(s); } catch(e) {}
        detectPathFromHypothesis();
        currentIndex = Object.keys(answers).length > 0 ? findFirstUnanswered() : 0;
        if (Object.keys(answers).length > 0) showToast('Welcome back! Resuming where you left off.');
        showScreen('screenStepper');
        renderQuestion();
    }

    function findFirstUnanswered() {
        for (var i = 0; i < allQuestions.length; i++) {
            var q = getEffective(i);
            if (q.type === Q_FREETEXT) { if (!answers[q.id] || !answers[q.id].trim()) return i; }
            else { if (!(q.id in answers)) return i; }
        }
        return allQuestions.length - 1;
    }

    /* ===================================
       DYNAMIC QUESTION HANDLING
       =================================== */
    function detectPathFromHypothesis() {
        var hyp = (answers['strategy_hypothesis'] || '').toLowerCase();
        if (hyp.indexOf('replicate') !== -1 || hyp.indexOf('localize') !== -1 || hyp.indexOf('(1)') !== -1 || hyp.indexOf('path 1') !== -1) selectedPathIndex = 0;
        else if (hyp.indexOf('consulting') !== -1 || hyp.indexOf('service') !== -1 || hyp.indexOf('(2)') !== -1 || hyp.indexOf('path 2') !== -1) selectedPathIndex = 1;
        else if (hyp.indexOf('micro-saas') !== -1 || hyp.indexOf('microsaas') !== -1 || hyp.indexOf('boring') !== -1 || hyp.indexOf('(3)') !== -1 || hyp.indexOf('path 3') !== -1) selectedPathIndex = 2;
        else if (hyp.indexOf('hammering') !== -1 || hyp.indexOf('deep') !== -1 || hyp.indexOf('niche') !== -1 || hyp.indexOf('(4)') !== -1 || hyp.indexOf('path 4') !== -1) selectedPathIndex = 3;
        else selectedPathIndex = 1; /* Default to Consulting-First if unclear */
    }

    function getEffective(idx) {
        var q = allQuestions[idx];
        if (!q.dynamic) return q;
        var pathIdx = selectedPathIndex >= 0 ? selectedPathIndex : 1;
        var dIdx = ['exec_d1', 'exec_d2', 'exec_d3', 'exec_d4'].indexOf(q.id);
        var pathQ = PATH_QUESTIONS[pathIdx] && PATH_QUESTIONS[pathIdx][dIdx] ? PATH_QUESTIONS[pathIdx][dIdx] : PATH_QUESTIONS[1][dIdx];
        return { id: q.id, section: q.section, type: Q_MC, maxScore: q.maxScore, dynamic: true, text: pathQ.text, help: pathQ.help, options: pathQ.options };
    }

    /* ===================================
       ENGAGEMENT
       =================================== */
    function renderEngagement() {
        $engagementSlot.innerHTML = '';
        if (currentIndex === 0) return;
        var q = allQuestions[currentIndex];
        var prev = allQuestions[currentIndex - 1];

        if (prev.section !== q.section) {
            var html = '<div class="pattern-break"><div class="pattern-break-card">';
            if (prev.section === 'founder') {
                var skill = answers['core_skill'] !== undefined ? allQuestions[0].options[answers['core_skill']].label : 'your skills';
                html += '<div class="pb-label">FOUNDER PROFILE COMPLETE</div>';
                html += '<div class="pb-text">' + escapeHtml(skill) + ' is a strong foundation. Now choose your strategy path — the one that matches your market data, ICP, and founder profile.</div>';
            } else if (prev.section === 'strategy') {
                var pathName = selectedPathIndex >= 0 ? STRATEGY_PATHS[selectedPathIndex].name : 'your chosen path';
                html += '<div class="pb-label">STRATEGY LOCKED: ' + escapeHtml(pathName).toUpperCase() + '</div>';
                html += '<div class="pb-text">Now I\'ll test your execution readiness for this specific path. These 4 questions are calibrated to ' + escapeHtml(pathName) + ' — not generic.</div>';
            } else if (prev.section === 'execution') {
                html += '<div class="pb-label">ALMOST DONE</div>';
                html += '<div class="pb-text">One final question to calibrate your strategy for MENA context. Your advantage and your challenge — both matter.</div>';
            }
            html += '</div></div>';
            $engagementSlot.innerHTML = html;
            return;
        }

        if (currentIndex > 0) {
            var prevQ = getEffective(currentIndex - 1);
            var ack = getAcknowledgment(prevQ);
            if (ack) $engagementSlot.innerHTML = '<div class="acknowledgment"><div class="acknowledgment-card">' + ack + '</div></div>';
        }
    }

    function getAcknowledgment(q) {
        if (q.type === Q_MC && q.id in answers && q.options) {
            var opt = q.options[answers[q.id]];
            if (!opt) return null;
            var ratio = opt.score / q.maxScore;
            if (ratio >= 0.8) return 'Strong signal. This shapes your strategy recommendation in a specific way.';
            if (ratio <= 0.4) return 'That\'s honest. Better to know this now than discover it mid-execution.';
        } else if (q.type === Q_FREETEXT) {
            var wc = countWords(answers[q.id] || '');
            if (wc >= 40) return 'That\'s the depth I\'m looking for. Your reasoning directly shapes the strategy recommendation.';
            if (wc > 0 && wc < 15) return 'A few more sentences would sharpen the recommendation significantly.';
        }
        return null;
    }

    /* ===================================
       RENDER QUESTION
       =================================== */
    function renderQuestion() {
        var q = getEffective(currentIndex);
        focusedOptionIndex = -1;
        $sectionLabel.textContent = SECTION_LABELS[allQuestions[currentIndex].section] || '';
        $progressCounter.textContent = 'Question ' + (currentIndex + 1) + ' of ' + allQuestions.length;
        $progressFill.style.width = ((currentIndex + 1) / allQuestions.length * 100) + '%';
        $questionText.textContent = q.text;
        if (q.help) { $questionHelp.textContent = q.help; $questionHelp.style.display = 'block'; } else { $questionHelp.style.display = 'none'; }
        $optionsList.innerHTML = '';
        renderEngagement();
        if (q.type === Q_FREETEXT) renderFreetextQuestion(q);
        else renderMcQuestion(q);
        $btnPrev.classList.toggle('hidden', currentIndex === 0);
        $btnNext.textContent = currentIndex === allQuestions.length - 1 ? 'Submit Assessment' : 'Next';
    }

    function renderMcQuestion(q) {
        q.options.forEach(function(opt, idx) {
            var div = document.createElement('div');
            div.className = 'option-card';
            div.textContent = opt.label;
            if (answers[q.id] === idx) div.classList.add('selected');
            div.addEventListener('click', function() { selectOption(idx); });
            $optionsList.appendChild(div);
        });
        $btnNext.disabled = !(q.id in answers);
    }

    function renderFreetextQuestion(q) {
        var ta = document.createElement('textarea');
        ta.className = 'freetext-input';
        ta.placeholder = q.placeholder || 'Type your answer here...';
        ta.rows = 5;
        ta.value = answers[q.id] || '';
        var charDiv = document.createElement('div');
        charDiv.className = 'char-count';
        charDiv.textContent = countWords(ta.value) + ' / ' + (q.wordLimit || 200) + ' words';
        ta.addEventListener('input', function() {
            var wc = countWords(ta.value);
            charDiv.textContent = wc + ' / ' + (q.wordLimit || 200) + ' words';
            charDiv.classList.toggle('over', wc > (q.wordLimit || 200));
            answers[q.id] = ta.value;
            saveAnswersToStorage();
            $btnNext.disabled = !ta.value.trim();
            /* Detect path from hypothesis text */
            if (q.id === 'strategy_hypothesis') detectPathFromHypothesis();
        });
        $optionsList.appendChild(ta);
        $optionsList.appendChild(charDiv);
        $btnNext.disabled = !(q.id in answers && answers[q.id] && answers[q.id].trim());
    }

    function countWords(text) { if (!text || !text.trim()) return 0; return text.trim().split(/\s+/).length; }

    function selectOption(idx) {
        var q = getEffective(currentIndex);
        answers[q.id] = idx;
        saveAnswersToStorage();
        var cards = $optionsList.querySelectorAll('.option-card');
        for (var i = 0; i < cards.length; i++) cards[i].classList.remove('selected');
        cards[idx].classList.add('selected');
        focusedOptionIndex = idx;
        $btnNext.disabled = false;
        if (currentIndex < allQuestions.length - 1) { clearAutoAdvance(); autoAdvanceTimer = setTimeout(function() { nextQuestion(); }, 300); }
    }

    function clearAutoAdvance() { if (autoAdvanceTimer) { clearTimeout(autoAdvanceTimer); autoAdvanceTimer = null; } }

    function nextQuestion() {
        var q = getEffective(currentIndex);
        var answered = q.type === Q_FREETEXT ? (answers[q.id] && answers[q.id].trim()) : (q.id in answers);
        if (!answered) { $questionCard.classList.add('shake'); setTimeout(function() { $questionCard.classList.remove('shake'); }, 400); return; }
        if (currentIndex === allQuestions.length - 1) { submitAssessment(); return; }
        currentIndex++;
        renderQuestion();
    }

    function prevQuestion() { clearAutoAdvance(); if (currentIndex > 0) { currentIndex--; renderQuestion(); } }

    function handleKeyboard(e) {
        if (!document.getElementById('screenStepper').classList.contains('active')) return;
        var q = getEffective(currentIndex);
        if (q.type === Q_FREETEXT) { if (e.key === 'ArrowLeft' && e.target.tagName !== 'TEXTAREA') { e.preventDefault(); prevQuestion(); } return; }
        var cards = $optionsList.querySelectorAll('.option-card');
        if (cards.length === 0) return;
        switch (e.key) {
            case 'ArrowDown': e.preventDefault(); focusedOptionIndex = (focusedOptionIndex + 1) % cards.length; updateFocus(cards); break;
            case 'ArrowUp': e.preventDefault(); focusedOptionIndex = focusedOptionIndex <= 0 ? cards.length - 1 : focusedOptionIndex - 1; updateFocus(cards); break;
            case 'Enter': e.preventDefault(); if (focusedOptionIndex >= 0) selectOption(focusedOptionIndex); break;
            case 'ArrowRight': e.preventDefault(); nextQuestion(); break;
            case 'ArrowLeft': e.preventDefault(); prevQuestion(); break;
        }
    }

    function updateFocus(cards) { for (var i = 0; i < cards.length; i++) cards[i].classList.remove('focused'); if (focusedOptionIndex >= 0 && focusedOptionIndex < cards.length) { cards[focusedOptionIndex].classList.add('focused'); cards[focusedOptionIndex].scrollIntoView({ block: 'nearest' }); } }

    function saveAnswersToStorage() { try { localStorage.setItem(storageKey('answers', SC_NUMBER, userEmail, ventureSlug), JSON.stringify(answers)); } catch(e) {} }

    /* ===================================
       SCORING
       =================================== */
    function calculateScores() {
        var total = 0;
        var maxTotal = 0;
        allQuestions.forEach(function(q, idx) {
            var eq = getEffective(idx);
            maxTotal += eq.maxScore;
            if (eq.type === Q_MC && eq.id in answers && eq.options) {
                total += eq.options[answers[eq.id]].score;
            } else if (eq.type === Q_FREETEXT && answers[eq.id]) {
                total += scoreFreeText(eq, answers[eq.id]);
            }
        });
        return { total: total, maxTotal: maxTotal, normalized: Math.round((total / maxTotal) * 100) };
    }

    function scoreFreeText(q, text) {
        if (!text || !text.trim()) return 0;
        var wc = countWords(text);
        var max = q.maxScore;
        var score = 0;
        if (wc >= 80) score += max * 0.3;
        else if (wc >= 40) score += max * 0.2;
        else if (wc >= 20) score += max * 0.1;
        var lower = text.toLowerCase();
        var strategyTerms = ['market', 'icp', 'customer', 'pain', 'revenue', 'sales', 'product', 'niche', 'evidence', 'data', 'validate', 'interview', 'network', 'advantage', 'competition', 'pricing'];
        var hits = 0;
        strategyTerms.forEach(function(t) { if (lower.indexOf(t) !== -1) hits++; });
        if (hits >= 5) score += max * 0.3;
        else if (hits >= 3) score += max * 0.2;
        else if (hits >= 1) score += max * 0.1;
        var menaTerms = ['mena', 'gcc', 'uae', 'saudi', 'dubai', 'qatar', 'egypt', 'arabic', 'vision 2030', 'whatsapp', 'relationship'];
        var menaHits = 0;
        menaTerms.forEach(function(t) { if (lower.indexOf(t) !== -1) menaHits++; });
        if (menaHits >= 3) score += max * 0.2;
        else if (menaHits >= 1) score += max * 0.1;
        var numbers = (text.match(/\d+/g) || []).length;
        if (numbers >= 3) score += max * 0.2;
        else if (numbers >= 1) score += max * 0.1;
        return Math.min(Math.round(score), max);
    }

    function getBand(score) {
        if (score >= 85) return { label: 'Launch Ready', color: '#22C55E' };
        if (score >= 70) return { label: 'Almost There', color: '#FF6600' };
        if (score >= 55) return { label: 'Needs Work', color: '#D97706' };
        if (score >= 40) return { label: 'Early Stage', color: '#EF4444' };
        return { label: 'Reset', color: '#EF4444' };
    }

    /* ===================================
       ARCHETYPE LOGIC
       =================================== */
    function getArchetype() {
        var skill = answers['core_skill'];
        var archetypes = {
            0: { name: 'The Builder', icon: '🔧', desc: 'Technical founders who ship fast and iterate based on data. Your code is your moat.' },
            1: { name: 'The Closer', icon: '🎯', desc: 'Revenue-first founders who validate by selling. You don\'t build until someone pays.' },
            2: { name: 'Expert Without a Stage', icon: '📚', desc: 'Knowledge-rich founders who can teach and attract. Build audience, then monetize.' },
            3: { name: 'The Operator', icon: '⚙️', desc: 'Systems thinkers who build processes. You make chaos repeatable and scalable.' },
            4: { name: 'The Connector', icon: '🤝', desc: 'Network-driven founders. Your Rolodex is your distribution channel.' }
        };
        return archetypes[skill] || archetypes[0];
    }

    function getSecondaryPath() {
        var primary = selectedPathIndex;
        var skill = answers['core_skill'];
        var secondaries = {
            0: { path: 2, condition: 'If your localization target doesn\'t have enough market demand, pivot to building a lean tool for the same niche.' },
            1: { path: 3, condition: 'If you struggle to find consulting clients within 30 days, build a micro-tool that solves one pain from your ICP interviews.' },
            2: { path: 1, condition: 'If customer acquisition cost is too high for self-serve, switch to high-touch consulting first to build relationships.' },
            3: { path: 1, condition: 'If your niche is too small for pure software, offer advisory services alongside the product.' }
        };
        return secondaries[primary] || secondaries[1];
    }

    function getRoadmap() {
        var roadmaps = {
            0: { m1: ['Research global product landscape', 'Select specific product to replicate', 'Map MENA localization requirements', 'Secure 3 design partners'], m2: ['Build localized MVP', 'Integrate local payment methods', 'Arabic content/UI localization', 'Beta test with design partners'], m3: ['Launch to first 20 customers', 'Iterate based on feedback', 'Establish local distribution channel', 'Track key metrics: activation, retention'] },
            1: { m1: ['Define consulting offer + pricing', 'Sign first 3 clients', 'Deliver service manually', 'Document patterns and workflows'], m2: ['Expand to 8-10 clients', 'Identify top 3 automatable workflows', 'Start building productized features', 'Test pricing for software component'], m3: ['Launch software beta to existing clients', 'Measure time savings vs manual delivery', 'Onboard 5 software-only users', 'Set up recurring revenue billing'] },
            2: { m1: ['Ship MVP in 2 weeks', 'Start charging from day 1', 'Run targeted outreach to 50 prospects', 'Get first 5 paying customers'], m2: ['Iterate based on user feedback', 'Reduce churn triggers', 'Test 2 acquisition channels', 'Reach 20 paying customers'], m3: ['Optimize unit economics', 'Automate onboarding', 'Double down on winning channel', 'Target 50 paying customers'] },
            3: { m1: ['Map every player in your niche', 'Join 3 niche communities', 'Run 15+ ICP interviews', 'Publish 4 niche-specific content pieces'], m2: ['Launch niche-specific solution', 'Build reputation as niche expert', 'Sign 10 niche customers', 'Create niche benchmark/report'], m3: ['Achieve "go-to" status in niche', 'Build referral loops within niche', '25+ customers, 90%+ retention', 'Document expansion criteria'] }
        };
        return roadmaps[selectedPathIndex] || roadmaps[1];
    }

    /* ===================================
       SUBMIT
       =================================== */
    function submitAssessment() {
        $loadingOverlay.classList.add('active');
        setTimeout(function() {
            var result = calculateScores();
            var band = getBand(result.normalized);
            var archetype = getArchetype();
            var secondary = getSecondaryPath();
            var roadmap = getRoadmap();
            var resultObj = {
                score: result.normalized,
                band: band.label,
                total: result.total,
                maxTotal: result.maxTotal,
                selectedPath: selectedPathIndex >= 0 ? STRATEGY_PATHS[selectedPathIndex].name : 'Unknown',
                selectedPathIndex: selectedPathIndex,
                archetype: archetype.name,
                secondary: { path: STRATEGY_PATHS[secondary.path].name, condition: secondary.condition }
            };
            resultObj.completed_at = new Date().toISOString().split('T')[0];
            localStorage.setItem(storageKey('result', SC_NUMBER, userEmail, ventureSlug), JSON.stringify(resultObj));
            saveScore(userEmail, ventureSlug, SC_NUMBER, result.normalized);

            /* Backward compat */
            try {
                var ds = {};
                allQuestions.forEach(function(q, idx) { var eq = getEffective(idx); if (eq.type === Q_FREETEXT) ds[eq.id] = answers[eq.id] || ''; else if (eq.id in answers && eq.options) ds[eq.id] = eq.options[answers[eq.id]].label; });
                ds.selected_path = resultObj.selectedPath;
                ds.archetype = archetype.name;
                ds.total = result.normalized;
                ds.band = band.label;
                localStorage.setItem('eo-strategy-selector', JSON.stringify(ds));
            } catch(e) {}

            sendToWebhook(result, resultObj);
            $loadingOverlay.classList.remove('active');
            renderResults(resultObj);
        }, 800);
    }

    function sendToWebhook(result, resultObj) {
        var upstream = {};
        for (var i = 1; i < SC_NUMBER; i++) { upstream['sc' + i + '_score'] = getScores(userEmail, ventureSlug)['sc' + i] || null; }

        var controller = new AbortController();
        var timeoutId = setTimeout(function() { controller.abort(); }, 15000);

        fetch('https://ai.mamounalamouri.smorchestra.com/webhook/eo-strategy', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: userEmail, venture_name: ventureName, venture_slug: ventureSlug, scorecard: 'SC4', answers: answers, scores: { total: result.normalized, raw: result.total, max: result.maxTotal }, selected_path: resultObj.selectedPath, archetype: resultObj.archetype, upstream_data: upstream, timestamp: new Date().toISOString() }),
            signal: controller.signal
        })
        .then(function(r) { return r.json(); })
        .then(function(data) { console.log('Webhook OK:', data); })
        .catch(function(e) {
            if (e.name === 'AbortError') { console.warn('Webhook timeout'); showToast('Score saved locally. Server sync will retry.'); }
            else { console.warn('Webhook failed:', e); showToast('Score saved locally. Server sync failed.'); }
        })
        .finally(function() { clearTimeout(timeoutId); });
    }

    /* ===================================
       RENDER RESULTS (TYPE 3: RECOMMENDATION)
       =================================== */
    function renderResults(resultObj) {
        var score = resultObj.score || 0;
        var band = getBand(score);
        var pathName = resultObj.selectedPath || 'Unknown';
        var pathIdx = resultObj.selectedPathIndex >= 0 ? resultObj.selectedPathIndex : selectedPathIndex;
        var pathObj = STRATEGY_PATHS[pathIdx] || STRATEGY_PATHS[1];
        var archetype = getArchetype();
        var secondary = getSecondaryPath();
        var roadmap = getRoadmap();

        var html = '';

        /* === RECOMMENDED STRATEGY PATH === */
        html += '<div class="strategy-card">';
        html += '<div style="font-size:11px;font-weight:700;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;">YOUR RECOMMENDED PATH</div>';
        html += '<h3>' + escapeHtml(pathObj.name) + '</h3>';
        html += '<div class="path-desc">' + escapeHtml(pathObj.desc) + '</div>';
        html += '<div class="why-section"><div class="why-label">Why This Path</div>';
        var whyItems = getWhyReasons(pathIdx);
        whyItems.forEach(function(w) { html += '<div class="why-item">' + escapeHtml(w) + '</div>'; });
        html += '</div></div>';

        /* === SECONDARY PATH === */
        html += '<div class="secondary-card">';
        html += '<h4>Backup Path: ' + escapeHtml(STRATEGY_PATHS[secondary.path].name) + '</h4>';
        html += '<div class="activate">Activate if: ' + escapeHtml(secondary.condition) + '</div>';
        html += '<p>' + escapeHtml(STRATEGY_PATHS[secondary.path].desc) + '</p>';
        html += '</div>';

        /* === ARCHETYPE BADGE === */
        html += '<div class="archetype-badge">';
        html += '<div class="archetype-icon">' + archetype.icon + '</div>';
        html += '<div class="archetype-name">' + escapeHtml(archetype.name) + '</div>';
        html += '<div class="archetype-desc">' + escapeHtml(archetype.desc) + '</div>';
        html += '</div>';

        /* === 90-DAY ROADMAP === */
        html += '<div class="results-card"><h3>90-Day Roadmap Preview</h3>';
        html += '<div class="roadmap-grid">';
        ['m1', 'm2', 'm3'].forEach(function(m, idx) {
            html += '<div class="roadmap-col"><h4>Month ' + (idx + 1) + '</h4>';
            roadmap[m].forEach(function(item) { html += '<div class="roadmap-item">' + escapeHtml(item) + '</div>'; });
            html += '</div>';
        });
        html += '</div></div>';

        /* === STRENGTHEN YOUR STRATEGY === */
        html += '<div class="results-card"><h3>Strengthen Your Strategy</h3>';
        var gaps = getExecutionGaps(pathIdx);
        gaps.forEach(function(gap) {
            html += '<div class="raise-card"><h4>' + escapeHtml(gap.title) + '</h4><p>' + escapeHtml(gap.advice) + '</p></div>';
        });
        html += '</div>';

        /* === SCORE SUMMARY === */
        html += '<div class="results-card" style="text-align:center;padding:32px">';
        html += '<div style="font-size:42px;font-weight:800;color:' + band.color + '">' + score + '</div>';
        html += '<div style="font-size:12px;color:#9CA3AF;margin-bottom:8px">/ 100</div>';
        html += '<div style="font-size:16px;font-weight:700;color:' + band.color + ';text-transform:uppercase;letter-spacing:1.5px">' + band.label + '</div>';
        html += '<div style="font-size:13px;color:#9CA3AF;margin-top:4px">Strategy Selector Score — ' + escapeHtml(ventureName) + '</div>';
        html += '</div>';

        /* === CTAs === */
        html += '<div class="results-cta">';
        html += '<a href="EO-GTM-Fitness-Scoring.html" class="btn-primary" style="display:inline-block;text-decoration:none;">Continue to GTM Fitness →</a>';
        html += '<button class="btn-download-md" id="btnDownloadMd">Download Full Analysis (MD)</button>';
        html += '<a href="EO-Assessment-Dashboard.html" style="display:inline-block;text-decoration:none;background:transparent;border:2px solid rgba(255,255,255,0.3);color:#fff;padding:12px 28px;border-radius:var(--eo-radius-sm);font-size:15px;font-weight:600;min-width:280px;text-align:center;">Back to Dashboard</a>';
        html += '<button class="btn-retake" id="btnRetake">Retake Assessment</button>';
        html += '</div>';

        $resultsContent.innerHTML = html;
        showScreen('screenResults');
        window.scrollTo({ top: 0, behavior: 'smooth' });
        document.getElementById('btnRetake').addEventListener('click', retakeAssessment);
        document.getElementById('btnDownloadMd').addEventListener('click', generateMarkdownExport);
    }

    function getWhyReasons(pathIdx) {
        var skill = answers['core_skill'] !== undefined ? allQuestions[0].options[answers['core_skill']].label : '';
        var time = answers['time'] !== undefined ? allQuestions[2].options[answers['time']].label : '';
        var risk = answers['risk'] !== undefined ? allQuestions[3].options[answers['risk']].label : '';
        var reasons = {
            0: ['Your skill set (' + skill + ') enables fast localization execution', 'Market data from SC3 shows demand for adapted global solutions in your niche', 'Your time availability (' + time + ') supports the build-and-launch timeline'],
            1: ['Your risk profile (' + risk + ') benefits from immediate consulting revenue', 'Your skill set (' + skill + ') transfers directly to service delivery', 'Consulting validates your product thesis with real customer data before you build'],
            2: ['Your founder profile supports lean, self-serve product development', 'Time availability (' + time + ') is well-matched to iterative micro-product building', 'Conservative approach minimizes risk while validating product-market fit fast'],
            3: ['Your skill set (' + skill + ') creates a defensible niche advantage', 'SC1-SC3 data suggests a specific enough niche for deep penetration', 'Your patience and resource profile support the longer-horizon niche strategy']
        };
        return reasons[pathIdx] || reasons[1];
    }

    function getExecutionGaps(pathIdx) {
        var gaps = [];
        var execAnswers = ['exec_d1', 'exec_d2', 'exec_d3', 'exec_d4'];
        execAnswers.forEach(function(qId, idx) {
            if (answers[qId] !== undefined) {
                var eq = getEffective(5 + idx);
                var opt = eq.options[answers[qId]];
                if (opt && opt.score <= 2) {
                    gaps.push({ title: eq.text, advice: 'Your answer here flagged a gap. Address this within the first 2 weeks of execution. Consider: seeking a mentor, partner, or resource specifically for this challenge.' });
                }
            }
        });
        if (gaps.length === 0) {
            gaps.push({ title: 'Execution Readiness Looks Strong', advice: 'No critical gaps detected. Focus on speed — the biggest risk now is over-planning. Start executing your Month 1 roadmap this week.' });
        }
        return gaps.slice(0, 3);
    }

    /* ===================================
       MARKDOWN EXPORT
       =================================== */
    function generateMarkdownExport() {
        var result = calculateScores();
        var band = getBand(result.normalized);
        var archetype = getArchetype();
        var secondary = getSecondaryPath();
        var roadmap = getRoadmap();
        var pathObj = STRATEGY_PATHS[selectedPathIndex] || STRATEGY_PATHS[1];
        var executionGaps = getExecutionGaps(selectedPathIndex);
        var today = new Date();
        var dateStr = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');

        var md = '# SC4: Strategy Selector — Full Analysis\n\n';
        md += '**Venture:** ' + ventureName + '\n';
        md += '**Founder:** ' + userEmail + '\n';
        md += '**Date:** ' + dateStr + '\n';
        md += '**Score:** ' + result.normalized + '/100 — ' + band.label + '\n\n---\n\n';

        // 1. STRATEGIC SUMMARY
        md += '## Strategic Summary\n\n';
        md += '**Recommended Path:** ' + pathObj.name + '\n\n';
        md += pathObj.desc + '\n\n';
        md += '**Strengths — Why This Path:**\n\n';
        getWhyReasons(selectedPathIndex).forEach(function(r) { md += '- ' + r + '\n'; });
        md += '\n';
        if (executionGaps.length > 0) {
            md += '**Critical Gaps:** ' + executionGaps.length + ' execution gap' + (executionGaps.length > 1 ? 's' : '') + ' identified\n\n';
        } else {
            md += '**Critical Gaps:** None — strong alignment with selected path.\n\n';
        }

        md += '**Backup Path:** ' + STRATEGY_PATHS[secondary.path].name + '\n';
        md += '- Activate if: ' + secondary.condition + '\n\n';

        md += '**Founder Archetype:** ' + archetype.name + '\n';
        md += '- ' + archetype.desc + '\n\n';

        md += '### 90-Day Roadmap\n\n';
        ['m1', 'm2', 'm3'].forEach(function(m, idx) {
            md += '**Month ' + (idx + 1) + ':**\n';
            roadmap[m].forEach(function(item) { md += '- ' + item + '\n'; });
            md += '\n';
        });
        md += '---\n\n';

        // 2. RECOMMENDED FIXES
        md += '## Recommended Fixes\n\n';
        if (executionGaps.length > 0) {
            executionGaps.forEach(function(g, idx) {
                md += (idx + 1) + '. **' + g.title + ':** ' + g.advice + '\n\n';
            });
        } else {
            md += 'No critical execution gaps. Proceed to GTM Fitness (SC5) with confidence.\n\n';
        }

        md += '### All 4 Paths Compared\n\n';
        STRATEGY_PATHS.forEach(function(p, idx) {
            var marker = idx === selectedPathIndex ? ' ← RECOMMENDED' : '';
            md += '**' + p.name + marker + ':** ' + p.desc + '\n\n';
        });
        md += '---\n\n';

        // 3. QUESTIONS & ANSWERS
        md += '## Questions & Answers\n\n';
        allQuestions.forEach(function(q, idx) {
            var eq = getEffective(idx);
            md += '### Q' + (idx + 1) + ': ' + eq.text + '\n\n';
            if (eq.type === Q_FREETEXT) md += '> ' + (answers[eq.id] || '(No answer)').replace(/\n/g, '\n> ') + '\n\n';
            else { var opt = eq.id in answers && eq.options ? eq.options[answers[eq.id]] : null; md += '→ ' + (opt ? opt.label + ' (' + opt.score + '/' + eq.maxScore + ')' : '(No answer)') + '\n\n'; }
        });

        md += '---\n*Generated by Entrepreneurs Oasis MENA — Strategy Selector*\n';

        var blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = 'SC4-Strategy-Selector-' + (slugify(ventureName) || 'venture') + '-' + dateStr + '.md';
        document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    }

    function retakeAssessment() {
        answers = {}; currentIndex = 0; selectedPathIndex = -1;
        try { localStorage.removeItem(storageKey('answers', SC_NUMBER, userEmail, ventureSlug)); localStorage.removeItem(storageKey('result', SC_NUMBER, userEmail, ventureSlug)); } catch(e) {}
        showScreen('screenAuth');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function escapeHtml(text) { var d = document.createElement('div'); d.appendChild(document.createTextNode(text)); return d.innerHTML; }

    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init); else init();
})();

function toggleRTL() { document.body.classList.toggle('rtl'); var r = document.body.classList.contains('rtl'); document.documentElement.lang = r ? 'ar' : 'en'; document.documentElement.dir = r ? 'rtl' : 'ltr'; try { localStorage.setItem('eo-rtl', r ? '1' : '0'); } catch(e) {} }
</script>
