<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrepreneurs Oasis MENA — ICP Clarity Scoring</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root {
    --eo-dark: #050A12;
    --eo-orange: #FF6600;
    --eo-beige: #0C1220;
    --eo-card-bg: #111827;
    --eo-gray-text: #94A3B8;
    --eo-gray-border: rgba(255,255,255,0.06);
    --eo-radius: 14px;
    --eo-radius-sm: 8px;
    --eo-transition: 300ms ease;
    --green: #22C55E;
    --gold: #D97706;
    --red: #EF4444;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--eo-dark); color: #FFFFFF; min-height: 100vh; line-height: 1.5; -webkit-font-smoothing: antialiased; }
body.rtl { direction: rtl; text-align: right; }
body.rtl .nav-buttons { flex-direction: row-reverse; }
body.rtl .section-bar-row { flex-direction: row-reverse; }
body.rtl .progress-meta { flex-direction: row-reverse; }
.rtl-toggle { position: fixed; top: 12px; right: 12px; z-index: 999; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 6px 14px; border-radius: var(--eo-radius-sm); cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 600; transition: all var(--eo-transition); }
.rtl-toggle:hover { background: rgba(255,255,255,0.2); }
.eo-header { text-align: center; padding: 28px 20px 12px; }
.eo-header h1 { font-size: 22px; font-weight: 800; color: #FFFFFF; }
.eo-header h1 span { color: var(--eo-orange); }
.section-label { font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: #9CA3AF; text-align: center; margin-bottom: 4px; }
.progress-wrapper { max-width: 640px; margin: 0 auto 24px; padding: 0 20px; }
.progress-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.progress-meta .section-label { margin-bottom: 0; text-align: left; }
.progress-counter { font-size: 13px; color: #9CA3AF; font-weight: 500; }
.progress-track { width: 100%; height: 8px; background: #2D2D44; border-radius: 4px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--eo-orange); border-radius: 4px; transition: width var(--eo-transition); width: 0%; }
.screen { display: none; }
.screen.active { display: block; }
.auth-capture { max-width: 480px; margin: 60px auto; padding: 40px; text-align: center; background: var(--eo-beige); border-radius: var(--eo-radius); box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
.auth-capture h2 { font-size: 26px; font-weight: 800; color: #1A1A2E; margin-bottom: 8px; }
.auth-capture .intro-badge { display: inline-block; background: var(--eo-orange); color: #fff; font-size: 11px; font-weight: 700; padding: 4px 12px; border-radius: 4px; letter-spacing: 0.5px; margin-bottom: 12px; }
.auth-capture p { color: var(--eo-gray-text); margin-bottom: 24px; font-size: 15px; }
.auth-capture label { display: block; text-align: left; font-size: 12px; font-weight: 700; color: #1A1A2E; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; margin-top: 16px; }
.auth-capture input, .auth-capture select { width: 100%; padding: 14px 16px; border: 2px solid var(--eo-gray-border); border-radius: var(--eo-radius-sm); font-size: 15px; font-family: inherit; outline: none; transition: border-color var(--eo-transition); color: #1A1A2E; background: var(--eo-card-bg); }
.auth-capture input:focus, .auth-capture select:focus { border-color: var(--eo-orange); }
.auth-capture .btn-primary { width: 100%; margin-top: 20px; }
.question-card { background: var(--eo-beige); border-radius: var(--eo-radius); box-shadow: 0 4px 20px rgba(0,0,0,0.3); padding: 32px; max-width: 640px; margin: 0 auto; }
.question-text { font-size: 20px; font-weight: 700; color: var(--eo-orange); text-align: center; margin-bottom: 12px; line-height: 1.35; }
.question-help { font-size: 13px; color: var(--eo-gray-text); text-align: center; margin-bottom: 20px; line-height: 1.5; font-style: italic; }
.freetext-input { width: 100%; padding: 16px; border: 2px solid var(--eo-gray-border); border-radius: var(--eo-radius-sm); font-size: 15px; font-family: inherit; resize: vertical; min-height: 160px; outline: none; transition: border-color var(--eo-transition); color: #1A1A2E; line-height: 1.5; background: var(--eo-card-bg); }
.freetext-input:focus { border-color: var(--eo-orange); }
.freetext-input::placeholder { color: #9CA3AF; font-size: 14px; }
.char-count { text-align: right; font-size: 12px; color: #9CA3AF; margin-top: 6px; }
.nav-buttons { display: flex; justify-content: space-between; align-items: center; max-width: 640px; margin: 24px auto 0; padding: 0 20px; gap: 12px; }
.btn { font-family: inherit; font-size: 15px; font-weight: 600; padding: 12px 28px; border-radius: var(--eo-radius-sm); cursor: pointer; transition: all var(--eo-transition); border: none; outline: none; }
.btn-prev { background: transparent; border: 2px solid #FFFFFF; color: #FFFFFF; }
.btn-prev:hover { background: rgba(255,255,255,0.15); }
.btn-prev.hidden { visibility: hidden; pointer-events: none; }
.btn-next { background: var(--eo-orange); color: #FFFFFF; }
.btn-next:hover { background: #d4441a; }
.btn-next:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-primary { background: var(--eo-orange); color: #FFFFFF; font-size: 16px; font-weight: 700; padding: 14px 32px; border: none; border-radius: var(--eo-radius-sm); cursor: pointer; font-family: inherit; transition: all var(--eo-transition); }
.btn-primary:hover { background: #d4441a; }
.toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: var(--eo-dark); color: #fff; padding: 12px 24px; border-radius: var(--eo-radius-sm); font-size: 14px; font-weight: 500; z-index: 1000; transition: transform 0.4s ease; white-space: nowrap; }
.toast.show { transform: translateX(-50%) translateY(0); }
.loading-overlay { display: none; position: fixed; inset: 0; background: rgba(26,26,46,0.9); z-index: 2000; justify-content: center; align-items: center; flex-direction: column; gap: 20px; }
.loading-overlay.active { display: flex; }
.spinner { width: 48px; height: 48px; border: 4px solid #2D2D44; border-top-color: var(--eo-orange); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-overlay p { font-size: 16px; font-weight: 500; }
.results-container { max-width: 720px; margin: 0 auto; padding: 0 20px 60px; }
.score-hero { text-align: center; padding: 40px 20px 32px; }
.score-gauge { width: 160px; height: 160px; margin: 0 auto 16px; position: relative; }
.score-gauge svg { width: 100%; height: 100%; }
.score-gauge-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
.score-gauge-number { font-size: 42px; font-weight: 800; display: block; }
.score-gauge-label { font-size: 12px; color: #9CA3AF; }
.band-label { font-size: 18px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 4px; }
.band-subtitle { font-size: 14px; color: #9CA3AF; }
.results-card { background: rgba(255,255,255,0.06); border-radius: var(--eo-radius); padding: 24px; margin-bottom: 20px; }
.results-card h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; color: #FFFFFF; }
.polished-card { background: linear-gradient(135deg, rgba(255,102,0,0.08), rgba(255,102,0,0.02)); border: 1px solid rgba(255,102,0,0.2); border-radius: var(--eo-radius); padding: 28px; margin-bottom: 20px; }
.polished-card h3 { font-size: 15px; font-weight: 700; color: var(--eo-orange); margin-bottom: 12px; }
.polished-section { margin-bottom: 16px; }
.polished-section h4 { font-size: 12px; font-weight: 700; color: var(--eo-orange); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.polished-section p { font-size: 14px; color: #D1D5DB; line-height: 1.6; }
.sharpen-card { background: rgba(255,255,255,0.04); border-left: 4px solid var(--gold); border-radius: 0 var(--eo-radius-sm) var(--eo-radius-sm) 0; padding: 16px 20px; margin-bottom: 12px; }
.sharpen-card h4 { font-size: 14px; font-weight: 700; color: #FFFFFF; margin-bottom: 6px; }
.sharpen-card p { font-size: 13px; color: #D1D5DB; line-height: 1.5; }
.section-bar-row { display: flex; align-items: center; margin-bottom: 14px; gap: 12px; }
.section-bar-label { width: 120px; font-size: 13px; font-weight: 600; color: #D1D5DB; flex-shrink: 0; }
.section-bar-track { flex: 1; height: 12px; background: #2D2D44; border-radius: 6px; overflow: hidden; }
.section-bar-fill { height: 100%; border-radius: 6px; transition: width 0.5s ease; }
.section-bar-score { width: 50px; text-align: right; font-size: 13px; font-weight: 600; color: #D1D5DB; flex-shrink: 0; }
.results-cta { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-top: 32px; }
.btn-download-md { background: transparent; border: 2px solid var(--eo-orange); color: var(--eo-orange); padding: 12px 28px; border-radius: var(--eo-radius-sm); font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all var(--eo-transition); min-width: 280px; }
.btn-download-md:hover { background: var(--eo-orange); color: #FFFFFF; }
.btn-retake { background: transparent; border: 2px solid #FFFFFF; color: #FFFFFF; padding: 12px 28px; border-radius: var(--eo-radius-sm); font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all var(--eo-transition); min-width: 280px; }
.btn-retake:hover { background: rgba(255,255,255,0.15); }
.engagement-break { max-width: 640px; margin: 0 auto 24px; padding: 0 20px; }
.engagement-break-card { background: linear-gradient(135deg, #1a1a1a, #0f0f0f); border-left: 4px solid var(--eo-orange); border-radius: var(--eo-radius-sm); padding: 16px 20px; }
.engagement-break-card p { font-size: 14px; color: #D1D5DB; line-height: 1.6; font-style: italic; }
.retrieval-banner { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-left: 4px solid var(--green); border-radius: var(--eo-radius-sm); padding: 16px 20px; margin-top: 20px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
.retrieval-score { width: 44px; height: 44px; border-radius: 50%; background: rgba(255,102,0,0.15); display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 800; color: var(--eo-orange); flex-shrink: 0; }
.retrieval-info { flex: 1; min-width: 120px; }
.retrieval-info strong { display: block; font-size: 14px; color: #fff; }
.retrieval-info span { font-size: 12px; color: #9CA3AF; }
.retrieval-actions { display: flex; gap: 8px; }
.retrieval-actions button { padding: 8px 16px; border-radius: var(--eo-radius-sm); font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; border: none; transition: all var(--eo-transition); }
.btn-view-results { background: transparent; border: 1px solid var(--eo-orange); color: var(--eo-orange); }
.btn-view-results:hover { background: var(--eo-orange); color: #fff; }
.btn-start-fresh { background: var(--eo-orange); color: #fff; }
.btn-start-fresh:hover { background: #d4441a; }
@media (max-width: 680px) {
    .question-card { margin: 0 16px; padding: 24px 20px; }
    .nav-buttons { padding: 0 16px; }
    .question-text { font-size: 18px; }
    .progress-wrapper { padding: 0 16px; }
    .auth-capture { margin: 40px 16px; padding: 28px 20px; }
}
</style>
</head>
<body>

<button class="rtl-toggle" onclick="toggleRTL()">EN / عربي</button>
<div class="toast" id="toast"></div>
<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div><p>Generating your ICP analysis...</p></div>

<div class="eo-header"><h1>Entrepreneurs <span>Oasis MENA</span></h1></div>

<!-- AUTH SCREEN (Venture Selector) -->
<div class="screen active" id="screenAuth">
    <div class="auth-capture">
        <div class="intro-badge">STEP 2 OF 5</div>
        <h2>ICP Clarity</h2>
        <p>6 questions. ~12 minutes. Define your ideal customer.</p>
        <label>Your Email</label>
        <input type="email" id="auth-email" placeholder="founder@company.com" autocomplete="email">
        <button class="btn-primary" onclick="handleEmailEntry()" style="margin-bottom:0">Continue →</button>
        <div id="venture-selector" style="display:none;margin-top:16px"></div>
        <div id="auth-error" style="color:var(--red);font-size:13px;margin-top:12px;display:none"></div>
        <div id="retrieval-banner" style="display:none"></div>
    </div>
</div>

<!-- QUESTION SCREEN -->
<div class="screen" id="screenStepper">
    <div class="progress-wrapper">
        <div class="progress-meta">
            <div class="section-label" id="sectionLabel">ICP Profile</div>
            <div class="progress-counter" id="progressCounter">Question 1 of 6</div>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    </div>
    <div id="engagementSlot"></div>
    <div class="question-card" id="questionCard">
        <div class="question-text" id="questionText"></div>
        <div class="question-help" id="questionHelp" style="display:none"></div>
        <div id="answerArea"></div>
    </div>
    <div class="nav-buttons">
        <button class="btn btn-prev hidden" id="btnPrev" onclick="prevQuestion()">← Previous</button>
        <button class="btn btn-next" id="btnNext" onclick="nextQuestion()" disabled>Next →</button>
    </div>
</div>

<!-- RESULTS SCREEN -->
<div class="screen" id="screenResults">
    <div class="results-container" id="resultsContent"></div>
</div>

<script>
// === SHARED PATTERNS ===
function slugify(text) { return text.toString().toLowerCase().trim().replace(/\s+/g, '-').replace(/[^\w\-]+/g, '').replace(/\-\-+/g, '-').replace(/^-+/, '').replace(/-+$/, ''); }
function getVentures(email) { try { return JSON.parse(localStorage.getItem('eo_ventures_' + email) || '[]'); } catch(e) { return []; } }
function saveVenture(email, vn) { var slug = slugify(vn); if (slug.length < 2) slug = 'venture-' + Date.now().toString(36); var v = getVentures(email); var ex = v.find(function(x){return x.venture_slug===slug;}); if (ex) { ex.last_active = new Date().toISOString().split('T')[0]; localStorage.setItem('eo_ventures_'+email, JSON.stringify(v)); return {venture_name:ex.venture_name,venture_slug:slug,isNew:false}; } var nv = {venture_name:vn.trim(),venture_slug:slug,created_at:new Date().toISOString().split('T')[0],last_active:new Date().toISOString().split('T')[0]}; v.push(nv); localStorage.setItem('eo_ventures_'+email,JSON.stringify(v)); return {venture_name:nv.venture_name,venture_slug:slug,isNew:true}; }
function updateVentureActivity(email, slug) { var v = getVentures(email); var f = v.find(function(x){return x.venture_slug===slug;}); if(f){f.last_active=new Date().toISOString().split('T')[0];localStorage.setItem('eo_ventures_'+email,JSON.stringify(v));} }
function storageKey(type, sc, email, slug) { return 'eo_sc'+sc+'_'+type+'_'+email+'_'+slug; }
function getScores(email, slug) { try { return JSON.parse(localStorage.getItem('eo_scores_'+email+'_'+slug)||'{}'); } catch(e){return {};} }
function saveScore(email, slug, sc, score) { var s=getScores(email,slug);s['sc'+sc]=score;localStorage.setItem('eo_scores_'+email+'_'+slug,JSON.stringify(s)); }
function getUpstreamAnswers(sc, email, slug) { try{return JSON.parse(localStorage.getItem(storageKey('answers',sc,email,slug))||'{}');}catch(e){return {};} }
function getUpstreamResult(sc, email, slug) { try{return JSON.parse(localStorage.getItem(storageKey('result',sc,email,slug))||'null');}catch(e){return null;} }
function showError(msg) { var el=document.getElementById('auth-error');el.innerHTML=msg;el.style.display='block';setTimeout(function(){el.style.display='none';},8000); }

// Migration
(function(){for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(k){var m=k.match(/^eo_sc(\d)_answers_([^_]+@[^_]+\.[^_]+)$/);if(m){var p={};try{p=JSON.parse(localStorage.getItem('eo_migration_pending')||'{}');}catch(e){}if(!p[m[2]])p[m[2]]=[];if(p[m[2]].indexOf(parseInt(m[1]))===-1)p[m[2]].push(parseInt(m[1]));localStorage.setItem('eo_migration_pending',JSON.stringify(p));}}}})();

// === STATE ===
var SC_NUMBER = 2;
var userEmail = '', ventureSlug = '', ventureName = '';
var currentQ = 0, answers = {};

var questions = [
  { id: 'who', section: 'Who They Are', text: "Describe your ideal customer as a real person — their role, company size, industry, daily frustrations, and how they currently solve the problem you're targeting.", help: "Be as specific as possible. Think of one actual person you've talked to or researched.", placeholder: "Head of sales at a mid-size real estate brokerage in Dubai, managing 8-15 agents, spending 3 hours/day manually assigning leads from Property Finder and Bayut..." },
  { id: 'pain', section: 'Pain Points', text: "What are the top 3 pains your ICP feels? For each: how urgent is it, how often does it happen, and what does it cost them (time, money, reputation)?", help: "Quantify the pain. Use numbers, frequency, and consequences.", placeholder: "1. Lead leakage — 30% of inbound leads go unassigned. Costs ~AED 50K/month in lost commissions. Happens daily.\n2. No visibility — owners can't see agent performance. Costs trust + retention. Weekly frustration.\n3. WhatsApp chaos — leads scattered across 5+ agent phones. No centralized view. Daily pain.", engagement: "Good — you know your buyer. Let's go deeper on their motivations." },
  { id: 'dream', section: 'Dream Outcome', text: "What does 'success' look like for your ICP after using your product? Describe their dream outcome — both the business result and how it makes them feel.", help: "Think beyond the feature. What transformation does your product enable?", placeholder: "Every lead is auto-assigned in 30 seconds. Owner sees a real-time leaderboard. Close rate goes from 8% to 15%. The owner feels in control for the first time — no more chasing agents for updates..." },
  { id: 'journey', section: 'Current Journey', text: "Where is your ICP right now in their journey? What's their current state, what obstacles block them, and how does your product bridge the gap to their dream outcome?", help: "Map the transformation: Current State → Obstacles → Your Solution → Dream Outcome.", placeholder: "Current: Using WhatsApp + Excel. Obstacles: No budget for enterprise CRM, don't trust generic tools, need Arabic UI. Our product bridges this: simple, Arabic-first, WhatsApp-integrated, priced for mid-market (AED 500/mo)...", engagement: "Clear transformation path. Now let's figure out where to find them." },
  { id: 'access', section: 'Access Channels', text: "Where do you find these people? List their online congregation points (LinkedIn groups, forums, communities) and offline gathering spots (events, associations, coworking).", help: "Name specific groups, events, or platforms. The more concrete, the better.", placeholder: "LinkedIn: Dubai Real Estate Professionals (12K members), UAE Property Managers group. Events: Cityscape Dubai, RERA workshops. Offline: Dubai Land Department seminars, brokerage owner meetups at in5..." },
  { id: 'validation', section: 'Validation Plan', text: "How will you reach 100 potential buyers in the next 30 days? Be specific: which channels, what message, what offer.", help: "This is your 30-day action plan for ICP validation. Be concrete about numbers and timeline.", placeholder: "Week 1-2: DM 50 brokerage owners on LinkedIn with a free audit offer. Week 3: Host a 'Lead Management for Brokerages' webinar (target 30 registrations). Week 4: Visit 20 brokerages in Business Bay with a live demo on iPad..." }
];

// === AUTH (Venture Selector) ===
function handleEmailEntry() {
  var email = document.getElementById('auth-email').value.trim().toLowerCase();
  if (!email || email.indexOf('@') === -1) { showError('Please enter a valid email address'); return; }
  userEmail = email;
  localStorage.setItem('eo_user_email', email);
  var ventures = getVentures(email);
  if (ventures.length === 0) {
    showError('No assessment found for this email. <a href="EO-Project-Definition-Scoring.html" style="color:var(--eo-orange)">Complete Step 1 first →</a>');
    return;
  }
  if (ventures.length === 1) { selectVenture(ventures[0]); }
  else { showVentureSelector(ventures); }
}

function showVentureSelector(ventures) {
  var sel = document.getElementById('venture-selector');
  sel.innerHTML = '<label style="margin-top:0">Select Venture</label><select id="venture-select" style="width:100%;padding:14px 16px;border:2px solid var(--eo-gray-border);border-radius:var(--eo-radius-sm);font-size:15px;font-family:inherit;color:#1A1A2E;background:var(--eo-card-bg)" onchange="handleVentureSelect()"><option value="">— Choose your venture —</option>' +
    ventures.map(function(v){return '<option value="'+v.venture_slug+'">'+v.venture_name+'</option>';}).join('') + '</select>';
  sel.style.display = 'block';
}

function handleVentureSelect() {
  var slug = document.getElementById('venture-select').value;
  if (!slug) return;
  var v = getVentures(userEmail).find(function(x){return x.venture_slug===slug;});
  if (v) selectVenture(v);
}

function selectVenture(venture) {
  ventureSlug = venture.venture_slug;
  ventureName = venture.venture_name;
  updateVentureActivity(userEmail, ventureSlug);
  var existingResult = getUpstreamResult(SC_NUMBER, userEmail, ventureSlug);
  if (existingResult) { showRetrievalBanner(existingResult); }
  else { checkPrerequisites(); }
}

function checkPrerequisites() {
  var scores = getScores(userEmail, ventureSlug);
  if (!scores.sc1 && scores.sc1 !== 0) {
    showError('Please complete <a href="EO-Project-Definition-Scoring.html" style="color:var(--eo-orange)">Project Definition</a> first.');
    return;
  }
  startQuestions();
}

function showRetrievalBanner(result) {
  var banner = document.getElementById('retrieval-banner');
  banner.innerHTML = '<div class="retrieval-banner"><div class="retrieval-score">'+(result.score||'?')+'</div><div class="retrieval-info"><strong>Previously Completed</strong><span>'+(result.band||'')+' — '+(result.completed_at||'')+'</span></div><div class="retrieval-actions"><button class="btn-view-results" onclick="viewPreviousResults()">View Results</button><button class="btn-start-fresh" onclick="startFresh()">Start Fresh</button></div></div>';
  banner.style.display = 'block';
}
function viewPreviousResults() { var r=getUpstreamResult(SC_NUMBER,userEmail,ventureSlug); if(r) renderResults(r); }
function startFresh() { localStorage.removeItem(storageKey('answers',SC_NUMBER,userEmail,ventureSlug)); localStorage.removeItem(storageKey('result',SC_NUMBER,userEmail,ventureSlug)); document.getElementById('retrieval-banner').style.display='none'; startQuestions(); }

// === QUESTIONS ===
function startQuestions() {
  try { var saved=JSON.parse(localStorage.getItem(storageKey('answers',SC_NUMBER,userEmail,ventureSlug))||'{}'); if(saved&&Object.keys(saved).length>0) answers=saved; } catch(e){}
  showScreen('screenStepper'); currentQ=0; renderQuestion();
}

function renderQuestion() {
  var q = questions[currentQ];
  document.getElementById('sectionLabel').textContent = q.section;
  document.getElementById('progressCounter').textContent = 'Question '+(currentQ+1)+' of '+questions.length;
  document.getElementById('progressFill').style.width = ((currentQ+1)/questions.length*100)+'%';
  document.getElementById('questionText').textContent = q.text;
  if (q.help) { document.getElementById('questionHelp').textContent=q.help; document.getElementById('questionHelp').style.display='block'; } else { document.getElementById('questionHelp').style.display='none'; }
  var engSlot = document.getElementById('engagementSlot');
  engSlot.innerHTML = q.engagement ? '<div class="engagement-break"><div class="engagement-break-card"><p>'+q.engagement+'</p></div></div>' : '';
  var area = document.getElementById('answerArea');
  var savedVal = answers[q.id]||'';
  area.innerHTML = '<textarea class="freetext-input" id="currentAnswer" placeholder="'+(q.placeholder||'')+'" oninput="handleInput()">'+escapeHtml(savedVal)+'</textarea><div class="char-count" id="charCount">'+countWords(savedVal)+' words</div>';
  setTimeout(function(){document.getElementById('currentAnswer').focus();},100);
  document.getElementById('btnPrev').className = currentQ===0?'btn btn-prev hidden':'btn btn-prev';
  updateNextBtn();
}

function handleInput() { var v=document.getElementById('currentAnswer').value; document.getElementById('charCount').textContent=countWords(v)+' words'; updateNextBtn(); }
function updateNextBtn() { var v=document.getElementById('currentAnswer').value.trim(); document.getElementById('btnNext').disabled=v.length<10; document.getElementById('btnNext').textContent=currentQ===questions.length-1?'See Results →':'Next →'; }

function nextQuestion() {
  var val=document.getElementById('currentAnswer').value.trim();
  if(val.length<10)return;
  answers[questions[currentQ].id]=val;
  saveAnswersToStorage();
  if(currentQ<questions.length-1){currentQ++;renderQuestion();window.scrollTo({top:0,behavior:'smooth'});}
  else{finishAssessment();}
}
function prevQuestion() { if(currentQ>0){var v=document.getElementById('currentAnswer').value.trim();if(v)answers[questions[currentQ].id]=v;saveAnswersToStorage();currentQ--;renderQuestion();window.scrollTo({top:0,behavior:'smooth'});} }
function saveAnswersToStorage() { localStorage.setItem(storageKey('answers',SC_NUMBER,userEmail,ventureSlug),JSON.stringify(answers)); }

// === SCORING ===
function scoreAnswer(text) {
  var score=30,words=countWords(text);
  if(words>=20)score+=5;if(words>=50)score+=5;if(words>=100)score+=10;if(words>=150)score+=5;
  var sp=0;
  if(/\d+/.test(text))sp+=8;if(/\$|\bUSD|\bAED|\bSAR/.test(text))sp+=5;
  if(/\b(dubai|abu dhabi|riyadh|jeddah|cairo|bahrain|kuwait|oman|qatar|saudi|uae|emirates|mena|gulf|gcc)\b/i.test(text))sp+=8;
  if(/\b(whatsapp|arabic|ramadan)\b/i.test(text))sp+=5;
  if(/\b(interview|survey|pilot|tested|validated|customers? told|feedback)\b/i.test(text))sp+=8;
  if(/\b(linkedin|twitter|facebook|community|forum|event|meetup|conference)\b/i.test(text))sp+=5;
  if(/\b(pain|frustrat|problem|struggle|challenge|cost|waste|lose|lost)\b/i.test(text))sp+=3;
  score+=Math.min(sp,45);
  return Math.min(score,100);
}

function calculateScores() {
  var secs={},total=0;
  questions.forEach(function(q){var s=scoreAnswer(answers[q.id]||'');secs[q.id]=s;total+=s;});
  return {total:Math.round(total/questions.length),sections:secs};
}

function getBand(score) {
  if(score>=85)return{band:'Launch Ready',color:'var(--green)',cls:'band-ready'};
  if(score>=70)return{band:'Almost There',color:'var(--eo-orange)',cls:'band-partial'};
  if(score>=55)return{band:'Needs Work',color:'var(--gold)',cls:'band-gaps'};
  if(score>=40)return{band:'Early Stage',color:'var(--red)',cls:'band-startover'};
  return{band:'Reset',color:'var(--red)',cls:'band-startover'};
}

// === POLISHED OUTPUT ===
function generatePolishedOutput() {
  return {
    who: (answers.who||'').substring(0,300),
    pain: (answers.pain||'').substring(0,300),
    dream_outcome: (answers.dream||'').substring(0,200),
    where_to_find: (answers.access||'').substring(0,200)
  };
}

function findWeakestAreas(secs) {
  var sorted=Object.keys(secs).map(function(k){return{id:k,score:secs[k]};}).sort(function(a,b){return a.score-b.score;});
  var labels={who:{name:'Customer Definition',advice:'Get more specific about your ideal buyer. Name a real person, their exact role, company size, and daily workflow.'},pain:{name:'Pain Clarity',advice:'Quantify each pain point: frequency, cost, urgency. Use specific numbers and examples from real conversations.'},dream:{name:'Dream Outcome',advice:'Go beyond features. Describe the emotional and business transformation your buyer experiences.'},journey:{name:'Buyer Journey',advice:'Map the full transformation: current state → obstacles → your solution → dream outcome. Be concrete.'},access:{name:'Access Channels',advice:'Name specific communities, LinkedIn groups, events, and platforms. Generic channels like "social media" are too vague.'},validation:{name:'Validation Plan',advice:'Be more specific about numbers, timeline, and message. How many DMs? What exact offer? What conversion rate do you expect?'}};
  return sorted.slice(0,3).map(function(w){var info=labels[w.id]||{name:w.id,advice:'Add more specificity.'};return{name:info.name,score:w.score,advice:info.advice};});
}

// === FINISH ===
function finishAssessment() {
  document.getElementById('loadingOverlay').classList.add('active');
  setTimeout(function(){
    var scores=calculateScores();var bandInfo=getBand(scores.total);
    var polished=generatePolishedOutput();var weakAreas=findWeakestAreas(scores.sections);
    var resultObj={score:scores.total,band:bandInfo.band,sections:scores.sections,polished_output:polished,weak_areas:weakAreas,completed_at:new Date().toISOString().split('T')[0]};
    localStorage.setItem(storageKey('result',SC_NUMBER,userEmail,ventureSlug),JSON.stringify(resultObj));
    saveScore(userEmail,ventureSlug,SC_NUMBER,scores.total);
    saveAnswersToStorage();
    sendToWebhook(scores,resultObj);
    document.getElementById('loadingOverlay').classList.remove('active');
    renderResults(resultObj);
  },1500);
}

function renderResults(result) {
  showScreen('screenResults');
  var bandInfo=getBand(result.score);var polished=result.polished_output||{};var weakAreas=result.weak_areas||[];var sections=result.sections||{};
  var circ=2*Math.PI*70,dashOff=circ-(result.score/100*circ);
  var html='<div class="score-hero"><div class="score-gauge"><svg viewBox="0 0 160 160"><circle cx="80" cy="80" r="70" fill="none" stroke="#2D2D44" stroke-width="8"/><circle cx="80" cy="80" r="70" fill="none" stroke="'+bandInfo.color+'" stroke-width="8" stroke-dasharray="'+circ+'" stroke-dashoffset="'+dashOff+'" stroke-linecap="round" style="transform:rotate(-90deg);transform-origin:80px 80px;transition:stroke-dashoffset 1s ease"/></svg><div class="score-gauge-text"><span class="score-gauge-number" style="color:'+bandInfo.color+'">'+result.score+'</span><span class="score-gauge-label">/100</span></div></div><div class="band-label" style="color:'+bandInfo.color+'">'+result.band+'</div><div class="band-subtitle">ICP Clarity Score for "'+escapeHtml(ventureName)+'"</div></div>';

  // ICP Profile Card
  html+='<div class="polished-card"><h3>Your ICP Profile</h3>';
  if(polished.who) html+='<div class="polished-section"><h4>Who They Are</h4><p>'+escapeHtml(polished.who)+'</p></div>';
  if(polished.pain) html+='<div class="polished-section"><h4>Key Pains</h4><p>'+escapeHtml(polished.pain)+'</p></div>';
  if(polished.dream_outcome) html+='<div class="polished-section"><h4>Dream Outcome</h4><p>'+escapeHtml(polished.dream_outcome)+'</p></div>';
  if(polished.where_to_find) html+='<div class="polished-section"><h4>Where to Find Them</h4><p>'+escapeHtml(polished.where_to_find)+'</p></div>';
  html+='</div>';

  // Dimension Scores
  html+='<div class="results-card"><h3>Dimension Scores</h3>';
  var dimLabels={who:'Customer Definition',pain:'Pain Clarity',dream:'Dream Outcome',journey:'Buyer Journey',access:'Access Channels',validation:'Validation Plan'};
  questions.forEach(function(q){var s=sections[q.id]||0;var c=s>=70?'var(--green)':s>=55?'var(--eo-orange)':s>=40?'var(--gold)':'var(--red)';html+='<div class="section-bar-row"><div class="section-bar-label">'+(dimLabels[q.id]||q.id)+'</div><div class="section-bar-track"><div class="section-bar-fill" style="width:'+s+'%;background:'+c+'"></div></div><div class="section-bar-score">'+s+'/100</div></div>';});
  html+='</div>';

  // Sharpen These
  if(weakAreas.length>0){html+='<div class="results-card"><h3>Sharpen These</h3>';weakAreas.forEach(function(w){html+='<div class="sharpen-card"><h4>'+escapeHtml(w.name)+' ('+w.score+'/100)</h4><p>'+escapeHtml(w.advice)+'</p></div>';});html+='</div>';}

  // CTA
  html+='<div class="results-cta"><button class="btn-primary" onclick="window.location.href=\'EO-Market-Attractiveness-Scoring.html\'">Continue to Market Attractiveness →</button><button class="btn-download-md" onclick="downloadMd()">Download Full Analysis (MD)</button><button class="btn-retake" onclick="retakeAssessment()">Retake Assessment</button></div>';

  document.getElementById('resultsContent').innerHTML=html;
  window.scrollTo({top:0,behavior:'smooth'});
}

// === MD DOWNLOAD ===
function downloadMd() {
  var result=getUpstreamResult(SC_NUMBER,userEmail,ventureSlug);if(!result)return;
  var dateStr=new Date().toISOString().split('T')[0];
  var md='# ICP Clarity — Full Analysis\n\n**Venture:** '+ventureName+'\n**Date:** '+dateStr+'\n**Clarity Score:** '+result.score+'/100 — '+result.band+'\n\n---\n\n';
  var p=result.polished_output||{};
  md+='## ICP Profile\n\n### Who They Are\n'+(p.who||'N/A')+'\n\n### Key Pains\n'+(p.pain||'N/A')+'\n\n### Dream Outcome\n'+(p.dream_outcome||'N/A')+'\n\n### Where to Find Them\n'+(p.where_to_find||'N/A')+'\n\n';
  md+='## Dimension Scores\n\n| Dimension | Score |\n|-----------|-------|\n';
  var labels={who:'Customer Definition',pain:'Pain Clarity',dream:'Dream Outcome',journey:'Buyer Journey',access:'Access Channels',validation:'Validation Plan'};
  var secs=result.sections||{};
  Object.keys(labels).forEach(function(k){md+='| '+labels[k]+' | '+(secs[k]||0)+'/100 |\n';});
  md+='\n## Areas to Sharpen\n\n';(result.weak_areas||[]).forEach(function(w){md+='### '+w.name+' ('+w.score+'/100)\n'+w.advice+'\n\n';});
  md+='---\n\n## Raw Answers\n\n';questions.forEach(function(q){md+='### '+q.text+'\n'+(answers[q.id]||'No answer')+'\n\n';});
  md+='---\n*Generated by Entrepreneurs Oasis MENA — ICP Clarity Scoring*\n';
  var blob=new Blob([md],{type:'text/markdown;charset=utf-8'});var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download='SC2-ICP-Clarity-'+ventureSlug+'-'+dateStr+'.md';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

function retakeAssessment() { answers={};localStorage.removeItem(storageKey('answers',SC_NUMBER,userEmail,ventureSlug));localStorage.removeItem(storageKey('result',SC_NUMBER,userEmail,ventureSlug));currentQ=0;showScreen('screenStepper');renderQuestion(); }

// === WEBHOOK ===
function sendToWebhook(scores, resultObj) {
  var upstream={};
  for(var i=1;i<SC_NUMBER;i++){upstream['sc'+i+'_score']=getScores(userEmail,ventureSlug)['sc'+i]||null;upstream['sc'+i+'_answers']=getUpstreamAnswers(i,userEmail,ventureSlug);}
  fetch('https://ai.mamounalamouri.smorchestra.com/webhook/eo-icp-score',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:userEmail,venture_name:ventureName,venture_slug:ventureSlug,scorecard:'SC2',answers:answers,scores:scores,upstream_data:upstream,timestamp:new Date().toISOString()})}).catch(function(err){console.warn('Webhook failed:',err);});
}

// === UTILITIES ===
function showScreen(id){document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});document.getElementById(id).classList.add('active');}
function countWords(t){if(!t||!t.trim())return 0;return t.trim().split(/\s+/).length;}
function escapeHtml(t){if(!t)return '';return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toggleRTL(){document.body.classList.toggle('rtl');var r=document.body.classList.contains('rtl');document.documentElement.lang=r?'ar':'en';document.documentElement.dir=r?'rtl':'ltr';try{localStorage.setItem('eo-rtl',r?'1':'0');}catch(e){}}

document.addEventListener('keydown',function(e){if(document.getElementById('screenStepper').classList.contains('active')&&e.key==='Enter'&&e.ctrlKey)nextQuestion();});
(function(){try{if(localStorage.getItem('eo-rtl')==='1'){document.body.classList.add('rtl');document.documentElement.lang='ar';document.documentElement.dir='rtl';}}catch(e){}})();
(function(){try{var e=localStorage.getItem('eo_user_email');if(e){var el=document.getElementById('auth-email');if(el&&!el.value)el.value=e;}}catch(e){}})();
</script>
