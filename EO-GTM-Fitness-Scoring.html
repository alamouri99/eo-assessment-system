<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrepreneurs Oasis MENA — GTM Fitness Scoring</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
    --eo-dark: #1A1A2E;
    --eo-orange: #E94D1B;
    --eo-beige: #FAF5EF;
    --eo-card-bg: #FFFFFF;
    --eo-gray-text: #6B7280;
    --eo-gray-border: #E5E7EB;
    --eo-shadow: 0 2px 8px rgba(0,0,0,0.08);
    --eo-radius: 12px;
    --eo-radius-sm: 8px;
    --eo-transition: 300ms ease;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--eo-dark);
    color: #FFFFFF;
    min-height: 100vh;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
}

/* Header */
.eo-header {
    text-align: center;
    padding: 28px 20px 12px;
}
.eo-header h1 {
    font-size: 22px;
    font-weight: 800;
    color: #FFFFFF;
}
.eo-header h1 span { color: var(--eo-orange); }

/* Section Label */
.section-label {
    font-size: 14px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #9CA3AF;
    text-align: center;
    margin-bottom: 4px;
}

/* Progress Bar */
.progress-wrapper {
    max-width: 640px;
    margin: 0 auto 24px;
    padding: 0 20px;
}
.progress-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
}
.progress-meta .section-label { margin-bottom: 0; text-align: left; }
.progress-counter {
    font-size: 13px;
    color: #9CA3AF;
    font-weight: 500;
}
.progress-track {
    width: 100%;
    height: 8px;
    background: #2D2D44;
    border-radius: 4px;
    overflow: hidden;
}
.progress-fill {
    height: 100%;
    background: var(--eo-orange);
    border-radius: 4px;
    transition: width var(--eo-transition);
    width: 0%;
}

/* Screens */
.screen { display: none; }
.screen.active { display: block; }

/* Welcome / Email Capture */
.email-capture {
    max-width: 480px;
    margin: 60px auto;
    padding: 0 20px;
    text-align: center;
    background: var(--eo-beige);
    border-radius: var(--eo-radius);
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
.email-capture h2 {
    font-size: 26px;
    font-weight: 800;
    color: var(--eo-dark);
    margin-bottom: 8px;
}
.email-capture p {
    color: var(--eo-gray-text);
    margin-bottom: 28px;
    font-size: 15px;
}
.email-capture input {
    width: 100%;
    padding: 14px 16px;
    border: 2px solid var(--eo-gray-border);
    border-radius: var(--eo-radius-sm);
    font-size: 15px;
    font-family: inherit;
    outline: none;
    transition: border-color var(--eo-transition);
    margin-bottom: 16px;
}
.email-capture input:focus { border-color: var(--eo-orange); }
.email-capture .btn-primary { width: 100%; }

/* Question Card */
.question-card {
    background: var(--eo-beige);
    border-radius: var(--eo-radius);
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    padding: 32px;
    max-width: 640px;
    margin: 0 auto;
    position: relative;
}
.question-card.shake {
    animation: shake 0.4s ease;
}
@keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-6px); }
    80% { transform: translateX(6px); }
}

.question-text {
    font-size: 22px;
    font-weight: 700;
    color: var(--eo-orange);
    text-align: center;
    margin-bottom: 28px;
    line-height: 1.35;
}

/* Options */
.options-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
}
.option-card {
    border: 2px solid var(--eo-gray-border);
    border-radius: var(--eo-radius-sm);
    padding: 16px 20px;
    cursor: pointer;
    font-size: 15px;
    font-weight: 500;
    color: var(--eo-dark);
    transition: border-color var(--eo-transition), background var(--eo-transition), color var(--eo-transition);
    user-select: none;
    line-height: 1.4;
}
.option-card:hover {
    border-color: var(--eo-orange);
}
.option-card.selected {
    background: var(--eo-orange);
    border-color: var(--eo-orange);
    color: #FFFFFF;
}
.option-card.focused {
    outline: 2px solid var(--eo-orange);
    outline-offset: 2px;
}

/* Nav Buttons */
.nav-buttons {
    display: flex;
    justify-content: space-between;
    align-items: center;
    max-width: 640px;
    margin: 24px auto 0;
    padding: 0 20px;
    gap: 12px;
}
.btn {
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    padding: 12px 28px;
    border-radius: var(--eo-radius-sm);
    cursor: pointer;
    transition: all var(--eo-transition);
    border: none;
    outline: none;
}
.btn-prev {
    background: transparent;
    border: 2px solid #FFFFFF;
    color: #FFFFFF;
}
.btn-prev:hover { background: rgba(255,255,255,0.15); color: #FFFFFF; }
.btn-prev.hidden { visibility: hidden; pointer-events: none; }
.btn-next {
    background: var(--eo-orange);
    color: #FFFFFF;
}
.btn-next:hover { background: #d4441a; }
.btn-next:disabled {
    opacity: 0.4;
    cursor: not-allowed;
}
.btn-primary {
    background: var(--eo-orange);
    color: #FFFFFF;
    font-size: 16px;
    font-weight: 700;
    padding: 14px 32px;
    border: none;
    border-radius: var(--eo-radius-sm);
    cursor: pointer;
    font-family: inherit;
    transition: all var(--eo-transition);
}
.btn-primary:hover { background: #d4441a; }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

/* Toast */
.toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-100px);
    background: var(--eo-dark);
    color: #fff;
    padding: 12px 24px;
    border-radius: var(--eo-radius-sm);
    font-size: 14px;
    font-weight: 500;
    z-index: 1000;
    transition: transform 0.4s ease;
    white-space: nowrap;
}
.toast.show {
    transform: translateX(-50%) translateY(0);
}

/* Contact Form */
.contact-screen {
    max-width: 480px;
    margin: 40px auto;
    padding: 0 20px;
}
.contact-card {
    background: var(--eo-beige);
    border-radius: var(--eo-radius);
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    padding: 32px;
}
.contact-card h2 {
    font-size: 22px;
    font-weight: 800;
    color: var(--eo-dark);
    text-align: center;
    margin-bottom: 6px;
}
.contact-card .subtitle {
    font-size: 14px;
    color: var(--eo-gray-text);
    text-align: center;
    margin-bottom: 24px;
}
.form-group {
    margin-bottom: 16px;
}
.form-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--eo-dark);
    margin-bottom: 6px;
}
.form-group input {
    width: 100%;
    padding: 12px 14px;
    border: 2px solid var(--eo-gray-border);
    border-radius: var(--eo-radius-sm);
    font-size: 15px;
    font-family: inherit;
    outline: none;
    transition: border-color var(--eo-transition);
}
.form-group input:focus { border-color: var(--eo-orange); }
.contact-card .btn-primary { width: 100%; margin-top: 8px; }
.skip-link {
    display: block;
    text-align: center;
    margin-top: 16px;
    font-size: 14px;
    color: var(--eo-gray-text);
    cursor: pointer;
    text-decoration: underline;
    background: none;
    border: none;
    font-family: inherit;
}
.skip-link:hover { color: var(--eo-orange); }

/* Loading Overlay */
.loading-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26, 26, 46, 0.95);
    z-index: 999;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    gap: 20px;
}
.loading-overlay.active { display: flex; }
.spinner {
    width: 48px;
    height: 48px;
    border: 4px solid var(--eo-gray-border);
    border-top-color: var(--eo-orange);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-overlay p {
    font-size: 16px;
    font-weight: 600;
    color: #FFFFFF;
}

/* Results Screen */
.results-screen {
    max-width: 640px;
    margin: 40px auto;
    padding: 0 20px 60px;
}

/* Score Hero */
.score-hero {
    background: var(--eo-beige);
    border-radius: var(--eo-radius);
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    padding: 40px 32px;
    text-align: center;
    margin-bottom: 24px;
}
.score-circle {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
    border: 6px solid;
}
.score-circle .score-number {
    font-size: 36px;
    font-weight: 800;
    line-height: 1;
}
.score-circle .score-total {
    font-size: 14px;
    font-weight: 500;
    color: var(--eo-gray-text);
}
.score-circle-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
}
.band-label {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 4px;
}
.band-subtitle {
    font-size: 14px;
    color: var(--eo-gray-text);
}
.band-desc {
    font-size: 14px;
    color: var(--eo-gray-text);
    margin-top: 12px;
    max-width: 520px;
    margin-left: auto;
    margin-right: auto;
    line-height: 1.6;
}

/* Band Colors */
.band-elite .score-circle { border-color: #22C55E; }
.band-elite .band-label { color: #22C55E; }
.band-elite .score-number { color: #22C55E; }

.band-strong .score-circle { border-color: #3B82F6; }
.band-strong .band-label { color: #3B82F6; }
.band-strong .score-number { color: #3B82F6; }

.band-emerging .score-circle { border-color: #F59E0B; }
.band-emerging .band-label { color: #F59E0B; }
.band-emerging .score-number { color: #F59E0B; }

.band-weak .score-circle { border-color: #EF4444; }
.band-weak .band-label { color: #EF4444; }
.band-weak .score-number { color: #EF4444; }

/* Motion Cards */
.results-card {
    background: var(--eo-beige);
    border-radius: var(--eo-radius);
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    padding: 28px;
    margin-bottom: 24px;
}
.results-card h3 {
    font-size: 17px;
    font-weight: 700;
    color: var(--eo-dark);
    margin-bottom: 20px;
}

.motion-rank {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
}
.motion-rank-number {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--eo-orange);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    flex-shrink: 0;
}
.motion-rank-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--eo-dark);
}
.motion-rank-score {
    margin-left: auto;
    font-size: 16px;
    font-weight: 700;
    color: var(--eo-orange);
}

.motion-detail-section {
    margin-bottom: 16px;
}
.motion-detail-section:last-child { margin-bottom: 0; }
.motion-detail-section strong {
    display: block;
    font-size: 13px;
    font-weight: 700;
    color: var(--eo-dark);
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}
.motion-detail-section p {
    font-size: 14px;
    color: var(--eo-gray-text);
    line-height: 1.6;
}

/* AI Section */
.ai-section {
    background: var(--eo-beige);
    border-radius: var(--eo-radius);
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    padding: 28px;
    margin-bottom: 24px;
    border-left: 4px solid var(--eo-orange);
}
.ai-section h3 {
    font-size: 17px;
    font-weight: 700;
    color: var(--eo-dark);
    margin-bottom: 12px;
}
.ai-badge {
    display: inline-block;
    background: var(--eo-orange);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 16px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}
.ai-insight {
    font-size: 15px;
    line-height: 1.6;
    color: var(--eo-dark);
    margin-bottom: 16px;
}
.ai-plan h4 {
    font-size: 15px;
    font-weight: 700;
    color: var(--eo-dark);
    margin-bottom: 8px;
}
.ai-plan p, .ai-plan li {
    font-size: 14px;
    color: var(--eo-gray-text);
    line-height: 1.6;
}
.ai-plan ul {
    padding-left: 20px;
    margin-bottom: 12px;
}
.ai-reco-list {
    list-style: none;
    padding: 0;
}
.ai-reco-list li {
    font-size: 14px;
    color: var(--eo-gray-text);
    padding: 8px 0 8px 20px;
    position: relative;
    line-height: 1.5;
    border-bottom: 1px solid var(--eo-gray-border);
}
.ai-reco-list li:last-child { border-bottom: none; }
.ai-reco-list li::before {
    content: '\2794';
    position: absolute;
    left: 0;
    color: var(--eo-orange);
}

/* CTA */
.results-cta {
    text-align: center;
    margin-top: 32px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    align-items: center;
}
.results-cta .btn-primary { min-width: 280px; }
.results-cta .btn-retake {
    background: transparent;
    border: 2px solid #FFFFFF;
    color: #FFFFFF;
    padding: 12px 28px;
    border-radius: var(--eo-radius-sm);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: all var(--eo-transition);
    min-width: 280px;
}
.results-cta .btn-retake:hover { background: rgba(255,255,255,0.15); color: #FFFFFF; }
.results-cta .btn-download-md {
    background: transparent;
    border: 2px solid var(--eo-orange);
    color: var(--eo-orange);
    padding: 12px 28px;
    border-radius: var(--eo-radius-sm);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: all var(--eo-transition);
    min-width: 280px;
}
.results-cta .btn-download-md:hover {
    background: var(--eo-orange);
    color: #FFFFFF;
}

/* Mobile */
@media (max-width: 680px) {
    .question-card { margin: 0 16px; padding: 24px 20px; }
    .nav-buttons { padding: 0 16px; }
    .question-text { font-size: 19px; }
    .progress-wrapper { padding: 0 16px; }
}
@media (max-width: 400px) {
    .nav-buttons { flex-direction: column; }
    .btn-prev.hidden { display: none; }
    .option-card { padding: 14px 16px; font-size: 14px; }
    .question-text { font-size: 18px; }
}
</style>
</head>
<body>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Loading Overlay -->
<div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <p>Analyzing your GTM motions...</p>
</div>

<!-- Header -->
<div class="eo-header">
    <h1>Entrepreneurs <span>Oasis MENA</span></h1>
</div>

<!-- Screen 1: Email Capture / Welcome -->
<div class="screen active" id="screenEmail">
    <div class="email-capture">
        <h2>GTM Fitness Scorecard</h2>
        <p>14 questions. 13 GTM motions. 3D scoring. Find your highest-probability go-to-market motions.</p>
        <input type="email" id="emailInput" placeholder="Enter your email to start" autocomplete="email">
        <button class="btn-primary" id="btnStartAssessment">Start Assessment</button>
    </div>
</div>

<!-- Screen 2: Stepper Questions -->
<div class="screen" id="screenStepper">
    <div class="progress-wrapper">
        <div class="progress-meta">
            <div class="section-label" id="sectionLabel">Section A: BUSINESS PROFILE</div>
            <div class="progress-counter" id="progressCounter">Question 1 of 14</div>
        </div>
        <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
        </div>
    </div>
    <div class="question-card" id="questionCard">
        <div class="question-text" id="questionText"></div>
        <div class="options-list" id="optionsList"></div>
    </div>
    <div class="nav-buttons">
        <button class="btn btn-prev hidden" id="btnPrev">Previous</button>
        <button class="btn btn-next" id="btnNext" disabled>Next</button>
    </div>
</div>

<!-- Screen 3: Contact Form -->
<div class="screen" id="screenContact">
    <div class="contact-screen">
        <div class="contact-card">
            <h2>Get Your GTM Playbook</h2>
            <p class="subtitle">Provide your details for a personalized GTM report</p>
            <div class="form-group">
                <label for="contactName">Full Name *</label>
                <input type="text" id="contactName" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label for="contactEmail">Email *</label>
                <input type="email" id="contactEmail" placeholder="john@company.com" required>
            </div>
            <div class="form-group">
                <label for="contactCompany">Company *</label>
                <input type="text" id="contactCompany" placeholder="Acme Corp" required>
            </div>
            <button class="btn-primary" id="btnSubmitContact">Get My GTM Playbook</button>
            <button class="skip-link" id="btnSkipContact">Skip &mdash; Show Results</button>
        </div>
    </div>
</div>

<!-- Screen 4: Results -->
<div class="screen" id="screenResults">
    <div class="results-screen" id="resultsContent"></div>
</div>

    /* ================================================================

    function scoreAllMotions() {
        scores = {};
        MOTIONS.forEach(function(motion) {
            var fit = calculateFit(motion.id);
            var readiness = calculateReadiness(motion.id);
            var mena = calculateMENA(motion.id);
            var composite = (fit * 0.4) + (readiness * 0.3) + (mena * 0.3);
            scores[motion.id] = { fit: fit, readiness: readiness, mena: mena, composite: composite };
        });
    }

    function calculateFit(motionId) {
        var fitScore = 2.5; // baseline

        // Q1 (index 0): Product Type
        var productType = getTag(0);
        if (productType === 'enterprise') {
            fitScore = { dream100: 5, x7x4x11: 4.5, signalsniper: 4, trust: 4.5 }[motionId] || fitScore;
        } else if (productType === 'sme') {
            fitScore = { authorityedu: 4.5, outcomeDemo: 4.5, bofu: 4, signalsniper: 4 }[motionId] || fitScore;
        } else if (productType === 'b2c') {
            fitScore = { paid: 4.5, waveride: 4, buildin: 4.5, waitlist: 4 }[motionId] || fitScore;
        } else if (productType === 'marketplace') {
            fitScore = { ltd: 4, waitlist: 4.5, hammering: 3.5, waveride: 4 }[motionId] || fitScore;
        }

        // Q2 (index 1): Sales Cycle
        var cycle = getTag(1);
        if (cycle === 'transactional') {
            var trans = { outcomeDemo: 4.5, paid: 4.5, ltd: 4.5, waitlist: 4 };
            fitScore = trans[motionId] !== undefined ? Math.max(fitScore, trans[motionId]) : fitScore;
        } else if (cycle === 'short') {
            var short_ = { signalsniper: 4.5, buildin: 4, authorityedu: 4 };
            fitScore = short_[motionId] !== undefined ? Math.max(fitScore, short_[motionId]) : fitScore;
        } else if (cycle === 'medium') {
            var med = { dream100: 4.5, x7x4x11: 4.5, trust: 4.5 };
            fitScore = med[motionId] !== undefined ? Math.max(fitScore, med[motionId]) : fitScore;
        } else if (cycle === 'long') {
            var long_ = { dream100: 5, x7x4x11: 4.5, trust: 4 };
            fitScore = long_[motionId] !== undefined ? Math.max(fitScore, long_[motionId]) : fitScore;
        }

        // Q3 (index 2): Discovery Method
        var discovery = getTag(2);
        if (discovery === 'search') {
            fitScore = { bofu: 4.8, paid: 4.2 }[motionId] !== undefined ? Math.max(fitScore, { bofu: 4.8, paid: 4.2 }[motionId]) : fitScore;
        } else if (discovery === 'peers') {
            fitScore = { dream100: 4.8, trust: 4.5 }[motionId] !== undefined ? Math.max(fitScore, { dream100: 4.8, trust: 4.5 }[motionId]) : fitScore;
        } else if (discovery === 'social') {
            fitScore = { buildin: 4.5, authorityedu: 4.5, waveride: 4.2 }[motionId] !== undefined ? Math.max(fitScore, { buildin: 4.5, authorityedu: 4.5, waveride: 4.2 }[motionId]) : fitScore;
        } else if (discovery === 'events') {
            fitScore = { waitlist: 4.2, authorityedu: 4 }[motionId] !== undefined ? Math.max(fitScore, { waitlist: 4.2, authorityedu: 4 }[motionId]) : fitScore;
        }

        // Q4 (index 3): Visual Before/After
        var visual = getTag(3);
        if (visual === 'dramatic' || visual === 'metrics') {
            fitScore = { outcomeDemo: 4.8, paid: 4.3 }[motionId] !== undefined ? Math.max(fitScore, { outcomeDemo: 4.8, paid: 4.3 }[motionId]) : fitScore;
        } else if (visual === 'operational' || visual === 'conceptual') {
            fitScore = { dream100: 4, x7x4x11: 4, signalsniper: 3.8, trust: 4, authorityedu: 4.2 }[motionId] !== undefined ? Math.max(fitScore, { dream100: 4, x7x4x11: 4, signalsniper: 3.8, trust: 4, authorityedu: 4.2 }[motionId]) : fitScore;
        }

        // Q5 (index 4): Team Size
        var team = getTag(4);
        if (team === 'solo') {
            fitScore = { buildin: 4.8, authorityedu: 4.5, bofu: 4.2 }[motionId] !== undefined ? Math.max(fitScore, { buildin: 4.8, authorityedu: 4.5, bofu: 4.2 }[motionId]) : fitScore;
        } else if (team === 'small') {
            fitScore = { signalsniper: 4.2, outcomeDemo: 4.2, waitlist: 4 }[motionId] !== undefined ? Math.max(fitScore, { signalsniper: 4.2, outcomeDemo: 4.2, waitlist: 4 }[motionId]) : fitScore;
        } else if (team === 'large') {
            fitScore = { x7x4x11: 4.8, dream100: 4.5, paid: 4.5 }[motionId] !== undefined ? Math.max(fitScore, { x7x4x11: 4.8, dream100: 4.5, paid: 4.5 }[motionId]) : fitScore;
        }

        // Q6 (index 5): Budget
        var budget = getTag(5);
        if (budget === 'minimal') {
            fitScore = { buildin: 4.8, bofu: 4.5, authorityedu: 4.3 }[motionId] !== undefined ? Math.max(fitScore, { buildin: 4.8, bofu: 4.5, authorityedu: 4.3 }[motionId]) : fitScore;
        } else if (budget === 'moderate') {
            fitScore = { signalsniper: 4.3, outcomeDemo: 4.2, ltd: 4 }[motionId] !== undefined ? Math.max(fitScore, { signalsniper: 4.3, outcomeDemo: 4.2, ltd: 4 }[motionId]) : fitScore;
        } else if (budget === 'substantial') {
            fitScore = { paid: 4.5, waveride: 4.3, waitlist: 4.2 }[motionId] !== undefined ? Math.max(fitScore, { paid: 4.5, waveride: 4.3, waitlist: 4.2 }[motionId]) : fitScore;
        } else if (budget === 'unlimited') {
            fitScore = Math.max(fitScore, 4.5);
        }

        return Math.min(fitScore, 5);
    }

    function calculateReadiness(motionId) {
        var readinessScore = 2;

        // Q8 (index 7): Audience
        var audience = getTag(7);
        var audienceBoosts = { dream100: 0.8, authorityedu: 1, buildin: 1, waitlist: 1, trust: 0.8 };
        if (audience === 'large') readinessScore += (audienceBoosts[motionId] || 0);
        else if (audience === 'medium') readinessScore += (audienceBoosts[motionId] || 0) * 0.6;
        else if (audience === 'small') readinessScore += (audienceBoosts[motionId] || 0) * 0.3;

        // Q9 (index 8): Outbound Infrastructure
        var outbound = getTag(8);
        var outboundBoosts = { signalsniper: 1, x7x4x11: 1, dream100: 0.8 };
        if (outbound === 'operational') readinessScore += (outboundBoosts[motionId] || 0);
        else if (outbound === 'partial') readinessScore += (outboundBoosts[motionId] || 0) * 0.5;

        // Q10 (index 9): Case Studies/Demos
        var caseStudies = getTag(9);
        var caseBoosts = { outcomeDemo: 1, authorityedu: 0.8, trust: 0.8 };
        if (caseStudies === 'full') readinessScore += (caseBoosts[motionId] || 0);
        else if (caseStudies === 'partial') readinessScore += (caseBoosts[motionId] || 0) * 0.6;
        else if (caseStudies === 'demo') readinessScore += (caseBoosts[motionId] || 0) * 0.3;

        // Q11 (index 10): Content Creation
        var content = getTag(10);
        var contentBoosts = { buildin: 1.2, authorityedu: 1, waveride: 0.8 };
        if (content === 'prolific') readinessScore += (contentBoosts[motionId] || 0);
        else if (content === 'regular') readinessScore += (contentBoosts[motionId] || 0) * 0.7;
        else if (content === 'sporadic') readinessScore += (contentBoosts[motionId] || 0) * 0.3;

        // Q12 (index 11): Network
        var network = getTag(11);
        var networkBoosts = { dream100: 1, x7x4x11: 0.8, trust: 0.8 };
        if (network === 'strong') readinessScore += (networkBoosts[motionId] || 0);
        else if (network === 'moderate') readinessScore += (networkBoosts[motionId] || 0) * 0.6;
        else if (network === 'weak') readinessScore += (networkBoosts[motionId] || 0) * 0.3;

        // Q13 (index 12): Paid Ads Experience
        var adExp = getTag(12);
        var adBoosts = { paid: 1, waveride: 0.8 };
        if (adExp === 'proven') readinessScore += (adBoosts[motionId] || 0);
        else if (adExp === 'experienced') readinessScore += (adBoosts[motionId] || 0) * 0.7;
        else if (adExp === 'knowledge') readinessScore += (adBoosts[motionId] || 0) * 0.3;

        // Q14 (index 13): Landing Page
        var lp = getTag(13);
        var lpBoosts = { waitlist: 0.8, paid: 0.8, ltd: 0.8 };
        if (lp === 'complete') readinessScore += (lpBoosts[motionId] || 0);
        else if (lp === 'partial') readinessScore += (lpBoosts[motionId] || 0) * 0.5;

        return Math.min(Math.max(readinessScore, 0), 5);
    }

    function calculateMENA(motionId) {
        var geo = getTag(6); // Q7 (index 6): Geography
        var menaScore = MENA_BASE[motionId] || 3;

        if (geo === 'mena-primary') return Math.min(menaScore + 1, 5);
        if (geo === 'mena-broad') return Math.min(menaScore + 0.5, 5);
        if (geo === 'global-west') return Math.max(menaScore - 1, 1);

        return menaScore;
    }

    /* ================================================================
       OVERALL SCORE + BAND
       ================================================================ */
    function getOverallScore() {
        var allScores = [];
        MOTIONS.forEach(function(m) {
            allScores.push(scores[m.id].composite);
        });
        var avg = allScores.reduce(function(a, b) { return a + b; }, 0) / allScores.length;
        return Math.min(Math.round(avg * 20), 100);
    }

    function getBand(score) {
        if (score >= 80) return { label: 'ELITE', className: 'band-elite' };
        if (score >= 60) return { label: 'STRONG', className: 'band-strong' };
        if (score >= 40) return { label: 'EMERGING', className: 'band-emerging' };
        return { label: 'WEAK', className: 'band-weak' };
    }

                showScreen('screenStepper');
                renderQuestion();
            }
        } catch (e) { /* show email screen as fallback */ }

    function loadAnswers() {
        try {
            var saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                answers = JSON.parse(saved);
            }
        } catch (e) {
            answers = {};
        }
    }

    function saveAnswers() {
        try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(answers));
        } catch (e) { /* silent */ }
    }

    function findFirstUnanswered() {
        for (var i = 0; i < allQuestions.length; i++) {
            if (!(allQuestions[i].id in answers)) return i;
        }
        return allQuestions.length - 1;
    }

        $btnSkipContact.addEventListener('click', skipContact);

       ================================================================ */
    function showScreen(id) {
        var screens = document.querySelectorAll('.screen');
        for (var i = 0; i < screens.length; i++) {
            screens[i].classList.remove('active');
        }
        document.getElementById(id).classList.add('active');

       ================================================================ */

    }

    /* ================================================================
       EMAIL CAPTURE
       ================================================================ */
    function startAssessment() {
        var email = $emailInput.value.trim().toLowerCase();
        if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
            $emailInput.style.borderColor = '#EF4444';
            $emailInput.focus();
            return;
        }
        capturedEmail = email;
        $emailInput.style.borderColor = '';

        /* Persist email for cross-scorecard auth */
        try { localStorage.setItem('eo_user_email', email); } catch (e) { /* silent */ }

        if (Object.keys(answers).length > 0) {
            currentIndex = findFirstUnanswered();
            showToast('Welcome back! Resuming where you left off.');
        } else {
            currentIndex = 0;
        }

        showScreen('screenStepper');
        renderQuestion();
    }

    /* ================================================================
       RENDER QUESTION
       ================================================================ */
    function renderQuestion() {
        var q = allQuestions[currentIndex];
        var section = SECTIONS[q.sectionIdx];
        focusedOptionIndex = -1;

        $sectionLabel.textContent = 'Section ' + section.id + ': ' + section.name;
        $progressCounter.textContent = 'Question ' + (currentIndex + 1) + ' of ' + allQuestions.length;
        $progressFill.style.width = ((currentIndex + 1) / allQuestions.length * 100) + '%';
        $questionText.textContent = q.text;

        $optionsList.innerHTML = '';
        q.options.forEach(function(opt, idx) {
            var div = document.createElement('div');
            div.className = 'option-card';
            div.textContent = opt.label;
            div.setAttribute('data-index', idx);
            if (answers[q.id] === idx) {
                div.classList.add('selected');
            }
            div.addEventListener('click', function() { selectOption(idx); });
            $optionsList.appendChild(div);
        });

        if (currentIndex === 0) {
            $btnPrev.classList.add('hidden');
        } else {
            $btnPrev.classList.remove('hidden');
        }

        var isLast = currentIndex === allQuestions.length - 1;
        $btnNext.textContent = isLast ? 'Submit Assessment' : 'Next';
        $btnNext.disabled = !(q.id in answers);
    }

    /* ================================================================
       SELECT OPTION
       ================================================================ */
    function selectOption(idx) {
        var q = allQuestions[currentIndex];
        answers[q.id] = idx;
        saveAnswers();

        var cards = $optionsList.querySelectorAll('.option-card');
        for (var i = 0; i < cards.length; i++) {
            cards[i].classList.remove('selected');
        }
        cards[idx].classList.add('selected');
        focusedOptionIndex = idx;

        $btnNext.disabled = false;

        var isLast = currentIndex === allQuestions.length - 1;
        if (!isLast) {
            clearAutoAdvance();
            autoAdvanceTimer = setTimeout(function() { nextQuestion(); }, 300);
        }
    }

    function clearAutoAdvance() {
        if (autoAdvanceTimer) {
            clearTimeout(autoAdvanceTimer);
            autoAdvanceTimer = null;
        }
    }

    /* ================================================================
       NAVIGATION
       ================================================================ */
    function nextQuestion() {
        var q = allQuestions[currentIndex];
        if (!(q.id in answers)) {
            $questionCard.classList.add('shake');
            setTimeout(function() { $questionCard.classList.remove('shake'); }, 400);
            return;
        }

        if (currentIndex === allQuestions.length - 1) {
            // Score before showing contact form
            scoreAllMotions();
            showScreen('screenContact');
            if (capturedEmail) {
                document.getElementById('contactEmail').value = capturedEmail;
            }
            return;
        }

        currentIndex++;
        renderQuestion();
    }

    function prevQuestion() {
        clearAutoAdvance();
        if (currentIndex > 0) {
            currentIndex--;
            renderQuestion();
        }
    }

    /* ================================================================
       KEYBOARD
       ================================================================ */
    function handleKeyboard(e) {
        if (!document.getElementById('screenStepper').classList.contains('active')) return;

        var cards = $optionsList.querySelectorAll('.option-card');
        var numOpts = cards.length;
        if (numOpts === 0) return;

        switch (e.key) {
            case 'ArrowDown':
                e.preventDefault();
                focusedOptionIndex = (focusedOptionIndex + 1) % numOpts;
                updateFocus(cards);
                break;
            case 'ArrowUp':
                e.preventDefault();
                focusedOptionIndex = focusedOptionIndex <= 0 ? numOpts - 1 : focusedOptionIndex - 1;
                updateFocus(cards);
                break;
            case 'Enter':
                e.preventDefault();
                if (focusedOptionIndex >= 0 && focusedOptionIndex < numOpts) {
                    selectOption(focusedOptionIndex);
                }
                break;
            case 'ArrowRight':
                e.preventDefault();
                nextQuestion();
                break;
            case 'ArrowLeft':
                e.preventDefault();
                prevQuestion();
                break;
        }
    }

    function updateFocus(cards) {
        for (var i = 0; i < cards.length; i++) {
            cards[i].classList.remove('focused');
        }
        if (focusedOptionIndex >= 0 && focusedOptionIndex < cards.length) {
            cards[focusedOptionIndex].classList.add('focused');
            cards[focusedOptionIndex].scrollIntoView({ block: 'nearest' });
        }
    }

    /* ================================================================
       WEBHOOK PAYLOAD
       ================================================================ */
    function buildWebhookPayload(contact) {
        var answersPayload = {};
        allQuestions.forEach(function(q) {
            if (q.id in answers) {
                answersPayload[q.id] = q.options[answers[q.id]].value;
            }
        });

        var motionScores = {};
        MOTIONS.forEach(function(m) {
            var s = scores[m.id];
            motionScores[m.id] = {
                fit: Math.round(s.fit * 100) / 100,
                readiness: Math.round(s.readiness * 100) / 100,
                mena: Math.round(s.mena * 100) / 100,
                composite: Math.round(s.composite * 100) / 100
            };
        });

        var totalScore = getOverallScore();
        var band = getBand(totalScore);

        return {
            assessment: 'gtm-fitness',
            answers: answersPayload,
            motion_scores: motionScores,
            total_score: totalScore,
            band: band.label,
            contact: contact
        };
    }

    /* ================================================================
       CONTACT FORM
       ================================================================ */
    function submitContact() {
        var nameEl = document.getElementById('contactName');
        var emailEl = document.getElementById('contactEmail');
        var companyEl = document.getElementById('contactCompany');
        var name = nameEl.value.trim();
        var email = emailEl.value.trim().toLowerCase();
        var company = companyEl.value.trim();

        var valid = true;
        if (!name) { nameEl.style.borderColor = '#EF4444'; valid = false; } else { nameEl.style.borderColor = ''; }
        if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { emailEl.style.borderColor = '#EF4444'; valid = false; } else { emailEl.style.borderColor = ''; }
        if (!company) { companyEl.style.borderColor = '#EF4444'; valid = false; } else { companyEl.style.borderColor = ''; }
        if (!valid) return;

        capturedEmail = email;
        /* Persist email for cross-scorecard auth */
        try { localStorage.setItem('eo_user_email', email); } catch (e) { /* silent */ }
        var contact = { name: name, email: email, company: company };
        var payload = buildWebhookPayload(contact);

        $loadingOverlay.classList.add('active');

        fetch(WEBHOOK_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
        .then(function(resp) {
            if (!resp.ok) throw new Error('Webhook returned ' + resp.status);
            return resp.json();
        })
        .then(function(data) {
            if (data && data.success && data.results && data.results.ai_analysis) {
                aiData = data.results.ai_analysis;
            }
            $loadingOverlay.classList.remove('active');
            showResults();
        })
        .catch(function(err) {
            console.error('Webhook error:', err);
            $loadingOverlay.classList.remove('active');
            showResults();
        });
    }

    function skipContact() {
        aiData = null;
        showResults();
    }

    /* ================================================================
       RESULTS DISPLAY
       ================================================================ */
    function saveCompletionStatus(scoreId, score) {
        try {
            var status = JSON.parse(localStorage.getItem('eo_completion_status') || '{}');
            status[scoreId] = { score: score, date: new Date().toISOString().split('T')[0] };
            localStorage.setItem('eo_completion_status', JSON.stringify(status));
        } catch (e) { /* silent */ }
    }

    function showResults() {
        var totalScore = getOverallScore();
        var band = getBand(totalScore);

        /* Save score for dashboard */
        saveCompletionStatus('gtm', totalScore);

        var html = '';

        /* Score Hero */
        html += '<div class="score-hero ' + band.className + '">';
        html += '<div class="score-circle">';
        html += '<div class="score-circle-inner">';
        html += '<span class="score-number">' + totalScore + '</span>';
        html += '<span class="score-total">/ 100</span>';
        html += '</div></div>';
        html += '<div class="band-label">' + band.label + '</div>';
        html += '<div class="band-subtitle">GTM Fitness Score</div>';
        html += '<p class="band-desc">' + escapeHtml(BAND_DESCRIPTIONS[band.label]) + '</p>';
        html += '</div>';

        /* Rank motions by composite score */
        var ranked = MOTIONS.map(function(m) {
            return {
                id: m.id,
                name: m.name,
                fit: scores[m.id].fit,
                readiness: scores[m.id].readiness,
                mena: scores[m.id].mena,
                composite: scores[m.id].composite
            };
        }).sort(function(a, b) { return b.composite - a.composite; });

        /* Top 3 GTM Motions */
        var top3 = ranked.slice(0, 3);
        html += '<div class="results-card"><h3>Your Top 3 GTM Motions</h3>';
        top3.forEach(function(m, idx) {
            var pct = Math.round(m.composite / 5 * 100);
            html += '<div style="margin-bottom:' + (idx < 2 ? '28px' : '0') + ';">';
            html += '<div class="motion-rank">';
            html += '<div class="motion-rank-number">' + (idx + 1) + '</div>';
            html += '<div class="motion-rank-title">' + escapeHtml(m.name) + '</div>';
            html += '<div class="motion-rank-score">' + pct + '%</div>';
            html += '</div>';

            html += '<div class="motion-detail-section"><strong>Why This Motion</strong>';
            html += '<p>' + escapeHtml(MOTION_WHY[m.id] || '') + '</p></div>';

            html += '<div class="motion-detail-section"><strong>30-Day Plan</strong>';
            html += '<p>' + escapeHtml(MOTION_PLANS[m.id] || '') + '</p></div>';

            html += '<div class="motion-detail-section"><strong>Tools</strong>';
            html += '<p>' + escapeHtml(MOTION_TOOLS[m.id] || '') + '</p></div>';

            html += '<div class="motion-detail-section"><strong>MENA Tip</strong>';
            html += '<p>' + escapeHtml(MOTION_MENA_TIPS[m.id] || '') + '</p></div>';

            html += '</div>';
        });
        html += '</div>';

        /* AI Enhanced Section */
        if (aiData) {
            html += '<div class="ai-section">';
            html += '<span class="ai-badge">Advanced Analysis & Recommendation</span>';

            if (aiData.keyInsight || aiData.key_insight) {
                html += '<h3>Key Insight</h3>';
                html += '<p class="ai-insight">' + escapeHtml(aiData.keyInsight || aiData.key_insight) + '</p>';
            }

            if (aiData.sequencing) {
                html += '<div class="ai-plan">';
                html += '<h4>Recommended Sequencing</h4>';
                html += '<p>' + escapeHtml(aiData.sequencing) + '</p>';
                html += '</div>';
            }

            if (aiData.primaryMotions && aiData.primaryMotions.length > 0) {
                html += '<h3>AI Motion Recommendations</h3>';
                html += '<ul class="ai-reco-list">';
                aiData.primaryMotions.forEach(function(m) {
                    html += '<li><strong>' + escapeHtml(m.name || '') + '</strong>: ' + escapeHtml(m.why || m.plan || '') + '</li>';
                });
                html += '</ul>';
            }

            if (aiData.menaInsight || aiData.mena_insight) {
                html += '<div class="ai-plan" style="margin-top:16px;">';
                html += '<h4>MENA Insight</h4>';
                html += '<p>' + escapeHtml(aiData.menaInsight || aiData.mena_insight) + '</p>';
                html += '</div>';
            }

            html += '<p style="margin-top:16px;font-size:13px;color:var(--eo-gray-text);">Your results have been saved for your records.</p>';
            html += '</div>';
        }

        /* CTA */
        html += '<div class="results-cta">';
        html += '<a href="https://www.linkedin.com/groups/13121095/" target="_blank" class="btn-primary" style="display:inline-block;text-decoration:none;text-align:center;">Join MENA MicroSaaS Movement</a>';
        html += '<button class="btn-download-md" id="btnDownloadMd">Download Results (MD)</button>';
        html += '<button class="btn-retake" id="btnRetake">Retake Assessment</button>';
        html += '</div>';

        $resultsContent.innerHTML = html;
        showScreen('screenResults');
        window.scrollTo({ top: 0, behavior: 'smooth' });

        /* Bind retake + download */
        document.getElementById('btnRetake').addEventListener('click', retakeAssessment);
        document.getElementById('btnDownloadMd').addEventListener('click', generateMarkdownExport);
    }

    function escapeHtml(text) {
        var div = document.createElement('div');
        div.appendChild(document.createTextNode(text));
        return div.innerHTML;
    }

    /* ═══════════════════════════════════
       MARKDOWN EXPORT
       ═══════════════════════════════════ */
    function generateMarkdownExport() {
        var totalScore = getOverallScore();
        var band = getBand(totalScore);
        var today = new Date();
        var dateStr = today.getFullYear() + '-' +
            String(today.getMonth() + 1).padStart(2, '0') + '-' +
            String(today.getDate()).padStart(2, '0');

        var md = '';
        md += '# GTM Fitness Scorecard Results\n\n';
        md += '**Student:** ' + capturedEmail + '\n';
        md += '**Date:** ' + dateStr + '\n';
        md += '**Composite Score:** ' + totalScore + '/100 — ' + band.label + '\n';
        md += '**Scoring Formula:** Fit x 0.4 + Readiness x 0.3 + MENA x 0.3\n';
        md += '\n';

        md += '> ' + BAND_DESCRIPTIONS[band.label] + '\n\n';

        /* Top 3 GTM Motions */
        var ranked = MOTIONS.map(function(m) {
            return {
                id: m.id,
                name: m.name,
                fit: scores[m.id].fit,
                readiness: scores[m.id].readiness,
                mena: scores[m.id].mena,
                composite: scores[m.id].composite
            };
        }).sort(function(a, b) { return b.composite - a.composite; });

        var top3 = ranked.slice(0, 3);
        md += '## Top 3 GTM Motions\n\n';
        top3.forEach(function(m, idx) {
            var pct = Math.round(m.composite / 5 * 100);
            md += '### ' + (idx + 1) + '. ' + m.name + ' — ' + pct + '%\n\n';
            md += '| Component | Score |\n';
            md += '|-----------|-------|\n';
            md += '| Fit       | ' + (Math.round(m.fit * 100) / 100) + '/5 |\n';
            md += '| Readiness | ' + (Math.round(m.readiness * 100) / 100) + '/5 |\n';
            md += '| MENA      | ' + (Math.round(m.mena * 100) / 100) + '/5 |\n';
            md += '| **Composite** | **' + (Math.round(m.composite * 100) / 100) + '/5** |\n\n';
            md += '- **Why:** ' + (MOTION_WHY[m.id] || '') + '\n';
            md += '- **30-Day Plan:** ' + (MOTION_PLANS[m.id] || '') + '\n';
            md += '- **Tools:** ' + (MOTION_TOOLS[m.id] || '') + '\n';
            md += '- **MENA Tip:** ' + (MOTION_MENA_TIPS[m.id] || '') + '\n\n';
        });

        /* All 14 Questions with Selected Answers */
        md += '## Answers\n\n';
        var sectionNames = ['BUSINESS PROFILE', 'CAPABILITY PROFILE'];
        var qCounter = 0;
        SECTIONS.forEach(function(sec) {
            md += '### Section ' + sec.id + ': ' + sec.name + '\n\n';
            allQuestions.forEach(function(q) {
                if (q.sectionIdx !== (sec.id === 'A' ? 0 : 1)) return;
                qCounter++;
                var selectedIdx = answers[q.id];
                var opt = (selectedIdx !== undefined) ? q.options[selectedIdx] : null;
                var label = opt ? opt.label : 'No answer';
                var value = opt ? opt.value : '-';
                md += '- Q' + qCounter + ': ' + q.text + ' → ' + label + '\n';
            });
            md += '\n';
        });

        /* Full Motion Rankings */
        md += '## All Motion Rankings\n\n';
        md += '| Rank | Motion | Composite | Fit | Readiness | MENA |\n';
        md += '|------|--------|-----------|-----|-----------|------|\n';
        ranked.forEach(function(m, idx) {
            md += '| ' + (idx + 1) + ' | ' + m.name + ' | ' +
                (Math.round(m.composite * 100) / 100) + ' | ' +
                (Math.round(m.fit * 100) / 100) + ' | ' +
                (Math.round(m.readiness * 100) / 100) + ' | ' +
                (Math.round(m.mena * 100) / 100) + ' |\n';
        });
        md += '\n';

        /* Recommended Improvements for weak motions in top 3 */
        md += '## Recommended Improvements\n\n';
        var hasRecos = false;
        top3.forEach(function(m) {
            var weakAreas = [];
            if (m.fit < 3) weakAreas.push('Fit (' + (Math.round(m.fit * 100) / 100) + '/5)');
            if (m.readiness < 3) weakAreas.push('Readiness (' + (Math.round(m.readiness * 100) / 100) + '/5)');
            if (m.mena < 3) weakAreas.push('MENA (' + (Math.round(m.mena * 100) / 100) + '/5)');
            if (weakAreas.length > 0) {
                hasRecos = true;
                md += '### ' + m.name + '\n\n';
                md += '- **Weak areas:** ' + weakAreas.join(', ') + '\n';
                md += '- **Action:** ' + (MOTION_PLANS[m.id] || '') + '\n';
                md += '- **MENA Tip:** ' + (MOTION_MENA_TIPS[m.id] || '') + '\n';
                md += '\n**Claude Prompt:** "My top GTM motion is ' + m.name + ' but I scored low on ' + weakAreas.join(' and ') + '. Help me build a 30-day improvement plan for a MENA-based MicroSaaS founder."\n\n';
            }
        });
        if (!hasRecos) {
            md += 'All top 3 motions scored above 3/5 on every component. Great work!\n\n';
        }

        /* Create and trigger download */
        var blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = 'gtm-fitness-results-' + dateStr + '.md';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    function retakeAssessment() {
        answers = {};
        scores = {};
        currentIndex = 0;
        aiData = null;
        try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
        $emailInput.value = '';
        showScreen('screenEmail');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    /* ================================================================
       BOOT
       ================================================================ */
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }

})();
</script>
