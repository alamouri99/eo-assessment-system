<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrepreneurs Oasis MENA — Market Attractiveness Scoring</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root {
    --eo-dark: #050A12;
    --eo-orange: #FF6600;
    --eo-beige: #0C1220;
    --eo-card-bg: #111827;
    --eo-gray-text: #94A3B8;
    --eo-gray-border: rgba(255,255,255,0.06);
    --eo-shadow: 0 2px 8px rgba(0,0,0,0.3);
    --eo-radius: 14px;
    --eo-radius-sm: 8px;
    --eo-transition: 300ms ease;
    --green: #22C55E;
    --red: #EF4444;
    --gold: #D97706;
    --teal: #0D9488;
    --text: #FFFFFF;
    --text-2: #94A3B8;
    --text-3: #64748B;
    --surface: rgba(255,255,255,0.06);
    --border: rgba(255,255,255,0.06);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--eo-dark);
    color: #FFFFFF;
    min-height: 100vh;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
}

/* RTL Support */
body.rtl { direction: rtl; text-align: right; }
body.rtl .nav-buttons { flex-direction: row-reverse; }
body.rtl .section-bar-row { flex-direction: row-reverse; }
body.rtl .reco-list li { padding: 6px 24px 6px 0; }
body.rtl .progress-meta { flex-direction: row-reverse; }
body.rtl .option-card { text-align: right; }
body.rtl .dim-bar-row { flex-direction: row-reverse; }

/* RTL Toggle */
.rtl-toggle {
    position: fixed;
    top: 12px;
    right: 12px;
    z-index: 999;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    padding: 6px 14px;
    border-radius: var(--eo-radius-sm);
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    transition: all var(--eo-transition);
}
.rtl-toggle:hover { background: rgba(255,255,255,0.2); }

/* Header */
.eo-header {
    text-align: center;
    padding: 28px 20px 12px;
}
.eo-header h1 {
    font-size: 22px;
    font-weight: 800;
    color: #FFFFFF;
}
.eo-header h1 span { color: var(--eo-orange); }

/* Section Label */
.section-label {
    font-size: 14px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #9CA3AF;
    text-align: center;
    margin-bottom: 4px;
}

/* Progress Bar */
.progress-wrapper {
    max-width: 640px;
    margin: 0 auto 24px;
    padding: 0 20px;
}
.progress-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
}
.progress-counter {
    font-size: 13px;
    color: #9CA3AF;
}
.progress-track {
    height: 6px;
    background: #2D2D44;
    border-radius: 3px;
    overflow: hidden;
}
.progress-fill {
    height: 100%;
    background: var(--eo-orange);
    border-radius: 3px;
    transition: width 0.3s ease;
}

/* Screen Management */
.screen { display: none; }
.screen.active { display: block; }

/* Auth Screen */
.auth-screen {
    max-width: 480px;
    margin: 60px auto;
    padding: 0 20px;
    text-align: center;
}
.auth-screen h2 {
    font-size: 28px;
    font-weight: 800;
    margin-bottom: 8px;
}
.auth-screen p {
    color: #9CA3AF;
    font-size: 14px;
    margin-bottom: 24px;
    line-height: 1.5;
}
.intro-badge {
    display: inline-block;
    background: rgba(255,102,0,0.15);
    color: var(--eo-orange);
    font-size: 12px;
    font-weight: 700;
    padding: 6px 16px;
    border-radius: 20px;
    margin-bottom: 16px;
    letter-spacing: 1px;
}
.email-box {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: var(--eo-radius);
    padding: 28px 24px;
    text-align: left;
}
.email-box label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    color: var(--eo-orange);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
}
.email-input {
    width: 100%;
    padding: 14px 16px;
    border: 2px solid #2D2D44;
    border-radius: var(--eo-radius-sm);
    background: rgba(255,255,255,0.05);
    color: #fff;
    font-size: 16px;
    font-family: inherit;
    outline: none;
    transition: border-color var(--eo-transition);
    margin-bottom: 16px;
}
.email-input:focus { border-color: var(--eo-orange); }
.email-input::placeholder { color: #6B7280; }
.q-hint {
    font-size: 12px;
    color: var(--eo-gray-text);
    margin-top: -8px;
    margin-bottom: 16px;
    line-height: 1.4;
}
.btn-full {
    width: 100%;
    padding: 14px 32px;
    background: var(--eo-orange);
    color: #fff;
    border: none;
    border-radius: var(--eo-radius-sm);
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: background var(--eo-transition);
}
.btn-full:hover { background: #E65C00; }

/* Question Card */
.question-card {
    max-width: 640px;
    margin: 0 auto;
    padding: 28px 24px;
    background: var(--eo-beige);
    border-radius: var(--eo-radius);
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
.question-text {
    font-size: 20px;
    font-weight: 700;
    color: #FFFFFF;
    margin-bottom: 8px;
    line-height: 1.4;
}
.question-help {
    font-size: 13px;
    color: var(--eo-gray-text);
    margin-bottom: 20px;
    line-height: 1.5;
    font-style: italic;
}
.options-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
}
.option-card {
    background: var(--eo-card-bg);
    border: 2px solid var(--eo-gray-border);
    border-radius: var(--eo-radius-sm);
    padding: 16px 20px;
    cursor: pointer;
    font-size: 15px;
    font-weight: 500;
    color: #E2E8F0;
    transition: border-color var(--eo-transition), background var(--eo-transition), color var(--eo-transition);
    user-select: none;
    line-height: 1.4;
}
.option-card:hover {
    border-color: var(--eo-orange);
}
.option-card.selected {
    background: var(--eo-orange);
    border-color: var(--eo-orange);
    color: #FFFFFF;
}
.option-card.focused {
    outline: 2px solid var(--eo-orange);
    outline-offset: 2px;
}

/* Free-text Input */
.freetext-input {
    width: 100%;
    min-height: 160px;
    padding: 14px 16px;
    border: 2px solid var(--eo-gray-border);
    border-radius: var(--eo-radius-sm);
    font-family: inherit;
    font-size: 15px;
    color: #FFFFFF;
    resize: vertical;
    outline: none;
    background: var(--eo-card-bg);
    line-height: 1.5;
    transition: border-color var(--eo-transition);
}
.freetext-input:focus { border-color: var(--eo-orange); }
.freetext-input::placeholder { color: #9CA3AF; }

/* Char count */
.char-count {
    font-size: 12px;
    color: var(--eo-gray-text);
    text-align: right;
    margin-top: 6px;
}
.char-count.over { color: #EF4444; font-weight: 600; }

/* Navigation */
.nav-buttons {
    max-width: 640px;
    margin: 20px auto 60px;
    padding: 0 20px;
    display: flex;
    justify-content: space-between;
    gap: 12px;
}
.btn {
    padding: 12px 28px;
    border-radius: var(--eo-radius-sm);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    border: none;
    transition: all var(--eo-transition);
}
.btn-prev {
    background: rgba(255,255,255,0.1);
    color: #FFFFFF;
    border: 1px solid rgba(255,255,255,0.2);
}
.btn-prev:hover { background: rgba(255,255,255,0.2); }
.btn-prev.hidden { visibility: hidden; }
.btn-next {
    background: var(--eo-orange);
    color: #FFFFFF;
    margin-left: auto;
}
.btn-next:hover { background: #E65C00; }
.btn-next:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-primary {
    background: var(--eo-orange);
    color: #FFFFFF;
    border: none;
    padding: 14px 32px;
    border-radius: var(--eo-radius-sm);
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: background var(--eo-transition);
}
.btn-primary:hover { background: #E65C00; }
.btn-secondary {
    background: rgba(255,255,255,0.1);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.2);
    padding: 10px 20px;
    border-radius: var(--eo-radius-sm);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
}

/* Toast */
.toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: #1E293B;
    color: #FFFFFF;
    padding: 14px 28px;
    border-radius: var(--eo-radius-sm);
    font-size: 14px;
    font-weight: 500;
    z-index: 1000;
    opacity: 0;
    transition: all 0.3s ease;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Loading */
.loading-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26,26,46,0.9);
    z-index: 2000;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    gap: 20px;
}
.loading-overlay.active { display: flex; }
.spinner {
    width: 48px;
    height: 48px;
    border: 4px solid #2D2D44;
    border-top-color: var(--eo-orange);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-overlay p { font-size: 16px; font-weight: 500; }

/* Results */
.results-container {
    max-width: 720px;
    margin: 0 auto;
    padding: 0 20px 60px;
}

/* Gauge Ring */
.gauge-container {
    text-align: center;
    padding: 40px 20px 24px;
}
.gauge-svg {
    width: 180px;
    height: 180px;
}
.gauge-bg { fill: none; stroke: #2D2D44; stroke-width: 10; }
.gauge-fill { fill: none; stroke-width: 10; stroke-linecap: round; transition: stroke-dashoffset 1.5s ease; }
.gauge-score {
    font-size: 42px;
    font-weight: 800;
    fill: #FFFFFF;
    dominant-baseline: central;
    text-anchor: middle;
}
.gauge-label {
    font-size: 12px;
    fill: #9CA3AF;
    dominant-baseline: central;
    text-anchor: middle;
}
.band-label {
    font-size: 18px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-top: 16px;
    margin-bottom: 4px;
}
.band-subtitle {
    font-size: 14px;
    color: #9CA3AF;
}

/* Results Cards */
.results-card {
    background: rgba(255,255,255,0.06);
    border-radius: var(--eo-radius);
    padding: 24px;
    margin-bottom: 20px;
}
.results-card h3 {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 16px;
    color: #FFFFFF;
}

/* 4-Dimension Bars */
.dim-bar-row {
    display: flex;
    align-items: center;
    margin-bottom: 16px;
    gap: 12px;
}
.dim-bar-label {
    width: 150px;
    font-size: 13px;
    font-weight: 600;
    color: #D1D5DB;
    flex-shrink: 0;
}
.dim-bar-track {
    flex: 1;
    height: 14px;
    background: #2D2D44;
    border-radius: 7px;
    overflow: hidden;
}
.dim-bar-fill {
    height: 100%;
    border-radius: 7px;
    transition: width 0.8s ease;
}
.dim-bar-score {
    width: 50px;
    text-align: right;
    font-size: 14px;
    font-weight: 700;
    color: #D1D5DB;
    flex-shrink: 0;
}

/* Verdict Card */
.verdict-card {
    background: linear-gradient(135deg, rgba(255,102,0,0.12), rgba(255,102,0,0.04));
    border: 1px solid rgba(255,102,0,0.25);
    border-radius: var(--eo-radius);
    padding: 28px;
    margin-bottom: 20px;
    text-align: center;
}
.verdict-card h3 {
    font-size: 18px;
    font-weight: 800;
    color: var(--eo-orange);
    margin-bottom: 12px;
}
.verdict-text {
    font-size: 15px;
    color: #D1D5DB;
    line-height: 1.6;
}

/* Raise Score Cards */
.raise-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-left: 4px solid var(--eo-orange);
    border-radius: var(--eo-radius-sm);
    padding: 20px;
    margin-bottom: 14px;
}
.raise-card h4 {
    font-size: 14px;
    font-weight: 700;
    color: var(--eo-orange);
    margin-bottom: 8px;
}
.raise-card p {
    font-size: 13px;
    color: #D1D5DB;
    line-height: 1.6;
    margin-bottom: 0;
}
.raise-card .current-score {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 4px;
    margin-bottom: 8px;
}
.raise-card .current-score.low { background: rgba(239,68,68,0.15); color: #EF4444; }
.raise-card .current-score.mid { background: rgba(217,119,6,0.15); color: #D97706; }
.raise-card .current-score.ok { background: rgba(34,197,94,0.15); color: #22C55E; }

/* Section bars (in results) */
.section-bar-row {
    display: flex;
    align-items: center;
    margin-bottom: 14px;
    gap: 12px;
}
.section-bar-label {
    width: 140px;
    font-size: 13px;
    font-weight: 600;
    color: #D1D5DB;
    flex-shrink: 0;
}
.section-bar-track {
    flex: 1;
    height: 12px;
    background: #2D2D44;
    border-radius: 6px;
    overflow: hidden;
}
.section-bar-fill {
    height: 100%;
    border-radius: 6px;
    transition: width 0.5s ease;
}
.section-bar-score {
    width: 60px;
    text-align: right;
    font-size: 13px;
    font-weight: 600;
    color: #D1D5DB;
    flex-shrink: 0;
}

/* Upstream Panel */
.upstream-panel {
    max-width: 640px;
    margin: 0 auto 24px;
    padding: 0 20px;
}
.upstream-card {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: var(--eo-radius);
    padding: 24px;
    margin-bottom: 16px;
}
.upstream-card h3 {
    font-size: 15px;
    font-weight: 700;
    color: var(--eo-orange);
    margin-bottom: 12px;
}
.upstream-item {
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.06);
}
.upstream-item:last-child { border-bottom: none; }
.upstream-item .label {
    font-size: 11px;
    font-weight: 600;
    color: var(--eo-orange);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 2px;
}
.upstream-item .value {
    font-size: 13px;
    color: #D1D5DB;
    line-height: 1.4;
}
.upstream-confirm-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 16px;
    padding-top: 12px;
    border-top: 1px solid rgba(255,255,255,0.1);
}
.upstream-confirm-bar .confirm-label {
    font-size: 13px;
    color: #9CA3AF;
    flex: 1;
}
.btn-confirm {
    background: var(--eo-orange);
    color: #fff;
    border: none;
    padding: 8px 20px;
    border-radius: var(--eo-radius-sm);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: background var(--eo-transition);
}
.btn-confirm:hover { background: #E65C00; }

/* Engagement: Pattern Break Card */
.pattern-break {
    max-width: 640px;
    margin: 0 auto 24px;
    padding: 0 20px;
}
.pattern-break-card {
    background: linear-gradient(135deg, #1a1a1a, #0f0f0f);
    border-left: 4px solid var(--eo-orange);
    border-radius: var(--eo-radius-sm);
    padding: 20px 24px;
}
.pattern-break-card .pb-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--eo-orange);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
}
.pattern-break-card .pb-text {
    font-size: 14px;
    color: #D1D5DB;
    line-height: 1.6;
}

/* Engagement: Investment Signal */
.investment-signal {
    max-width: 640px;
    margin: 0 auto 16px;
    padding: 0 20px;
}
.investment-signal-card {
    background: rgba(255,102,0,0.08);
    border-radius: var(--eo-radius-sm);
    padding: 12px 16px;
    font-size: 12px;
    color: #D1D5DB;
    font-style: italic;
}

/* Engagement: Acknowledgment */
.acknowledgment {
    max-width: 640px;
    margin: 0 auto 16px;
    padding: 0 20px;
}
.acknowledgment-card {
    background: rgba(255,255,255,0.04);
    border-radius: var(--eo-radius-sm);
    padding: 12px 16px;
    font-size: 13px;
    color: #D1D5DB;
    font-style: italic;
    border-left: 3px solid var(--eo-orange);
}

/* Gate Warning */
.gate-warning {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: var(--eo-radius);
    padding: 20px;
    margin-bottom: 20px;
    text-align: center;
}
.gate-warning h3 { color: #EF4444; font-size: 16px; margin-bottom: 8px; }
.gate-warning p { color: #D1D5DB; font-size: 14px; }

/* CTA */
.results-cta {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    margin-top: 32px;
}
.results-cta a, .results-cta button {
    min-width: 280px;
    text-align: center;
}
.btn-download-md {
    background: transparent;
    border: 2px solid var(--eo-orange);
    color: var(--eo-orange);
    padding: 12px 28px;
    border-radius: var(--eo-radius-sm);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: all var(--eo-transition);
}
.btn-download-md:hover {
    background: var(--eo-orange);
    color: #FFFFFF;
}
.btn-retake {
    background: transparent;
    border: 2px solid #FFFFFF;
    color: #FFFFFF;
    padding: 12px 28px;
    border-radius: var(--eo-radius-sm);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: all var(--eo-transition);
}
.btn-retake:hover { background: rgba(255,255,255,0.15); }

/* Shake animation */
@keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-6px); }
    40%, 80% { transform: translateX(6px); }
}
.shake { animation: shake 0.4s ease; }

/* Mobile */
@media (max-width: 680px) {
    .question-card { margin: 0 16px; padding: 24px 20px; }
    .nav-buttons { padding: 0 16px; }
    .question-text { font-size: 18px; }
    .progress-wrapper { padding: 0 16px; }
    .freetext-input { min-height: 120px; }
    .upstream-panel { padding: 0 16px; }
    .pattern-break { padding: 0 16px; }
    .investment-signal { padding: 0 16px; }
    .acknowledgment { padding: 0 16px; }
    .dim-bar-label { width: 110px; font-size: 12px; }
    .auth-screen { padding: 0 16px; }
    .results-container { padding: 0 16px 60px; }
    .email-box { padding: 24px 20px; }
    scroll-margin-top: 120px;
}
@media (max-width: 400px) {
    .nav-buttons { flex-direction: column; }
    .btn-prev.hidden { display: none; }
    .option-card { padding: 14px 16px; font-size: 14px; }
    .question-text { font-size: 17px; }
    .dim-bar-row { flex-wrap: wrap; }
    .dim-bar-label { width: 100%; margin-bottom: -8px; }
}
</style>
</head>
<body>

<!-- RTL Toggle -->
<button class="rtl-toggle" onclick="toggleRTL()">EN / عربي</button>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Loading Overlay -->
<div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <p>Calculating your market analysis...</p>
</div>

<!-- Header -->
<div class="eo-header">
    <h1>Entrepreneurs <span>Oasis MENA</span></h1>
</div>

<!-- Screen 0: Auth -->
<div class="screen active" id="screenAuth">
    <div class="auth-screen">
        <div class="intro-badge">STEP 3 OF 5</div>
        <h2>Market <em>Attractiveness</em></h2>
        <p>6 questions. ~25 minutes. Validate your market with evidence.</p>

        <div class="email-box">
            <label>YOUR EMAIL</label>
            <input type="email" id="auth-email" class="email-input"
                   placeholder="founder@company.com" required>
            <button class="btn-full" onclick="handleEmailEntry()">
                Continue →
            </button>

            <div id="venture-selector" style="display:none;margin-top:16px"></div>

<script>
/* ═══════════════════════════════════════════════════

   6 Questions | Sections B-C | TYPE 2 RESULTS

(function() {
    'use strict';

    var SC_NUMBER = 3;
    var Q_MC = 1;
    var Q_FREETEXT = 2;

    /* ===================================
       SHARED PATTERNS (EXACT COPY)
       =================================== */
    function slugify(text) {
      return text
        .toString()
        .toLowerCase()
        .trim()
        .replace(/\s+/g, '-')
        .replace(/[^\w\-]+/g, '')
        .replace(/\-\-+/g, '-')
        .replace(/^-+/, '')
        .replace(/-+$/, '');
    }

    function getVentures(email) {
      try {
        return JSON.parse(localStorage.getItem('eo_ventures_' + email) || '[]');
      } catch(e) { return []; }
    }

    function saveVenture(email, ventureName) {
      var slug = slugify(ventureName);
      var ventures = getVentures(email);
      var existing = ventures.find(function(v) { return v.venture_slug === slug; });
      if (existing) {
        existing.last_active = new Date().toISOString().split('T')[0];
        localStorage.setItem('eo_ventures_' + email, JSON.stringify(ventures));
        return { venture_name: existing.venture_name, venture_slug: slug, isNew: false };
      }
      var venture = {
        venture_name: ventureName.trim(),
        venture_slug: slug,
        created_at: new Date().toISOString().split('T')[0],
        last_active: new Date().toISOString().split('T')[0]
      };
      ventures.push(venture);
      localStorage.setItem('eo_ventures_' + email, JSON.stringify(ventures));
      return { venture_name: venture.venture_name, venture_slug: slug, isNew: true };
    }

    function updateVentureActivity(email, slug) {
      var ventures = getVentures(email);
      var venture = ventures.find(function(v) { return v.venture_slug === slug; });
      if (venture) {
        venture.last_active = new Date().toISOString().split('T')[0];
        localStorage.setItem('eo_ventures_' + email, JSON.stringify(ventures));
      }
    }

    function storageKey(type, scNumber, email, ventureSlug) {
      return 'eo_sc' + scNumber + '_' + type + '_' + email + '_' + ventureSlug;
    }

    function getScores(email, ventureSlug) {
      try {
        return JSON.parse(localStorage.getItem('eo_scores_' + email + '_' + ventureSlug) || '{}');
      } catch(e) { return {}; }
    }

    function saveScore(email, ventureSlug, scNumber, score) {
      var scores = getScores(email, ventureSlug);
      scores['sc' + scNumber] = score;
      localStorage.setItem('eo_scores_' + email + '_' + ventureSlug, JSON.stringify(scores));
    }

    function getUpstreamAnswers(scNumber, email, ventureSlug) {
      try {
        return JSON.parse(localStorage.getItem(storageKey('answers', scNumber, email, ventureSlug)) || '{}');
      } catch(e) { return {}; }
    }

    function getUpstreamResult(scNumber, email, ventureSlug) {
      try {
        return JSON.parse(localStorage.getItem(storageKey('result', scNumber, email, ventureSlug)) || 'null');
      } catch(e) { return null; }
    }

    function migrateOldData() {
      for (var i = 0; i < localStorage.length; i++) {
        var key = localStorage.key(i);
        var match = key.match(/^eo_sc(\d)_answers_([^_]+@[^_]+\.[^_]+)$/);
        if (match) {
          var email = match[2];
          var scNum = match[1];
          var migrationNeeded = {};
          try { migrationNeeded = JSON.parse(localStorage.getItem('eo_migration_pending') || '{}'); } catch(e) {}
          if (!migrationNeeded[email]) migrationNeeded[email] = [];
          if (migrationNeeded[email].indexOf(parseInt(scNum)) === -1) {
            migrationNeeded[email].push(parseInt(scNum));
          }
          localStorage.setItem('eo_migration_pending', JSON.stringify(migrationNeeded));
        }
      }
    }

    function executeMigration(email, ventureNameVal) {
      var slug = slugify(ventureNameVal);
      for (var sc = 1; sc <= 5; sc++) {
        var oldAnswers = localStorage.getItem('eo_sc' + sc + '_answers_' + email);
        if (oldAnswers) {
          localStorage.setItem(storageKey('answers', sc, email, slug), oldAnswers);
          localStorage.removeItem('eo_sc' + sc + '_answers_' + email);
        }
        var oldResult = localStorage.getItem('eo_sc' + sc + '_result');
        if (oldResult) {
          localStorage.setItem(storageKey('result', sc, email, slug), oldResult);
          localStorage.removeItem('eo_sc' + sc + '_result');
        }
      }
      var oldScores = localStorage.getItem('eo-scores');
      if (oldScores) {
        localStorage.setItem('eo_scores_' + email + '_' + slug, oldScores);
        localStorage.removeItem('eo-scores');
      }
      saveVenture(email, ventureNameVal);
      var pending = {};
      try { pending = JSON.parse(localStorage.getItem('eo_migration_pending') || '{}'); } catch(e) {}
      delete pending[email];
      if (Object.keys(pending).length === 0) {
        localStorage.removeItem('eo_migration_pending');
      } else {
        localStorage.setItem('eo_migration_pending', JSON.stringify(pending));
      }
    }

    function showError(msg) {
      var el = document.getElementById('auth-error');

      el.style.display = 'block';

    /* ===================================
       STATE
       =================================== */
    var userEmail = '';

    var answers = {};

    /* DOM refs */

    /* ===================================

        { id: 'C', name: 'MARKET SIZE', fullName: 'Market Sizing & Growth' }

    var allQuestions = [
        /* ── SECTION B: EVIDENCE VALIDATION (40 pts) ── */
        {
            id: 'b1', sectionId: 'B', sectionIndex: 0,

            rubric: '15=Expert (3+ types, pitch-ready); 12=Very strong (3+ types, all named/specific); 9=Strong (2+ types, named sources); 6=Decent (2 types, some specificity); 3=Partial (1-2 types, vague); 2=Generic; 1=Assertion only; 0=Blank',

            help: 'Top-down or bottom-up math. Name your data sources. MENA-specific numbers are golden.',
            placeholder: 'e.g., "TAM: 50K SMBs in UAE need invoicing (Statista). SAM: 12K in professional services (my niche). SOM: 500 in Y1 at $100/mo = $600K ARR. Math: 12K × 4% conversion = ~500 customers."',
            rubric: '15=Expert (TAM/SAM/SOM with sources, MENA-specific, bottom-up math); 12=Very strong (all 3 levels, named sources); 9=Strong (TAM+SAM with some math); 6=Decent (rough estimates, some rationale); 3=Partial (TAM only, no narrowing); 2=Generic; 1=Assertion only; 0=Blank',
            dimension: 'sizing'
        },
        {

            help: 'Growth signals = tailwinds. What macro forces make this market grow? MENA-specific signals score highest.',

            rubric: '15=Expert (3+ signals, MENA-specific, named sources, timing); 12=Very strong (3+ signals, named sources); 9=Strong (2+ signals, named sources); 6=Decent (2 signals, some specificity); 3=Partial (1-2 signals, vague); 2=Generic; 1=Assertion only; 0=Blank',
            dimension: 'growth'

        {

            help: 'Think about what makes your position hard to replicate, especially in MENA.',
            options: [
                { label: 'Strong moat: proprietary data/tech + MENA-specific advantage + network effects + switching costs', score: 10 },
                { label: 'Good moat: 2-3 defensibility factors including some MENA advantage', score: 8 },

            dimension: 'growth'

    ];

    var RECOMMENDATIONS = {
        'B': [
            'Run 5+ buyer interviews using the "Mom Test" framework — record specific pain quotes.',

    };

    var ENGAGEMENT = {
        afterB: {

                if (total >= 40) return 'Moderate market signal. Some areas need strengthening before you commit resources. Let\'s review your results.';
                return 'Weak market signal. I\'d recommend revisiting your assumptions before investing significant time. Let\'s review what needs fixing.';

        investmentB: 'Why this matters: investors evaluate market attractiveness before product quality. A strong market with a mediocre product beats a mediocre market with a great product — every time.',

    /* ===================================

    function init() {
        $toast = document.getElementById('toast');

        $progressFill = document.getElementById('progressFill');
        $questionText = document.getElementById('questionText');
        $questionHelp = document.getElementById('questionHelp');
        $optionsList = document.getElementById('optionsList');
        $questionCard = document.getElementById('questionCard');
        $btnPrev = document.getElementById('btnPrev');
        $btnNext = document.getElementById('btnNext');
        $engagementSlot = document.getElementById('engagementSlot');
        $resultsContent = document.getElementById('resultsContent');
        $loadingOverlay = document.getElementById('loadingOverlay');

        $btnPrev.addEventListener('click', prevQuestion);
        $btnNext.addEventListener('click', nextQuestion);
        document.addEventListener('keydown', handleKeyboard);

        /* RTL restore */
        try {
            if (localStorage.getItem('eo-rtl') === '1') {
                document.body.classList.add('rtl');
                document.documentElement.lang = 'ar';
                document.documentElement.dir = 'rtl';

        try {

        /* Run migration check */
        migrateOldData();

    function showScreen(id) {

        for (var i = 0; i < screens.length; i++) screens[i].classList.remove('active');
        document.getElementById(id).classList.add('active');
    }

    function showToast(msg) {
        $toast.textContent = msg;
        $toast.classList.add('show');
        setTimeout(function() { $toast.classList.remove('show'); }, 3000);
    }

    /* ===================================
       AUTH: VENTURE SELECTOR (SC2-SC5 Pattern)
       =================================== */
    window.handleEmailEntry = function() {
        var email = document.getElementById('auth-email').value.trim().toLowerCase();
        if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
            showError('Please enter a valid email address');
            return;
        }

        userEmail = email;
        try { localStorage.setItem('eo_user_email', email); } catch(e) {}

        var ventures = getVentures(email);

        if (ventures.length === 0) {
            showError('No assessment found for this email. <a href="EO-Project-Definition-Scoring.html" style="color:var(--eo-orange)">Complete Step 1 first →</a>');
            return;
        }

        if (ventures.length === 1) {
            selectVenture(ventures[0]);
        } else {
            showVentureSelector(ventures);
        }
    };

    function showVentureSelector(ventures) {
        var selector = document.getElementById('venture-selector');
        selector.innerHTML = '<label style="display:block;font-size:11px;font-weight:700;color:var(--eo-orange);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;">SELECT VENTURE</label>' +
            '<select id="venture-select" class="email-input" onchange="handleVentureSelect()">' +
            '<option value="">— Choose your venture —</option>' +
            ventures.map(function(v) { return '<option value="' + v.venture_slug + '">' + v.venture_name + '</option>'; }).join('') +
            '</select>';
        selector.style.display = 'block';
    }

    window.handleVentureSelect = function() {
        var slug = document.getElementById('venture-select').value;
        if (!slug) return;
        var ventures = getVentures(userEmail);
        var venture = ventures.find(function(v) { return v.venture_slug === slug; });
        if (venture) selectVenture(venture);
    };

    function selectVenture(venture) {
        ventureSlug = venture.venture_slug;
        ventureName = venture.venture_name;
        updateVentureActivity(userEmail, ventureSlug);

        /* Check for existing results (retrieval) */
        var existingResult = getUpstreamResult(SC_NUMBER, userEmail, ventureSlug);
        if (existingResult) {
            showRetrievalBanner(existingResult);
        } else {
            checkPrerequisites();
        }
    }

    /* ===================================
       PREREQUISITE CHECK
       =================================== */

        var scores = getScores(userEmail, ventureSlug);
        var prerequisites = [1, 2];
        var names = { 1: 'Project Definition', 2: 'ICP Clarity' };
        var files = { 1: 'EO-Project-Definition-Scoring.html', 2: 'EO-ICP-Clarity-Scoring.html' };

        var missing = prerequisites.filter(function(n) { var s = scores['sc' + n]; return s === null || s === undefined; });

            var firstMissing = missing[0];

       UPSTREAM CONFIRMATION

    function showUpstreamConfirmation() {
        var panel = document.getElementById('upstreamConfirmPanel');
        var html = '';

        html += '<div style="text-align:center;margin-bottom:24px;">';
        html += '<h2 style="font-size:24px;font-weight:800;margin-bottom:8px;">Section A: Upstream Confirmation</h2>';

        if (upstreamPD && Object.keys(upstreamPD).length > 0) {
            html += '<div class="upstream-card">';
            html += '<h3>From SC1: Project Definition</h3>';
            var sc1Fields = [
                { key: 'niche', alt: 'b3', label: 'Niche & Sub-market' },
                { key: 'positioning', alt: 'c1', label: 'Positioning' },
                { key: 'mena_context', alt: '', label: 'MENA Context' },
                { key: 'product_vision', alt: 'd1', label: 'Product Vision' }
            ];
            sc1Fields.forEach(function(f) {
                var val = upstreamPD[f.key] || upstreamPD[f.alt] || '';
                if (val) {
                    html += '<div class="upstream-item">';
                    html += '<div class="label">' + f.label + '</div>';
                    html += '<div class="value">' + escapeHtml(val.substring(0, 300)) + '</div>';
                    html += '</div>';
                }
            });
            html += '</div>';
        }

        if (upstreamICP && Object.keys(upstreamICP).length > 0) {
            html += '<div class="upstream-card">';
            html += '<h3>From SC2: ICP Clarity</h3>';
            var sc2Fields = [
                { key: 'who', alt: 'a1', label: 'Customer Identity' },
                { key: 'pain', alt: 'b1', label: 'Top Pains' },
                { key: 'dream', alt: 'b2', label: 'Dream Outcome' },
                { key: 'access', alt: 'e1', label: 'Where to Find Them' }

    function findFirstUnanswered() {
        for (var i = 0; i < allQuestions.length; i++) {
            var q = allQuestions[i];
            if (q.type === Q_FREETEXT) {
                if (!answers[q.id] || !answers[q.id].trim()) return i;
            } else {
                if (!(q.id in answers)) return i;
            }
        }
        return allQuestions.length - 1;
    }

    /* ===================================
       ENGAGEMENT RENDERING
       =================================== */
    function renderEngagement() {
        $engagementSlot.innerHTML = '';
        var q = allQuestions[currentIndex];

        if (q.sectionId === 'C' && !engagementShown.afterB) {
            engagementShown.afterB = true;
            var scores = calculateSectionScores();
            var html = '';
            html += '<div class="pattern-break"><div class="pattern-break-card">';
            html += '<div class="pb-label">' + ENGAGEMENT.afterB.label + '</div>';
            html += '<div class="pb-text">' + ENGAGEMENT.afterB.getText(scores) + '</div>';
            html += '</div></div>';
            html += '<div class="investment-signal"><div class="investment-signal-card">';
            html += ENGAGEMENT.investmentB;
            html += '</div></div>';
            $engagementSlot.innerHTML = html;
            return;
        }

        if (currentIndex === allQuestions.length - 1 && !engagementShown.afterC) {
            engagementShown.afterC = true;
            var html2 = '';
            html2 += '<div class="pattern-break"><div class="pattern-break-card">';
            html2 += '<div class="pb-label">' + ENGAGEMENT.afterC.label + '</div>';
            html2 += '<div class="pb-text">' + ENGAGEMENT.afterC.getText(calculateSectionScores()) + '</div>';
            html2 += '</div></div>';
            html2 += '<div class="investment-signal"><div class="investment-signal-card">';
            html2 += 'You\'ve completed all 6 evidence-based questions. Your market verdict will synthesize evidence strength with market sizing to give you a clear signal.';
            html2 += '</div></div>';
            $engagementSlot.innerHTML = html2;
            return;
        }

        if (currentIndex > 0) {
            var prevQ = allQuestions[currentIndex - 1];
            var ack = getAcknowledgment(prevQ);
            if (ack) {
                $engagementSlot.innerHTML = '<div class="acknowledgment"><div class="acknowledgment-card">' + ack + '</div></div>';
            }
        }
    }

    function getAcknowledgment(q) {
        if (q.type === Q_MC) {
            var idx = answers[q.id];
            if (idx === undefined) return null;
            var opt = q.options[idx];
            var pct = opt.score / q.maxScore;
            if (pct >= 0.8) return 'That\'s specific. Most founders stay vague here — you gave me something I can actually work with.';
            if (pct < 0.4) return 'I need more from you here. The difference between a funded startup and a side project often hides in this answer.';
        } else if (q.type === Q_FREETEXT) {
            var text = answers[q.id] || '';
            var wc = countWords(text);
            if (wc > 80) return 'That\'s the kind of evidence that makes investors lean forward. You\'re proving, not guessing.';
            if (wc < 20 && wc > 0) return 'I need more from you here. Can you add specific names, numbers, or sources? Evidence beats assertion every time.';
        }
        return null;
    }

    /* ===================================
       RENDER QUESTION
       =================================== */
    function renderQuestion() {
        var q = allQuestions[currentIndex];
        var section = SECTIONS[q.sectionIndex];
        focusedOptionIndex = -1;

        $sectionLabel.textContent = 'Section ' + section.id + ': ' + section.name + ' — ' + section.fullName;
        $progressCounter.textContent = 'Question ' + (currentIndex + 1) + ' of ' + allQuestions.length;
        $progressFill.style.width = ((currentIndex + 1) / allQuestions.length * 100) + '%';
        $questionText.textContent = q.text;

        if (q.help) {
            $questionHelp.textContent = q.help;
            $questionHelp.style.display = 'block';
        } else {
            $questionHelp.style.display = 'none';
        }

        $optionsList.innerHTML = '';
        renderEngagement();

        if (q.type === Q_FREETEXT) {
            renderFreetextQuestion(q);
        } else {
            renderMcQuestion(q);
        }

        $btnPrev.classList.toggle('hidden', currentIndex === 0);
        $btnNext.textContent = currentIndex === allQuestions.length - 1 ? 'Submit Assessment' : 'Next';
    }

    function renderMcQuestion(q) {
        q.options.forEach(function(opt, idx) {
            var div = document.createElement('div');
            div.className = 'option-card';
            div.textContent = opt.label;
            div.setAttribute('data-index', idx);
            if (answers[q.id] === idx) div.classList.add('selected');
            div.addEventListener('click', function() { selectOption(idx); });
            $optionsList.appendChild(div);
        });
        $btnNext.disabled = !(q.id in answers);
    }

    function renderFreetextQuestion(q) {
        var ta = document.createElement('textarea');
        ta.className = 'freetext-input';
        ta.placeholder = q.placeholder || 'Type your answer here...';
        ta.rows = 5;
        ta.value = answers[q.id] || '';

        var charDiv = document.createElement('div');
        charDiv.className = 'char-count';
        var wc = countWords(ta.value);
        charDiv.textContent = wc + ' / ' + (q.wordLimit || 200) + ' words';

        ta.addEventListener('input', function() {
            var wc2 = countWords(ta.value);
            charDiv.textContent = wc2 + ' / ' + (q.wordLimit || 200) + ' words';
            charDiv.classList.toggle('over', wc2 > (q.wordLimit || 200));
            answers[q.id] = ta.value;
            saveAnswersToStorage();
            $btnNext.disabled = !ta.value.trim();
        });

        $optionsList.appendChild(ta);
        $optionsList.appendChild(charDiv);
        $btnNext.disabled = !(q.id in answers && answers[q.id] && answers[q.id].trim());
    }

    function countWords(text) {
        if (!text || !text.trim()) return 0;
        return text.trim().split(/\s+/).length;
    }

    /* ===================================
       SELECT OPTION
       =================================== */
    function selectOption(idx) {
        var q = allQuestions[currentIndex];
        answers[q.id] = idx;
        saveAnswersToStorage();
        var cards = $optionsList.querySelectorAll('.option-card');
        for (var i = 0; i < cards.length; i++) cards[i].classList.remove('selected');
        cards[idx].classList.add('selected');
        focusedOptionIndex = idx;
        $btnNext.disabled = false;

        var isLast = currentIndex === allQuestions.length - 1;
        if (!isLast) {
            clearAutoAdvance();
            autoAdvanceTimer = setTimeout(function() { nextQuestion(); }, 300);
        }
    }

    function clearAutoAdvance() {
        if (autoAdvanceTimer) { clearTimeout(autoAdvanceTimer); autoAdvanceTimer = null; }
    }

    /* ===================================
       NAVIGATION
       =================================== */
    function nextQuestion() {
        var q = allQuestions[currentIndex];
        var answered = false;
        if (q.type === Q_FREETEXT) {
            answered = q.id in answers && answers[q.id] && answers[q.id].trim();
        } else {
            answered = q.id in answers;
        }
        if (!answered) {
            $questionCard.classList.add('shake');
            setTimeout(function() { $questionCard.classList.remove('shake'); }, 400);
            return;
        }
        if (currentIndex === allQuestions.length - 1) {
            submitAssessment();
            return;
        }
        currentIndex++;
        renderQuestion();
    }

    function prevQuestion() {
        clearAutoAdvance();
        if (currentIndex > 0) {
            var prevQ = allQuestions[currentIndex - 1];
            var curQ = allQuestions[currentIndex];
            if (curQ.sectionId === 'C' && prevQ.sectionId === 'B') {
                engagementShown.afterB = false;
            }
            currentIndex--;
            renderQuestion();
        }
    }

    /* ===================================
       KEYBOARD
       =================================== */
    function handleKeyboard(e) {
        if (!document.getElementById('screenStepper').classList.contains('active')) return;
        var q = allQuestions[currentIndex];
        if (q.type === Q_FREETEXT) {
            if (e.key === 'ArrowLeft' && e.target.tagName !== 'TEXTAREA') { e.preventDefault(); prevQuestion(); }
            return;
        }
        var cards = $optionsList.querySelectorAll('.option-card');
        var numOpts = cards.length;
        if (numOpts === 0) return;
        switch (e.key) {
            case 'ArrowDown': e.preventDefault(); focusedOptionIndex = (focusedOptionIndex + 1) % numOpts; updateFocus(cards); break;
            case 'ArrowUp': e.preventDefault(); focusedOptionIndex = focusedOptionIndex <= 0 ? numOpts - 1 : focusedOptionIndex - 1; updateFocus(cards); break;
            case 'Enter': e.preventDefault(); if (focusedOptionIndex >= 0) selectOption(focusedOptionIndex); break;
            case 'ArrowRight': e.preventDefault(); nextQuestion(); break;
            case 'ArrowLeft': e.preventDefault(); prevQuestion(); break;
        }
    }

    function updateFocus(cards) {
        for (var i = 0; i < cards.length; i++) cards[i].classList.remove('focused');
        if (focusedOptionIndex >= 0 && focusedOptionIndex < cards.length) {
            cards[focusedOptionIndex].classList.add('focused');
            cards[focusedOptionIndex].scrollIntoView({ block: 'nearest' });
        }
    }

    /* ===================================
       SAVE ANSWERS
       =================================== */
    function saveAnswersToStorage() {
        try {
            localStorage.setItem(
                storageKey('answers', SC_NUMBER, userEmail, ventureSlug),
                JSON.stringify(answers)
            );
        } catch(e) {}
    }

    /* ===================================
       SCORING
       =================================== */
    function calculateSectionScores() {
        var scores = { 'B': 0, 'C': 0 };
        allQuestions.forEach(function(q) {
            if (q.type === Q_MC && q.id in answers) {
                scores[q.sectionId] += q.options[answers[q.id]].score;
            }
            if (q.type === Q_FREETEXT && q.id in answers) {
                scores[q.sectionId] += scoreFreeText(q, answers[q.id]);
            }
        });
        return scores;
    }

    function scoreFreeText(q, text) {
        if (!text || !text.trim()) return 0;
        var wc = countWords(text);
        var score = 0;
        var max = q.maxScore;

        /* Length baseline */
        if (wc >= 100) score += max * 0.3;
        else if (wc >= 60) score += max * 0.2;
        else if (wc >= 30) score += max * 0.1;

        /* Specificity: numbers, names, data */
        var numberCount = (text.match(/\d+/g) || []).length;
        if (numberCount >= 4) score += max * 0.25;
        else if (numberCount >= 2) score += max * 0.15;
        else if (numberCount >= 1) score += max * 0.08;

        /* Evidence markers */
        var evidenceTerms = ['interview', 'survey', 'data', 'research', 'report', 'study', 'source', 'stat', 'according', 'customer', 'user', 'review', 'competitor', 'analysis', 'evidence', 'confirm', 'validate', 'prove', 'benchmark', 'pricing', 'revenue', 'arr', 'mrr', 'conversion'];
        var evidenceHits = 0;
        var lowerText = text.toLowerCase();
        evidenceTerms.forEach(function(term) { if (lowerText.indexOf(term) !== -1) evidenceHits++; });
        if (evidenceHits >= 5) score += max * 0.2;
        else if (evidenceHits >= 3) score += max * 0.12;
        else if (evidenceHits >= 1) score += max * 0.06;

        /* MENA awareness */
        var menaTerms = ['mena', 'gcc', 'uae', 'saudi', 'dubai', 'qatar', 'bahrain', 'oman', 'kuwait', 'egypt', 'jordan', 'lebanon', 'arabic', 'vision 2030', 'zatca', 'difc', 'adgm', 'neom', 'fintech', 'khaleeji'];
        var menaHits = 0;
        menaTerms.forEach(function(term) { if (lowerText.indexOf(term) !== -1) menaHits++; });
        if (menaHits >= 3) score += max * 0.15;
        else if (menaHits >= 1) score += max * 0.08;

        /* Quantification bonus */
        var quantTerms = ['%', 'percent', 'yoy', 'y/y', 'cagr', 'growth', 'increase', 'decrease', 'million', 'billion', 'thousand', '$', 'usd', 'aed', 'sar'];
        var quantHits = 0;
        quantTerms.forEach(function(term) { if (lowerText.indexOf(term) !== -1) quantHits++; });
        if (quantHits >= 3) score += max * 0.1;
        else if (quantHits >= 1) score += max * 0.05;

        return Math.min(Math.round(score), max);
    }

    function calculateScores() {
        var sectionScores = calculateSectionScores();
        var total = (sectionScores['B'] || 0) + (sectionScores['C'] || 0);
        var maxMC = SECTION_MAXES['B'] + SECTION_MAXES['C'];

        /* Normalize to 0-100 scale for display */
        var normalized = Math.round((total / maxMC) * 100);

        /* Calculate 4 dimensions */
        var dimensions = calculateDimensions();

        return {
            sectionScores: sectionScores,
            rawTotal: total,
            maxScore: maxMC,
            score: normalized,
            dimensions: dimensions
        };
    }

    function calculateDimensions() {
        /* Map questions to 4 dimensions */
        var dims = {
            pain: { score: 0, max: 0, label: 'Pain Reality' },
            purchasing: { score: 0, max: 0, label: 'Purchasing Power' },
            sizing: { score: 0, max: 0, label: 'Market Sizing' },
            growth: { score: 0, max: 0, label: 'Growth Signals' }
        };

        allQuestions.forEach(function(q) {
            var dim = q.dimension;
            if (!dim || !dims[dim]) return;
            dims[dim].max += q.maxScore;
            if (q.type === Q_MC && q.id in answers) {
                dims[dim].score += q.options[answers[q.id]].score;
            }
            if (q.type === Q_FREETEXT && q.id in answers) {
                dims[dim].score += scoreFreeText(q, answers[q.id]);
            }
        });

        return dims;
    }

    function getBand(score) {
        if (score >= 85) return { label: 'Launch Ready', color: '#22C55E' };
        if (score >= 70) return { label: 'Almost There', color: '#FF6600' };
        if (score >= 55) return { label: 'Needs Work', color: '#D97706' };
        if (score >= 40) return { label: 'Early Stage', color: '#EF4444' };
        return { label: 'Reset', color: '#EF4444' };
    }

    function getDimColor(score, max) {
        var pct = max > 0 ? (score / max) * 100 : 0;
        if (pct >= 80) return '#22C55E';
        if (pct >= 60) return '#FF6600';
        if (pct >= 40) return '#D97706';
        return '#EF4444';
    }

    /* ===================================
       SUBMIT ASSESSMENT
       =================================== */
    function submitAssessment() {
        $loadingOverlay.classList.add('active');

        setTimeout(function() {
            var result = calculateScores();
            var band = getBand(result.score);

            var resultObj = {
                score: result.score,
                band: band.label,
                sections: result.sectionScores,
                dimensions: result.dimensions,
                rawTotal: result.rawTotal,
                maxScore: result.maxScore
            };

            /* Save results */
            resultObj.completed_at = new Date().toISOString().split('T')[0];
            localStorage.setItem(
                storageKey('result', SC_NUMBER, userEmail, ventureSlug),
                JSON.stringify(resultObj)
            );
            saveScore(userEmail, ventureSlug, SC_NUMBER, result.score);

            /* Also save in old format for backward compat with dashboard */
            try {
                var downstream = {};
                allQuestions.forEach(function(q) {
                    if (q.type === Q_FREETEXT) downstream[q.id] = answers[q.id] || '';
                    else if (q.type === Q_MC) downstream[q.id] = q.id in answers ? q.options[answers[q.id]].label : '';
                });
                downstream.section_scores = result.sectionScores;
                downstream.total = result.score;
                downstream.band = band.label;
                downstream.version = '3.0';
                localStorage.setItem('eo-market-attractiveness', JSON.stringify(downstream));
            } catch(e) {}

            /* Send webhook */
            sendToWebhook(result, resultObj);

            $loadingOverlay.classList.remove('active');
            renderResults(resultObj);
        }, 800);
    }

    function sendToWebhook(result, resultObj) {
        var upstream = {};
        for (var i = 1; i < SC_NUMBER; i++) {
            upstream['sc' + i + '_score'] = getScores(userEmail, ventureSlug)['sc' + i] || null;
            upstream['sc' + i + '_answers'] = getUpstreamAnswers(i, userEmail, ventureSlug);
        }

        var payload = {
            email: userEmail,
            venture_name: ventureName,
            venture_slug: ventureSlug,
            scorecard: 'SC' + SC_NUMBER,
            answers: answers,
            scores: {
                total: result.score,
                sections: result.sectionScores,
                dimensions: result.dimensions
            },
            upstream_data: upstream,
            timestamp: new Date().toISOString()
        };

        var controller = new AbortController();
        var timeoutId = setTimeout(function() { controller.abort(); }, 15000);

        fetch('https://ai.mamounalamouri.smorchestra.com/webhook/eo-mas-score', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
            signal: controller.signal
        })
        .then(function(r) { return r.json(); })
        .then(function(data) { console.log('Webhook OK:', data); })
        .catch(function(err) {
            if (err.name === 'AbortError') {
                console.warn('Webhook timeout — proceeding with local scores');
                showToast('Score saved locally. Server sync will retry.');
            } else {
                console.warn('Webhook failed:', err);
                showToast('Score saved locally. Server sync failed.');
            }
        })
        .finally(function() { clearTimeout(timeoutId); });
    }

    /* ===================================
       RENDER RESULTS (TYPE 2: SCORING TOOL)
       =================================== */
    function renderResults(resultObj) {
        var score = resultObj.score || 0;
        var band = getBand(score);
        var dims = resultObj.dimensions || calculateDimensions();
        var sectionScores = resultObj.sections || resultObj.sectionScores || {};

        var html = '';

        /* === GAUGE RING === */
        var circumference = 2 * Math.PI * 72;
        var offset = circumference - (score / 100) * circumference;

        html += '<div class="gauge-container">';
        html += '<svg class="gauge-svg" viewBox="0 0 160 160">';
        html += '<circle class="gauge-bg" cx="80" cy="80" r="72" />';
        html += '<circle class="gauge-fill" cx="80" cy="80" r="72" stroke="' + band.color + '" stroke-dasharray="' + circumference + '" stroke-dashoffset="' + offset + '" transform="rotate(-90 80 80)" />';
        html += '<text class="gauge-score" x="80" y="74">' + score + '</text>';
        html += '<text class="gauge-label" x="80" y="98">/ 100</text>';
        html += '</svg>';
        html += '<div class="band-label" style="color:' + band.color + '">' + band.label + '</div>';
        html += '<div class="band-subtitle">Market Attractiveness Score — ' + ventureName + '</div>';
        html += '</div>';

        /* === 4-DIMENSION VISUAL === */
        html += '<div class="results-card"><h3>4-Dimension Breakdown</h3>';
        var dimOrder = ['pain', 'purchasing', 'sizing', 'growth'];
        dimOrder.forEach(function(key) {
            var d = dims[key];
            if (!d) return;
            var pct = d.max > 0 ? Math.round((d.score / d.max) * 100) : 0;
            var color = getDimColor(d.score, d.max);
            html += '<div class="dim-bar-row">';
            html += '<div class="dim-bar-label">' + d.label + '</div>';
            html += '<div class="dim-bar-track"><div class="dim-bar-fill" style="width:' + pct + '%;background:' + color + '"></div></div>';
            html += '<div class="dim-bar-score" style="color:' + color + '">' + pct + '%</div>';
            html += '</div>';
        });
        html += '</div>';

        /* === VIABILITY VERDICT CARD === */
        html += '<div class="verdict-card">';
        html += '<h3>Viability Verdict</h3>';
        html += '<div class="verdict-text">' + getVerdict(score, dims) + '</div>';
        html += '</div>';

        /* === HOW TO RAISE YOUR SCORE === */
        html += '<div class="results-card"><h3>How to Raise Your Score</h3>';
        var weakDims = getWeakDimensions(dims);
        if (weakDims.length === 0) {
            html += '<p style="color:#D1D5DB;font-size:14px;">All dimensions are strong. Focus on maintaining evidence quality as you progress to Strategy (SC4).</p>';
        }
        weakDims.forEach(function(wd) {
            var pct = wd.max > 0 ? Math.round((wd.score / wd.max) * 100) : 0;
            var scoreClass = pct < 40 ? 'low' : pct < 70 ? 'mid' : 'ok';
            html += '<div class="raise-card">';
            html += '<span class="current-score ' + scoreClass + '">' + pct + '% — ' + wd.label + '</span>';
            html += '<h4>' + getRaiseTitle(wd.key) + '</h4>';
            html += '<p>' + getRaiseAdvice(wd.key) + '</p>';
            html += '</div>';
        });
        html += '</div>';

        /* === SECTION BREAKDOWN === */
        html += '<div class="results-card"><h3>Section Breakdown</h3>';
        var displaySections = [
            { id: 'B', name: 'Evidence Validation', max: 40 },
            { id: 'C', name: 'Market Sizing & Growth', max: 40 }
        ];
        displaySections.forEach(function(sec) {
            var secScore = sectionScores[sec.id] || 0;
            var pct = sec.max > 0 ? Math.round((secScore / sec.max) * 100) : 0;
            var color = getDimColor(secScore, sec.max);
            html += '<div class="section-bar-row">';
            html += '<div class="section-bar-label">' + sec.name + '</div>';
            html += '<div class="section-bar-track"><div class="section-bar-fill" style="width:' + pct + '%;background:' + color + '"></div></div>';
            html += '<div class="section-bar-score">' + secScore + ' / ' + sec.max + '</div>';
            html += '</div>';
        });
        html += '</div>';

        /* === ENGAGEMENT: ASSESSMENT COMPLETE === */
        html += '<div class="pattern-break-card" style="margin:0 0 20px;">';
        html += '<div class="pb-label">ASSESSMENT COMPLETE</div>';
        html += '<div class="pb-text">' + ENGAGEMENT.investmentFinal + '</div>';
        html += '</div>';

        /* === GATE WARNING === */
        if (score < 40) {
            html += '<div class="gate-warning">';
            html += '<h3>Market Validation Needed</h3>';
            html += '<p>Your score suggests core market assumptions need revisiting. Consider 10+ buyer interviews and revisiting SC1/SC2 before moving to Strategy (SC4).</p>';
            html += '</div>';
        }

        /* === CTAs === */
        html += '<div class="results-cta">';
        html += '<a href="EO-Strategy-Selector.html" class="btn-primary" style="display:inline-block;text-decoration:none;">Continue to Strategy Selector →</a>';
        html += '<button class="btn-download-md" id="btnDownloadMd">Download Results (MD)</button>';
        html += '<a href="EO-Assessment-Dashboard.html" style="display:inline-block;text-decoration:none;background:transparent;border:2px solid rgba(255,255,255,0.3);color:#fff;padding:12px 28px;border-radius:var(--eo-radius-sm);font-size:15px;font-weight:600;min-width:280px;text-align:center;">Back to Dashboard</a>';
        html += '<button class="btn-retake" id="btnRetake">Retake Assessment</button>';
        html += '</div>';

        $resultsContent.innerHTML = html;
        showScreen('screenResults');
        window.scrollTo({ top: 0, behavior: 'smooth' });

        document.getElementById('btnRetake').addEventListener('click', retakeAssessment);
        document.getElementById('btnDownloadMd').addEventListener('click', generateMarkdownExport);
    }

    /* ===================================
       VERDICT GENERATOR
       =================================== */
    function getVerdict(score, dims) {
        var painPct = dims.pain && dims.pain.max > 0 ? (dims.pain.score / dims.pain.max) * 100 : 0;
        var purchPct = dims.purchasing && dims.purchasing.max > 0 ? (dims.purchasing.score / dims.purchasing.max) * 100 : 0;
        var sizePct = dims.sizing && dims.sizing.max > 0 ? (dims.sizing.score / dims.sizing.max) * 100 : 0;
        var growthPct = dims.growth && dims.growth.max > 0 ? (dims.growth.score / dims.growth.max) * 100 : 0;

        if (score >= 85) {
            return 'Strong market signal across all four dimensions. Your evidence base supports real pain, confirmed purchasing power, quantified market size, and clear growth tailwinds. You\'re building in the right space — proceed to strategy with confidence.';
        }
        if (score >= 70) {
            var weakArea = '';
            if (painPct < 70) weakArea = 'pain evidence';
            else if (purchPct < 70) weakArea = 'purchasing power data';
            else if (sizePct < 70) weakArea = 'market sizing math';
            else weakArea = 'growth signal documentation';
            return 'Good market fundamentals with room to sharpen. Your ' + weakArea + ' needs the most attention. Strengthen this before committing significant resources — the market is there, but your evidence needs to match your conviction.';
        }
        if (score >= 55) {
            return 'Mixed market signal. Some dimensions show promise while others lack sufficient evidence. Before investing heavily, prioritize: (1) validate pain with real buyer conversations, (2) confirm willingness to pay, (3) tighten your market sizing. This is fixable, but don\'t skip the work.';
        }
        if (score >= 40) {
            return 'Weak market signal. Your evidence base has significant gaps across multiple dimensions. This doesn\'t mean the market is bad — it means you haven\'t proven it yet. Run 10+ structured buyer interviews, research competitor traction, and revisit your SC1/SC2 work before proceeding.';
        }
        return 'Insufficient market evidence. Your scoring suggests you\'re operating largely on assumptions rather than data. Before building anything, invest 2-3 weeks in pure market discovery: buyer interviews, competitor analysis, and market sizing research. Return to SC1/SC2 to strengthen your foundation.';
    }

    function getWeakDimensions(dims) {
        var weak = [];
        var dimOrder = ['pain', 'purchasing', 'sizing', 'growth'];
        dimOrder.forEach(function(key) {
            var d = dims[key];
            if (!d || d.max === 0) return;
            var pct = (d.score / d.max) * 100;
            if (pct < 75) {
                weak.push({ key: key, label: d.label, score: d.score, max: d.max });
            }
        });
        weak.sort(function(a, b) { return (a.score / a.max) - (b.score / b.max); });
        return weak.slice(0, 3);
    }

    function getRaiseTitle(dimKey) {
        var titles = {
            pain: 'Strengthen Pain Evidence',
            purchasing: 'Prove Purchasing Power',
            sizing: 'Sharpen Market Sizing',
            growth: 'Document Growth Signals'
        };
        return titles[dimKey] || 'Improve This Dimension';
    }

    function getRaiseAdvice(dimKey) {
        var advice = {
            pain: 'Run 5+ "Mom Test" buyer interviews. Record exact quotes about the pain. Collect competitor review data showing users paying for similar solutions. Build a pain-evidence matrix with sources and strength ratings.',
            purchasing: 'Research exact competitor pricing and user counts (G2, Capterra, Crunchbase). Document industry budget allocations for your category. Find salary data, contract values, or LOIs that prove your ICP spends money on solutions like yours.',
            sizing: 'Build a bottom-up TAM calculation: count actual companies in your niche × realistic ACV. Show TAM → SAM → SOM narrowing with clear logic. Use MENA-specific data sources (Statista MENA, Bain GCC reports, government databases).',
            growth: 'Identify 3+ macro tailwinds specific to your MENA market. Cite regulatory changes (Vision 2030, ZATCA), technology adoption trends, recent funding rounds in your category, and cultural/demographic shifts that create demand.'
        };
        return advice[dimKey] || 'Add more specific evidence and data to this dimension.';
    }

    /* ===================================
       MARKDOWN EXPORT
       =================================== */
    function generateMarkdownExport() {
        var result = calculateScores();
        var band = getBand(result.score);
        var dims = result.dimensions;
        var today = new Date();
        var dateStr = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');

        var md = '';
        md += '# SC3: Market Attractiveness — Full Analysis\n\n';
        md += '**Venture:** ' + ventureName + '\n';
        md += '**Founder:** ' + userEmail + '\n';
        md += '**Date:** ' + dateStr + '\n';
        md += '**Overall Score:** ' + result.score + '/100 — ' + band.label + '\n\n';
        md += '---\n\n';

        // 1. STRATEGIC SUMMARY
        md += '## Strategic Summary\n\n';
        var dimOrder = ['pain', 'purchasing', 'sizing', 'growth'];
        var strengths = [], gaps = [];
        dimOrder.forEach(function(key) {
            var d = dims[key];
            if (!d) return;
            var pct = d.max > 0 ? Math.round((d.score / d.max) * 100) : 0;
            if (pct >= 70) strengths.push(d.label + ' (' + pct + '%)');
            else if (pct < 50) gaps.push(d.label + ' (' + pct + '%)');
        });
        if (strengths.length > 0) md += '**Strengths:** ' + strengths.join(', ') + '\n\n';
        else md += '**Strengths:** No dimensions above 70% yet — strengthen market evidence.\n\n';
        if (gaps.length > 0) md += '**Critical Gaps:** ' + gaps.join(', ') + '\n\n';
        else md += '**Critical Gaps:** None — market signal is solid.\n\n';

        md += '**Viability Verdict:** ' + getVerdict(result.score, dims) + '\n\n';

        md += '### 4-Dimension Breakdown\n\n';
        md += '| Dimension | Score | Max | Percentage |\n';
        md += '|-----------|-------|-----|------------|\n';
        dimOrder.forEach(function(key) {
            var d = dims[key];
            if (!d) return;
            var pct = d.max > 0 ? Math.round((d.score / d.max) * 100) : 0;
            md += '| ' + d.label + ' | ' + d.score + ' | ' + d.max + ' | ' + pct + '% |\n';
        });
        md += '\n';

        md += '### Section Breakdown\n\n';
        md += '| Section | Score | Max |\n';
        md += '|---------|-------|-----|\n';
        md += '| Evidence Validation (B) | ' + (result.sectionScores['B'] || 0) + ' | 40 |\n';
        md += '| Market Sizing & Growth (C) | ' + (result.sectionScores['C'] || 0) + ' | 40 |\n';
        md += '\n';

        /* Upstream Data */
        if ((upstreamPD && Object.keys(upstreamPD).length > 0) || (upstreamICP && Object.keys(upstreamICP).length > 0)) {
            md += '### Upstream Context (SC1 + SC2)\n\n';
            if (upstreamPD && Object.keys(upstreamPD).length > 0) {
                ['niche', 'positioning', 'mena_context', 'product_vision'].forEach(function(key) {
                    var val = upstreamPD[key] || '';
                    if (val) md += '- **' + key.replace(/_/g, ' ') + ':** ' + val.substring(0, 200) + '\n';
                });
            }
            if (upstreamICP && Object.keys(upstreamICP).length > 0) {
                ['who', 'pain', 'dream', 'access'].forEach(function(key) {
                    var val = upstreamICP[key] || '';
                    if (val) md += '- **' + key + ':** ' + val.substring(0, 200) + '\n';
                });
            }
            md += '\n';
        }
        md += '---\n\n';

        // 2. RECOMMENDED FIXES
        md += '## Recommended Fixes\n\n';
        var weakDims = getWeakDimensions(dims);
        if (weakDims.length === 0) {
            md += 'All dimensions are strong. Maintain evidence quality as you proceed to Strategy Selector (SC4).\n\n';
        }
        weakDims.forEach(function(wd, idx) {
            var pct = wd.max > 0 ? Math.round((wd.score / wd.max) * 100) : 0;
            md += (idx + 1) + '. **' + wd.label + ' (' + pct + '%):** ' + getRaiseAdvice(wd.key) + '\n\n';
        });
        var sectionOrder = ['B', 'C'];
        var hasRecs = false;
        sectionOrder.forEach(function(sid) {
            if (RECOMMENDATIONS[sid] && RECOMMENDATIONS[sid].length > 0) hasRecs = true;
        });
        if (hasRecs) {
            md += '### General Recommendations\n\n';
            sectionOrder.forEach(function(sid) {
                if (RECOMMENDATIONS[sid]) {
                    RECOMMENDATIONS[sid].forEach(function(r) { md += '- ' + r + '\n'; });
                }
            });
            md += '\n';
        }
        md += '---\n\n';

        // 3. QUESTIONS & ANSWERS
        md += '## Questions & Answers\n\n';
        sectionOrder.forEach(function(sid) {
            var sec = null;
            for (var i = 0; i < SECTIONS.length; i++) { if (SECTIONS[i].id === sid) { sec = SECTIONS[i]; break; } }
            md += '### Section ' + sid + ': ' + sec.fullName + '\n\n';
            allQuestions.forEach(function(q) {
                if (q.sectionId !== sid) return;
                md += '**' + q.id.toUpperCase() + '.** (' + q.maxScore + ' pts) ' + q.text + '\n\n';
                if (q.type === Q_FREETEXT) {
                    md += '> ' + (answers[q.id] || '(No answer)').replace(/\n/g, '\n> ') + '\n\n';
                } else {
                    var opt = q.id in answers ? q.options[answers[q.id]] : null;
                    md += '→ **Selected:** ' + (opt ? opt.label + ' (Score: ' + opt.score + '/' + q.maxScore + ')' : '(No answer)') + '\n\n';
                }
            });
        });

        md += '---\n*Generated by Entrepreneurs Oasis MENA — Market Attractiveness Scoring*\n';

        var blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = 'SC3-Market-Attractiveness-' + (slugify(ventureName) || 'venture') + '-' + dateStr + '.md';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    /* ===================================
       RETAKE
       =================================== */
    function retakeAssessment() {
        answers = {};
        currentIndex = 0;
        upstreamConfirmed = false;
        engagementShown = { afterB: false, afterC: false };
        try {
            localStorage.removeItem(storageKey('answers', SC_NUMBER, userEmail, ventureSlug));
            localStorage.removeItem(storageKey('result', SC_NUMBER, userEmail, ventureSlug));
        } catch(e) {}
        showScreen('screenAuth');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function escapeHtml(text) {
        var div = document.createElement('div');
        div.appendChild(document.createTextNode(text));
        return div.innerHTML;
    }

    /* ===================================
       BOOT
       =================================== */
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }

})();

/* RTL Toggle (global scope) */
function toggleRTL() {
    document.body.classList.toggle('rtl');
    var isRTL = document.body.classList.contains('rtl');
    document.documentElement.lang = isRTL ? 'ar' : 'en';
    document.documentElement.dir = isRTL ? 'rtl' : 'ltr';
    try { localStorage.setItem('eo-rtl', isRTL ? '1' : '0'); } catch(e) {}
}
