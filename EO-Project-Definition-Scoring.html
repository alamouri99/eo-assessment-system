<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrepreneurs Oasis MENA — Project Definition Scoring</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
    --eo-dark: #1A1A2E;
    --eo-orange: #E94D1B;
    --eo-beige: #FAF5EF;
    --eo-card-bg: #FFFFFF;
    --eo-gray-text: #6B7280;
    --eo-gray-border: #E5E7EB;
    --eo-shadow: 0 2px 8px rgba(0,0,0,0.08);
    --eo-radius: 12px;
    --eo-radius-sm: 8px;
    --eo-transition: 300ms ease;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--eo-dark);
    color: #FFFFFF;
    min-height: 100vh;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
}

/* RTL Support */
body.rtl { direction: rtl; text-align: right; }
body.rtl .nav-buttons { flex-direction: row-reverse; }
body.rtl .section-bar-row { flex-direction: row-reverse; }
body.rtl .reco-list li { padding: 6px 24px 6px 0; }
body.rtl .progress-meta { flex-direction: row-reverse; }
body.rtl .option-card { text-align: right; }

/* RTL Toggle */
.rtl-toggle {
    position: fixed;
    top: 12px;
    right: 12px;
    z-index: 999;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    padding: 6px 14px;
    border-radius: var(--eo-radius-sm);
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    transition: all var(--eo-transition);
}
.rtl-toggle:hover { background: rgba(255,255,255,0.2); }

/* Header */
.eo-header {
    text-align: center;
    padding: 28px 20px 12px;
}
.eo-header h1 {
    font-size: 22px;
    font-weight: 800;
    color: #FFFFFF;
}
.eo-header h1 span { color: var(--eo-orange); }

/* Section Label */
.section-label {
    font-size: 14px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #9CA3AF;
    text-align: center;
    margin-bottom: 4px;
}

/* Progress Bar */
.progress-wrapper {
    max-width: 640px;
    margin: 0 auto 24px;
    padding: 0 20px;
}
.progress-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
}
.progress-meta .section-label { margin-bottom: 0; text-align: left; }
.progress-counter {
    font-size: 13px;
    color: #9CA3AF;
    font-weight: 500;
}
.progress-track {
    width: 100%;
    height: 8px;
    background: #2D2D44;
    border-radius: 4px;
    overflow: hidden;
}
.progress-fill {
    height: 100%;
    background: var(--eo-orange);
    border-radius: 4px;
    transition: width var(--eo-transition);
    width: 0%;
}

/* Screens */
.screen { display: none; }
.screen.active { display: block; }

/* Email Capture */
.email-capture {
    max-width: 480px;
    margin: 60px auto;
    padding: 40px;
    text-align: center;
    background: var(--eo-beige);
    border-radius: var(--eo-radius);
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
.email-capture h2 {
    font-size: 26px;
    font-weight: 800;
    color: var(--eo-dark);
    margin-bottom: 8px;
}
.email-capture p {
    color: var(--eo-gray-text);
    margin-bottom: 28px;
    font-size: 15px;
}
.email-capture input {
    width: 100%;
    padding: 14px 16px;
    border: 2px solid var(--eo-gray-border);
    border-radius: var(--eo-radius-sm);
    font-size: 15px;
    font-family: inherit;
    outline: none;
    transition: border-color var(--eo-transition);
    margin-bottom: 16px;
}
.email-capture input:focus { border-color: var(--eo-orange); }
.email-capture .btn-primary { width: 100%; }

/* Question Card */
.question-card {
    background: var(--eo-beige);
    border-radius: var(--eo-radius);
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    padding: 32px;
    max-width: 640px;
    margin: 0 auto;
    position: relative;
}
.question-card.shake {
    animation: shake 0.4s ease;
}
@keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-6px); }
    80% { transform: translateX(6px); }
}

.question-text {
    font-size: 20px;
    font-weight: 700;
    color: var(--eo-orange);
    text-align: center;
    margin-bottom: 12px;
    line-height: 1.35;
}
.question-help {
    font-size: 13px;
    color: var(--eo-gray-text);
    text-align: center;
    margin-bottom: 20px;
    line-height: 1.5;
    font-style: italic;
}

/* Options */
.options-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
}
.option-card {
    border: 2px solid var(--eo-gray-border);
    border-radius: var(--eo-radius-sm);
    padding: 16px 20px;
    cursor: pointer;
    font-size: 15px;
    font-weight: 500;
    color: var(--eo-dark);
    transition: border-color var(--eo-transition), background var(--eo-transition), color var(--eo-transition);
    user-select: none;
    line-height: 1.4;
}
.option-card:hover {
    border-color: var(--eo-orange);
}
.option-card.selected {
    background: var(--eo-orange);
    border-color: var(--eo-orange);
    color: #FFFFFF;
}
.option-card.focused {
    outline: 2px solid var(--eo-orange);
    outline-offset: 2px;
}

/* Free-text Input */
.freetext-input {
    width: 100%;
    padding: 16px;
    border: 2px solid var(--eo-gray-border);
    border-radius: var(--eo-radius-sm);
    font-size: 15px;
    font-family: inherit;
    resize: vertical;
    min-height: 120px;
    outline: none;
    transition: border-color var(--eo-transition);
    color: var(--eo-dark);
    line-height: 1.5;
    background: #FFFFFF;
}
.freetext-input:focus { border-color: var(--eo-orange); }
.freetext-input::placeholder { color: #9CA3AF; font-size: 14px; }

.char-count {
    text-align: right;
    font-size: 12px;
    color: #9CA3AF;
    margin-top: 6px;
}
.char-count.over { color: #EF4444; }

/* Evidence Label */
.evidence-label {
    font-size: 14px;
    font-weight: 600;
    color: var(--eo-dark);
    margin-top: 20px;
    margin-bottom: 8px;
}
.evidence-input { min-height: 80px; }

/* Nav Buttons */
.nav-buttons {
    display: flex;
    justify-content: space-between;
    align-items: center;
    max-width: 640px;
    margin: 24px auto 0;
    padding: 0 20px;
    gap: 12px;
}
.btn {
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    padding: 12px 28px;
    border-radius: var(--eo-radius-sm);
    cursor: pointer;
    transition: all var(--eo-transition);
    border: none;
    outline: none;
}
.btn-prev {
    background: transparent;
    border: 2px solid #FFFFFF;
    color: #FFFFFF;
}
.btn-prev:hover { background: rgba(255,255,255,0.15); }
.btn-prev.hidden { visibility: hidden; pointer-events: none; }
.btn-next {
    background: var(--eo-orange);
    color: #FFFFFF;
}
.btn-next:hover { background: #d4441a; }
.btn-next:disabled {
    opacity: 0.4;
    cursor: not-allowed;
}
.btn-primary {
    background: var(--eo-orange);
    color: #FFFFFF;
    font-size: 16px;
    font-weight: 700;
    padding: 14px 32px;
    border: none;
    border-radius: var(--eo-radius-sm);
    cursor: pointer;
    font-family: inherit;
    transition: all var(--eo-transition);
}
.btn-primary:hover { background: #d4441a; }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

/* Toast */
.toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-100px);
    background: var(--eo-dark);
    color: #fff;
    padding: 12px 24px;
    border-radius: var(--eo-radius-sm);
    font-size: 14px;
    font-weight: 500;
    z-index: 1000;
    transition: transform 0.4s ease;
    white-space: nowrap;
}
.toast.show {
    transform: translateX(-50%) translateY(0);
}

/* Contact Form */
.contact-screen {
    max-width: 480px;
    margin: 40px auto;
    padding: 0 20px;
}
.contact-card {
    background: var(--eo-beige);
    border-radius: var(--eo-radius);
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    padding: 32px;
}
.contact-card h2 {
    font-size: 22px;
    font-weight: 800;
    color: var(--eo-dark);
    text-align: center;
    margin-bottom: 6px;
}
.contact-card .subtitle {
    font-size: 14px;
    color: var(--eo-gray-text);
    text-align: center;
    margin-bottom: 24px;
}
.form-group {
    margin-bottom: 16px;
}
.form-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--eo-dark);
    margin-bottom: 6px;
}
.form-group input {
    width: 100%;
    padding: 12px 14px;
    border: 2px solid var(--eo-gray-border);
    border-radius: var(--eo-radius-sm);
    font-size: 15px;
    font-family: inherit;
    outline: none;
    transition: border-color var(--eo-transition);
}
.form-group input:focus { border-color: var(--eo-orange); }
.contact-actions {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 24px;
}
.btn-skip {
    background: transparent;
    color: var(--eo-gray-text);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    font-family: inherit;
    text-decoration: underline;
}

/* Loading */
.loading-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26,26,46,0.9);
    z-index: 2000;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    gap: 20px;
}
.loading-overlay.active { display: flex; }
.spinner {
    width: 48px;
    height: 48px;
    border: 4px solid #2D2D44;
    border-top-color: var(--eo-orange);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-overlay p { font-size: 16px; font-weight: 500; }

/* Results */
.results-container {
    max-width: 720px;
    margin: 0 auto;
    padding: 0 20px 60px;
}
.score-hero {
    text-align: center;
    padding: 40px 20px 32px;
}
.score-circle {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
}
.score-circle-inner { text-align: center; }
.score-number { font-size: 48px; font-weight: 800; display: block; }
.score-total { font-size: 16px; color: #9CA3AF; }
.band-label {
    font-size: 18px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 4px;
}
.band-subtitle {
    font-size: 14px;
    color: #9CA3AF;
}
.band-ready .score-number, .band-ready .band-label { color: #22C55E; }
.band-partial .score-number, .band-partial .band-label { color: #3B82F6; }
.band-gaps .score-number, .band-gaps .band-label { color: #F59E0B; }
.band-startover .score-number, .band-startover .band-label { color: #EF4444; }

/* Pending AI badge */
.pending-ai-badge {
    display: inline-block;
    background: rgba(233,77,27,0.15);
    color: var(--eo-orange);
    font-size: 12px;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 20px;
    margin-top: 8px;
}

.results-card {
    background: rgba(255,255,255,0.06);
    border-radius: var(--eo-radius);
    padding: 24px;
    margin-bottom: 20px;
}
.results-card h3 {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 16px;
    color: #FFFFFF;
}

/* Section bars */
.section-bar-row {
    display: flex;
    align-items: center;
    margin-bottom: 14px;
    gap: 12px;
}
.section-bar-label {
    width: 100px;
    font-size: 13px;
    font-weight: 600;
    color: #D1D5DB;
    flex-shrink: 0;
}
.section-bar-track {
    flex: 1;
    height: 12px;
    background: #2D2D44;
    border-radius: 6px;
    overflow: hidden;
}
.section-bar-fill {
    height: 100%;
    border-radius: 6px;
    transition: width 0.5s ease;
}
.section-bar-score {
    width: 60px;
    text-align: right;
    font-size: 13px;
    font-weight: 600;
    color: #D1D5DB;
    flex-shrink: 0;
}

/* Recommendations */
.reco-section { margin-bottom: 16px; }
.reco-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
}
.reco-icon { font-size: 16px; }
.reco-title { font-size: 14px; font-weight: 600; color: #FFFFFF; }
.reco-list {
    list-style: none;
    padding: 0;
    margin: 0 0 0 24px;
}
.reco-list li {
    position: relative;
    padding: 4px 0 4px 16px;
    font-size: 13px;
    color: #D1D5DB;
    line-height: 1.5;
}
.reco-list li::before {
    content: '\2022';
    position: absolute;
    left: 0;
    color: var(--eo-orange);
}

/* AI Section */
.ai-section {
    background: rgba(233,77,27,0.08);
    border: 1px solid rgba(233,77,27,0.2);
    border-radius: var(--eo-radius);
    padding: 24px;
    margin-bottom: 20px;
}
.ai-badge {
    display: inline-block;
    background: var(--eo-orange);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 16px;
}
.ai-section h3 { font-size: 15px; margin-bottom: 8px; }
.ai-insight { font-size: 14px; color: #D1D5DB; margin-bottom: 16px; line-height: 1.6; }
.ai-plan { margin-bottom: 16px; }
.ai-plan h4 { font-size: 14px; margin-bottom: 8px; color: var(--eo-orange); }
.ai-plan ul { margin: 0; padding: 0 0 0 20px; }
.ai-plan li { font-size: 13px; color: #D1D5DB; margin-bottom: 6px; }
.ai-reco-list { margin: 0; padding: 0 0 0 20px; }
.ai-reco-list li { font-size: 13px; color: #D1D5DB; margin-bottom: 6px; }

/* Answer Display in Results */
.answer-block {
    background: rgba(255,255,255,0.04);
    border-radius: var(--eo-radius-sm);
    padding: 16px;
    margin-bottom: 12px;
}
.answer-block .q-label {
    font-size: 13px;
    font-weight: 700;
    color: var(--eo-orange);
    margin-bottom: 4px;
}
.answer-block .q-text {
    font-size: 13px;
    color: #9CA3AF;
    margin-bottom: 8px;
}
.answer-block .a-text {
    font-size: 14px;
    color: #D1D5DB;
    white-space: pre-wrap;
    line-height: 1.5;
}
.answer-block .a-mc {
    font-size: 14px;
    color: #22C55E;
    font-weight: 600;
}

/* Gate Warning */
.gate-warning {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: var(--eo-radius);
    padding: 20px;
    margin-bottom: 20px;
    text-align: center;
}
.gate-warning h3 { color: #EF4444; font-size: 16px; margin-bottom: 8px; }
.gate-warning p { color: #D1D5DB; font-size: 14px; }

/* CTA */
.results-cta {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    margin-top: 32px;
}
.results-cta .btn-primary { min-width: 280px; }
.results-cta .btn-retake {
    background: transparent;
    border: 2px solid #FFFFFF;
    color: #FFFFFF;
    padding: 12px 28px;
    border-radius: var(--eo-radius-sm);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: all var(--eo-transition);
    min-width: 280px;
}
.results-cta .btn-retake:hover { background: rgba(255,255,255,0.15); }
.results-cta .btn-download-md {
    background: transparent;
    border: 2px solid var(--eo-orange);
    color: var(--eo-orange);
    padding: 12px 28px;
    border-radius: var(--eo-radius-sm);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: all var(--eo-transition);
    min-width: 280px;
}
.results-cta .btn-download-md:hover {
    background: var(--eo-orange);
    color: #FFFFFF;
}
.results-cta .btn-download-pdf {
    background: transparent;
    border: 2px solid #6B7280;
    color: #6B7280;
    padding: 12px 28px;
    border-radius: var(--eo-radius-sm);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: all var(--eo-transition);
    min-width: 280px;
}
.results-cta .btn-download-pdf:hover {
    background: #6B7280;
    color: #FFFFFF;
}

/* Engagement: Pattern Break */
.pattern-break { max-width: 640px; margin: 0 auto 24px; padding: 0 20px; }
.pattern-break-card { background: linear-gradient(135deg, #1a1a1a, #0f0f0f); border-left: 4px solid var(--eo-orange); border-radius: var(--eo-radius-sm); padding: 20px 24px; }
.pattern-break-card .pb-label { font-size: 11px; font-weight: 700; color: var(--eo-orange); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.pattern-break-card .pb-text { font-size: 14px; color: #D1D5DB; line-height: 1.6; }
/* Engagement: Investment Signal */
.investment-signal { max-width: 640px; margin: 0 auto 16px; padding: 0 20px; }
.investment-signal-card { background: rgba(233,77,27,0.08); border-radius: var(--eo-radius-sm); padding: 12px 16px; font-size: 12px; color: #D1D5DB; font-style: italic; }
/* Engagement: Acknowledgment */
.acknowledgment { max-width: 640px; margin: 0 auto 16px; padding: 0 20px; }
.acknowledgment-card { background: rgba(255,255,255,0.04); border-radius: var(--eo-radius-sm); padding: 12px 16px; font-size: 13px; color: #D1D5DB; font-style: italic; border-left: 3px solid var(--eo-orange); }

/* Mobile */
@media (max-width: 680px) {
    .question-card { margin: 0 16px; padding: 24px 20px; }
    .nav-buttons { padding: 0 16px; }
    .question-text { font-size: 18px; }
    .progress-wrapper { padding: 0 16px; }
    .freetext-input { min-height: 100px; }
}
@media (max-width: 400px) {
    .nav-buttons { flex-direction: column; }
    .btn-prev.hidden { display: none; }
    .option-card { padding: 14px 16px; font-size: 14px; }
    .question-text { font-size: 17px; }
}
</style>
</head>
<body>

<!-- RTL Toggle -->
<button class="rtl-toggle" onclick="toggleRTL()">EN / عربي</button>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Loading Overlay -->
<div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <p>Generating your advanced analysis...</p>
</div>

<!-- Header -->
<div class="eo-header">
    <h1>Entrepreneurs <span>Oasis MENA</span></h1>
</div>

<!-- Screen 1: Email Capture -->
<div class="screen active" id="screenEmail">
    <div class="email-capture">
        <h2>Project Definition Scorecard</h2>
        <p>Define your project foundation with 23 guided questions. Free-text + multiple choice. ~20 minutes.</p>
        <input type="email" id="emailInput" placeholder="Enter your email to start" autocomplete="email">
        <button class="btn-primary" id="btnStartAssessment">Start Assessment</button>
    </div>
</div>

<!-- Screen 2: Stepper Questions -->
<div class="screen" id="screenStepper">
    <div class="progress-wrapper">
        <div class="progress-meta">
            <div class="section-label" id="sectionLabel">Section A: Founder Context</div>
            <div class="progress-counter" id="progressCounter">Question 1 of 21</div>
        </div>
        <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
        </div>
    </div>
    <div id="engagementSlot"></div>
    <div class="question-card" id="questionCard">
        <div class="question-text" id="questionText"></div>
        <div class="question-help" id="questionHelp" style="display:none;"></div>
        <div class="options-list" id="optionsList"></div>
    </div>
    <div class="nav-buttons">
        <button class="btn btn-prev hidden" id="btnPrev">Previous</button>
        <button class="btn btn-next" id="btnNext" disabled>Next</button>
    </div>
</div>

<!-- Screen 3: Contact Form -->
<div class="screen" id="screenContact">
    <div class="contact-screen">
        <div class="contact-card">
            <h2>Almost Done!</h2>
            <p class="subtitle">Get your personalized AI-powered analysis.</p>
            <div class="form-group">
                <label>Full Name *</label>
                <input type="text" id="contactName" placeholder="Your full name" autocomplete="name">
            </div>
            <div class="form-group">
                <label>Email *</label>
                <input type="email" id="contactEmail" placeholder="your@email.com" autocomplete="email">
            </div>
            <div class="form-group">
                <label>Company / Project *</label>

        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(answers)); } catch (e) {}

            var q = allQuestions[i];

                if (!(q.id in answers)) return i;
            } else if (q.type === Q_FREETEXT) {
                if (!(q.id in answers) || !answers[q.id].trim()) return i;
            }
        }
        return allQuestions.length - 1;

            /* Investment signal at ~30 min mark */
            html += '<div class="investment-signal"><div class="investment-signal-card">';
            html += 'You\'ve invested 30 minutes. Your problem-solution statement is uniquely yours \u2014 no generic strategy template could produce this.';
            html += '</div></div>';
        }

        /* Pattern Break after D4 (end of Section D) */
        if (prevQ.id === 'd4' && q.sectionId !== 'D') {
            var positioning = answers['c1'] || 'your product';
            html += '<div class="pattern-break"><div class="pattern-break-card">';
            html += '<div class="pb-label">Offer Preview</div>';
            html += '<div class="pb-text">Based on your answers so far, here\'s your draft positioning: "' + escapeHtml(positioning) + '" \u2014 We\'ll refine this in the final output documents.</div>';
            html += '</div></div>';
            /* Investment signal at ~50 min mark */
            html += '<div class="investment-signal"><div class="investment-signal-card">';
            html += '50 minutes in. Your product scope document is more specific than what most agencies deliver for $5K.';
            html += '</div></div>';
        }

        /* Final investment signal after F3 (last question) */
        if (prevQ.id === 'f3' || q.id === 'f3') {
            if (currentIndex === allQuestions.length - 1) {
                html += '<div class="investment-signal"><div class="investment-signal-card">';
                html += 'Final question. You\'ve built a complete venture definition that most accelerators charge $10K to produce. This is strategy-grade output.';
                html += '</div></div>';
            }
        }

        /* Acknowledgment between questions (based on previous answer quality) */
        if (prevQ.type === Q_FREETEXT && prevQ.maxScore > 0 && prevQ.id in answers) {
            var prevAnswer = answers[prevQ.id] || '';
            var wordCount = prevAnswer.trim() ? prevAnswer.trim().split(/\s+/).length : 0;
            if (wordCount > 40) {
                html += '<div class="acknowledgment"><div class="acknowledgment-card">';
                html += 'That\'s specific. Most founders stay vague here \u2014 you gave me something I can actually work with.';
                html += '</div></div>';
            } else if (wordCount > 0 && wordCount <= 15) {
                html += '<div class="acknowledgment"><div class="acknowledgment-card">';
                html += 'I need more from you here. The difference between a $10K idea and a $100K idea often hides in this answer.';
                html += '</div></div>';
            }
        }

        slot.innerHTML = html;
    }

    /* ===================================
       RENDER QUESTION (supports all 3 types)
       =================================== */
    function renderQuestion() {
        var q = allQuestions[currentIndex];
        var section = SECTIONS[q.sectionIndex];
        focusedOptionIndex = -1;

        $sectionLabel.textContent = 'Section ' + section.id + ': ' + section.name + ' \u2014 ' + section.fullName;
        $progressCounter.textContent = 'Question ' + (currentIndex + 1) + ' of ' + allQuestions.length;
        $progressFill.style.width = ((currentIndex + 1) / allQuestions.length * 100) + '%';
        $questionText.textContent = q.text;

        /* Help text */
        if (q.help) {
            $questionHelp.textContent = q.help;
            $questionHelp.style.display = 'block';
        } else {
            $questionHelp.style.display = 'none';
        }

        $optionsList.innerHTML = '';

        if (q.type === Q_FREETEXT) {
            renderFreetextQuestion(q);
        } else if (q.type === Q_MC_EVIDENCE) {
            renderMcEvidenceQuestion(q);
        } else {
            renderMcQuestion(q);
        }

        /* Prev button visibility */
        if (currentIndex === 0) {
            $btnPrev.classList.add('hidden');
        } else {
            $btnPrev.classList.remove('hidden');
        }

        /* Next button label */
        var isLast = currentIndex === allQuestions.length - 1;
        $btnNext.textContent = isLast ? 'Submit Assessment' : 'Next';

        /* Render engagement layer */
        renderEngagement();
    }

    function renderMcQuestion(q) {
        q.options.forEach(function(opt, idx) {
            var div = document.createElement('div');
            div.className = 'option-card';
            div.textContent = opt.label;
            div.setAttribute('data-index', idx);
            if (answers[q.id] === idx) div.classList.add('selected');
            div.addEventListener('click', function() { selectOption(idx); });
            $optionsList.appendChild(div);
        });
        $btnNext.disabled = !(q.id in answers);
    }

    function renderFreetextQuestion(q) {
        var ta = document.createElement('textarea');
        ta.className = 'freetext-input';
        ta.placeholder = q.placeholder || 'Type your answer here...';
        ta.rows = 5;
        ta.value = answers[q.id] || '';

        var hasLimit = q.wordLimit && q.wordLimit > 0;
        var charDiv = document.createElement('div');
        charDiv.className = 'char-count';
        var wordCount = countWords(ta.value);
        charDiv.textContent = hasLimit ? (wordCount + ' / ' + q.wordLimit + ' words') : (wordCount + ' words');

        ta.addEventListener('input', function() {
            var wc = countWords(ta.value);
            charDiv.textContent = hasLimit ? (wc + ' / ' + q.wordLimit + ' words') : (wc + ' words');
            if (hasLimit && wc > q.wordLimit) {
                charDiv.classList.add('over');
            } else {
                charDiv.classList.remove('over');
            }
            answers[q.id] = ta.value;
            saveAnswers();
            $btnNext.disabled = !ta.value.trim();
        });

        $optionsList.appendChild(ta);
        $optionsList.appendChild(charDiv);
        $btnNext.disabled = !(q.id in answers && answers[q.id] && answers[q.id].trim());
    }

    function renderMcEvidenceQuestion(q) {
        /* MC part */
        q.options.forEach(function(opt, idx) {
            var div = document.createElement('div');
            div.className = 'option-card';
            div.textContent = opt.label;
            div.setAttribute('data-index', idx);
            if (answers[q.id] === idx) div.classList.add('selected');
            div.addEventListener('click', function() { selectMcEvidence(idx); });
            $optionsList.appendChild(div);
        });

        /* Evidence part */
        var label = document.createElement('div');
        label.className = 'evidence-label';
        label.textContent = q.evidencePrompt || 'Provide supporting evidence:';
        $optionsList.appendChild(label);

        var ta = document.createElement('textarea');
        ta.className = 'freetext-input evidence-input';
        ta.placeholder = 'Share specific examples or evidence...';
        ta.rows = 3;
        ta.value = answers[q.id + '_evidence'] || '';
        ta.addEventListener('input', function() {
            answers[q.id + '_evidence'] = ta.value;
            saveAnswers();
        });
        $optionsList.appendChild(ta);

        $btnNext.disabled = !(q.id in answers);
    }

    function selectMcEvidence(idx) {
        var q = allQuestions[currentIndex];
        answers[q.id] = idx;
        saveAnswers();
        var cards = $optionsList.querySelectorAll('.option-card');
        for (var i = 0; i < cards.length; i++) cards[i].classList.remove('selected');
        cards[idx].classList.add('selected');
        $btnNext.disabled = false;
        /* No auto-advance for MC+Evidence — user needs to add evidence */
    }

    function countWords(text) {
        if (!text || !text.trim()) return 0;
        return text.trim().split(/\s+/).length;
    }

    /* ===================================
       SELECT OPTION (MC only)
       =================================== */
    function selectOption(idx) {
        var q = allQuestions[currentIndex];
        answers[q.id] = idx;
        saveAnswers();
        var cards = $optionsList.querySelectorAll('.option-card');
        for (var i = 0; i < cards.length; i++) cards[i].classList.remove('selected');
        cards[idx].classList.add('selected');
        focusedOptionIndex = idx;
        $btnNext.disabled = false;

        /* Auto-advance for pure MC only */
        var isLast = currentIndex === allQuestions.length - 1;
        if (!isLast) {
            clearAutoAdvance();
            autoAdvanceTimer = setTimeout(function() { nextQuestion(); }, 300);
        }
    }

    function clearAutoAdvance() {
        if (autoAdvanceTimer) { clearTimeout(autoAdvanceTimer); autoAdvanceTimer = null; }
    }

    /* ===================================
       NAVIGATION
       =================================== */
    function nextQuestion() {
        var q = allQuestions[currentIndex];
        var answered = false;
        if (q.type === Q_FREETEXT) {
            answered = q.id in answers && answers[q.id] && answers[q.id].trim();
        } else {
            answered = q.id in answers;
        }
        if (!answered) {
            $questionCard.classList.add('shake');
            setTimeout(function() { $questionCard.classList.remove('shake'); }, 400);
            return;
        }
        /* Save venture name after Section 0 Q2 */
        if (q.id === 's0_2') {
            try {
                var status = JSON.parse(localStorage.getItem('eo_completion_status') || '{}');
                status.ventureName = answers['s0_2'] || '';
                localStorage.setItem('eo_completion_status', JSON.stringify(status));
            } catch(e) {}
        }
        if (currentIndex === allQuestions.length - 1) {
            showScreen('screenContact');
            if (capturedEmail) document.getElementById('contactEmail').value = capturedEmail;
            return;
        }
        currentIndex++;
        renderQuestion();
    }

    function prevQuestion() {
        clearAutoAdvance();
        if (currentIndex > 0) { currentIndex--; renderQuestion(); }
    }

    /* ===================================
       KEYBOARD
       =================================== */
    function handleKeyboard(e) {
        if (!document.getElementById('screenStepper').classList.contains('active')) return;
        var q = allQuestions[currentIndex];
        /* Skip keyboard shortcuts for free-text (user is typing) */
        if (q.type === Q_FREETEXT || q.type === Q_MC_EVIDENCE) {
            if (e.key === 'ArrowLeft' && e.target.tagName !== 'TEXTAREA') { e.preventDefault(); prevQuestion(); }
            return;
        }
        var cards = $optionsList.querySelectorAll('.option-card');
        var numOpts = cards.length;
        if (numOpts === 0) return;
        switch (e.key) {
            case 'ArrowDown': e.preventDefault(); focusedOptionIndex = (focusedOptionIndex + 1) % numOpts; updateFocus(cards); break;
            case 'ArrowUp': e.preventDefault(); focusedOptionIndex = focusedOptionIndex <= 0 ? numOpts - 1 : focusedOptionIndex - 1; updateFocus(cards); break;
            case 'Enter': e.preventDefault(); if (focusedOptionIndex >= 0) selectOption(focusedOptionIndex); break;
            case 'ArrowRight': e.preventDefault(); nextQuestion(); break;
            case 'ArrowLeft': e.preventDefault(); prevQuestion(); break;
        }
    }

    function updateFocus(cards) {
        for (var i = 0; i < cards.length; i++) cards[i].classList.remove('focused');
        if (focusedOptionIndex >= 0 && focusedOptionIndex < cards.length) {
            cards[focusedOptionIndex].classList.add('focused');
            cards[focusedOptionIndex].scrollIntoView({ block: 'nearest' });
        }
    }

    /* ===================================
       SCORING
       =================================== */
    function calculateScores() {
        var sectionScores = {};
        var total = 0;
        var mcTotal = 0;
        var mcMax = 0;
        var ftCount = 0;
        Object.keys(SECTION_MAXES).forEach(function(s) { sectionScores[s] = 0; });

        allQuestions.forEach(function(q) {
            if (q.type === Q_MC || q.type === Q_MC_EVIDENCE) {
                if (q.id in answers && q.options) {
                    var score = q.options[answers[q.id]].score;
                    sectionScores[q.sectionId] += score;
                    total += score;
                    mcTotal += score;
                }
                mcMax += q.maxScore;
            } else if (q.type === Q_FREETEXT) {
                /* Section 0 questions are warm-up (unscored) — don't count them */
                if (q.maxScore > 0) ftCount++;
            }
        });
        return { sectionScores: sectionScores, total: total, mcTotal: mcTotal, mcMax: mcMax, ftCount: ftCount };
    }

    function getBand(score) {
        if (score >= 85) return { label: 'Launch Ready', className: 'band-ready' };
        if (score >= 70) return { label: 'Almost There', className: 'band-partial' };
        if (score >= 55) return { label: 'Needs Work', className: 'band-gaps' };
        if (score >= 40) return { label: 'Early Stage', className: 'band-gaps' };
        return { label: 'Reset', className: 'band-startover' };
    }

    function getWebhookBand(score) {
        if (score >= 85) return 'LAUNCH_READY';
        if (score >= 70) return 'ALMOST_THERE';
        if (score >= 55) return 'NEEDS_WORK';
        if (score >= 40) return 'EARLY_STAGE';
        return 'RESET';
    }

    function getBarColor(score, max) {
        var pct = max > 0 ? (score / max) * 100 : 0;
        if (pct >= 80) return '#22C55E';
        if (pct >= 60) return '#3B82F6';
        if (pct >= 40) return '#F59E0B';
        return '#EF4444';
    }

    /* ===================================
       WEBHOOK PAYLOAD
       =================================== */
    function buildWebhookPayload(contact) {
        var result = calculateScores();
        var answersMap = {};
        allQuestions.forEach(function(q) {
            if (q.type === Q_FREETEXT) {
                answersMap[q.id] = answers[q.id] || '';
            } else if (q.type === Q_MC_EVIDENCE) {
                answersMap[q.id] = q.id in answers ? q.options[answers[q.id]].score : 0;
                answersMap[q.id + '_evidence'] = answers[q.id + '_evidence'] || '';
            } else {
                answersMap[q.id] = q.id in answers ? q.options[answers[q.id]].score : 0;
            }
        });

        var sectionScoresNamed = {};
        Object.keys(SECTION_NAME_MAP).forEach(function(key) {
            sectionScoresNamed[SECTION_NAME_MAP[key]] = result.sectionScores[key] || 0;
        });

        return {
            assessment: ASSESSMENT_ID,
            venture_name: answers['s0_2'] || '',
            answers: answersMap,
            section_scores: sectionScoresNamed,
            total_score: result.total,
            mc_score: result.mcTotal,
            band: getWebhookBand(result.total),
            contact: contact
        };
    }

    /* ===================================
       CONTACT FORM
       =================================== */
    function submitContact() {
        var nameEl = document.getElementById('contactName');
        var emailEl = document.getElementById('contactEmail');
        var companyEl = document.getElementById('contactCompany');
        var name = nameEl.value.trim();
        var email = emailEl.value.trim().toLowerCase();
        var company = companyEl.value.trim();

        var valid = true;
        if (!name) { nameEl.style.borderColor = '#EF4444'; valid = false; } else { nameEl.style.borderColor = ''; }
        if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { emailEl.style.borderColor = '#EF4444'; valid = false; } else { emailEl.style.borderColor = ''; }
        if (!company) { companyEl.style.borderColor = '#EF4444'; valid = false; } else { companyEl.style.borderColor = ''; }
        if (!valid) return;

        capturedEmail = email;
        try { localStorage.setItem('eo_user_email', email); } catch (e) {}
        var contact = { name: name, email: email, company: company };
        var payload = buildWebhookPayload(contact);

        $loadingOverlay.classList.add('active');

        fetch('https://ai.mamounalamouri.smorchestra.com/webhook/eo-project-definition', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
        .then(function(resp) { return resp.json(); })
        .then(function(data) {
            aiData = data;
            $loadingOverlay.classList.remove('active');
            showResults();
        })
        .catch(function() {
            $loadingOverlay.classList.remove('active');
            showResults();
        });
    }

    function skipContact() {
        aiData = null;
        showResults();
    }

    /* ===================================
       RESULTS DISPLAY
       =================================== */
    function saveCompletionStatus(scoreId, score) {
        try {
            var status = JSON.parse(localStorage.getItem('eo_completion_status') || '{}');
            status[scoreId] = { score: score, date: new Date().toISOString().split('T')[0] };
            localStorage.setItem('eo_completion_status', JSON.stringify(status));
        } catch (e) {}
    }

    function showResults() {
        var result = calculateScores();
        var sectionScores = result.sectionScores;
        var total = result.mcTotal;
        var band = getBand(total);

        /* Save for dashboard — use MC score since FT is AI-scored */
        saveCompletionStatus('pd', total);
        /* Ensure venture name is saved in completion status */
        try {
            var completionStatus = JSON.parse(localStorage.getItem('eo_completion_status') || '{}');
            completionStatus.ventureName = answers['s0_2'] || completionStatus.ventureName || '';
            localStorage.setItem('eo_completion_status', JSON.stringify(completionStatus));
        } catch(e) {}

        /* Also store all answers for downstream scorecards */
        try {
            var downstream = {};
            allQuestions.forEach(function(q) {
                if (q.type === Q_FREETEXT) {
                    downstream[q.id] = answers[q.id] || '';
                } else if (q.type === Q_MC_EVIDENCE) {
                    downstream[q.id] = q.id in answers ? q.options[answers[q.id]].label : '';
                    downstream[q.id + '_evidence'] = answers[q.id + '_evidence'] || '';
                } else if (q.type === Q_MC) {
                    downstream[q.id] = q.id in answers ? q.options[answers[q.id]].label : '';
                }
            });
            downstream.niche = answers['b3'] || '';
            downstream.positioning = answers['c1'] || '';
            downstream.geography = answers['f1'] !== undefined ? allQuestions.find(function(q) { return q.id === 'f1'; }).options[answers['f1']].label : '';
            downstream.language = answers['f2'] !== undefined ? allQuestions.find(function(q) { return q.id === 'f2'; }).options[answers['f2']].label : '';
            downstream.ventureName = answers['s0_2'] || '';
            downstream.ideaDescription = answers['s0_1'] || '';
            localStorage.setItem('eo-project-definition', JSON.stringify(downstream));
        } catch (e) {}

        var html = '';

        /* Score Hero */
        html += '<div class="score-hero ' + band.className + '">';
        html += '<div class="score-circle"><div class="score-circle-inner">';
        html += '<span class="score-number">' + total + '</span>';
        html += '<span class="score-total">/ ' + result.mcMax + '</span>';
        html += '</div></div>';
        html += '<div class="band-label">' + band.label + '</div>';
        html += '<div class="band-subtitle">Project Definition MC Score</div>';
        if (result.ftCount > 0) {
            html += '<div class="pending-ai-badge">' + result.ftCount + ' free-text answers pending AI review</div>';
        }
        html += '</div>';

        /* Section Breakdown */
        html += '<div class="results-card"><h3>Section Breakdown</h3>';
        var sectionOrder = ['A', 'B', 'C', 'D', 'E', 'F'];
        sectionOrder.forEach(function(sid) {
            var sec = null;
            for (var i = 0; i < SECTIONS.length; i++) { if (SECTIONS[i].id === sid) { sec = SECTIONS[i]; break; } }
            var score = sectionScores[sid] || 0;
            var max = SECTION_MAXES[sid];
            var pct = max > 0 ? Math.round((score / max) * 100) : 0;
            var color = getBarColor(score, max);
            html += '<div class="section-bar-row">';
            html += '<div class="section-bar-label">' + sec.name + '</div>';
            html += '<div class="section-bar-track"><div class="section-bar-fill" style="width:' + pct + '%;background:' + color + '"></div></div>';
            html += '<div class="section-bar-score">' + score + ' / ' + max + '</div>';
            html += '</div>';
        });
        html += '</div>';

        /* Answers Summary (includes Section 0 warm-up) */
        html += '<div class="results-card"><h3>Your Answers</h3>';
        var answerSectionOrder = ['0', 'A', 'B', 'C', 'D', 'E', 'F'];
        answerSectionOrder.forEach(function(sid) {
            var sec = null;
            for (var i = 0; i < SECTIONS.length; i++) { if (SECTIONS[i].id === sid) { sec = SECTIONS[i]; break; } }
            html += '<h4 style="font-size:14px;color:var(--eo-orange);margin:16px 0 8px;">Section ' + sid + ': ' + sec.fullName + '</h4>';
            allQuestions.forEach(function(q) {
                if (q.sectionId !== sid) return;
                html += '<div class="answer-block">';
                html += '<div class="q-label">' + q.id.toUpperCase() + '</div>';
                html += '<div class="q-text">' + escapeHtml(q.text) + '</div>';
                if (q.type === Q_FREETEXT) {
                    html += '<div class="a-text">' + escapeHtml(answers[q.id] || '(No answer)') + '</div>';
                } else if (q.type === Q_MC_EVIDENCE) {
                    var opt = q.id in answers ? q.options[answers[q.id]] : null;
                    html += '<div class="a-mc">' + (opt ? escapeHtml(opt.label) + ' (Score: ' + opt.score + '/' + q.maxScore + ')' : '(No answer)') + '</div>';
                    if (answers[q.id + '_evidence']) {
                        html += '<div class="a-text" style="margin-top:8px;font-size:13px;"><strong>Evidence:</strong> ' + escapeHtml(answers[q.id + '_evidence']) + '</div>';
                    }
                } else {
                    var opt = q.id in answers ? q.options[answers[q.id]] : null;
                    html += '<div class="a-mc">' + (opt ? escapeHtml(opt.label) + ' (Score: ' + opt.score + '/' + q.maxScore + ')' : '(No answer)') + '</div>';
                }
                html += '</div>';
            });
        });
        html += '</div>';

        /* Recommendations */
        html += '<div class="results-card"><h3>Recommendations by Section</h3>';
        sectionOrder.forEach(function(sid) {
            var sec = null;
            for (var i = 0; i < SECTIONS.length; i++) { if (SECTIONS[i].id === sid) { sec = SECTIONS[i]; break; } }
            var score = sectionScores[sid] || 0;
            var max = SECTION_MAXES[sid];
            var pct = max > 0 ? Math.round((score / max) * 100) : 0;
            var icon = pct >= 80 ? '\u2705' : pct >= 60 ? '\uD83D\uDFE1' : '\u26A0\uFE0F';
            html += '<div class="reco-section">';
            html += '<div class="reco-header"><span class="reco-icon">' + icon + '</span>';
            html += '<span class="reco-title">' + sec.name + ': ' + sec.fullName + ' (' + score + '/' + max + ')</span></div>';
            if (RECOMMENDATIONS[sid]) {
                html += '<ul class="reco-list">';
                RECOMMENDATIONS[sid].forEach(function(r) { html += '<li>' + escapeHtml(r) + '</li>'; });
                html += '</ul>';
            }
            html += '</div>';
        });
        html += '</div>';

        /* AI Section */
        if (aiData) {
            html += '<div class="ai-section">';
            html += '<span class="ai-badge">Advanced Analysis & Recommendation</span>';
            if (aiData.key_insight || aiData.keyInsight) {
                html += '<h3>Key Insight</h3><p class="ai-insight">' + escapeHtml(aiData.key_insight || aiData.keyInsight) + '</p>';
            }
            if (aiData.thirty_day_plan || aiData.thirtyDayPlan || aiData['30_day_plan']) {
                var plan = aiData.thirty_day_plan || aiData.thirtyDayPlan || aiData['30_day_plan'];
                html += '<div class="ai-plan"><h4>30-Day Action Plan</h4>';
                if (typeof plan === 'string') { html += '<p>' + escapeHtml(plan) + '</p>'; }
                else if (Array.isArray(plan)) { html += '<ul>'; plan.forEach(function(item) { html += '<li>' + escapeHtml(typeof item === 'string' ? item : (item.action || item.text || JSON.stringify(item))) + '</li>'; }); html += '</ul>'; }
                html += '</div>';
            }
            if (aiData.recommendations || aiData.ai_recommendations) {
                var aiRecs = aiData.recommendations || aiData.ai_recommendations;
                html += '<h3>AI Recommendations</h3><ul class="ai-reco-list">';
                if (Array.isArray(aiRecs)) { aiRecs.forEach(function(r) { html += '<li>' + escapeHtml(typeof r === 'string' ? r : (r.text || r.recommendation || JSON.stringify(r))) + '</li>'; }); }
                html += '</ul>';
            }
            html += '</div>';
        }

        /* CTAs */
        html += '<div class="results-cta">';
        html += '<a href="EO-Assessment-Dashboard.html" class="btn-primary" style="display:inline-block;text-decoration:none;text-align:center;">Go to Dashboard</a>';
        html += '<button class="btn-download-md" id="btnDownloadMd">Download Results (MD)</button>';
        html += '<button class="btn-download-pdf" id="btnDownloadPdf">Download Results (PDF)</button>';
        html += '<button class="btn-retake" id="btnRetake">Retake Assessment</button>';
        html += '</div>';

        $resultsContent.innerHTML = html;
        showScreen('screenResults');
        window.scrollTo({ top: 0, behavior: 'smooth' });

        document.getElementById('btnRetake').addEventListener('click', retakeAssessment);
        document.getElementById('btnDownloadMd').addEventListener('click', generateMarkdownExport);
        document.getElementById('btnDownloadPdf').addEventListener('click', generatePdfExport);
    }

    function escapeHtml(text) {
        var div = document.createElement('div');
        div.appendChild(document.createTextNode(text));
        return div.innerHTML;
    }

    /* ===================================
       MARKDOWN EXPORT
       =================================== */
    function generateMarkdownExport() {
        var result = calculateScores();
        var sectionScores = result.sectionScores;
        var today = new Date();
        var dateStr = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');
        var band = getBand(result.mcTotal);

        var ventureName = answers['s0_2'] || '';
        var md = '';
        md += '# Project Definition Scorecard Results\n\n';
        if (ventureName) md += '**Venture:** ' + ventureName + '\n';
        md += '**Student:** ' + capturedEmail + '\n';
        md += '**Date:** ' + dateStr + '\n';
        md += '**MC Score:** ' + result.mcTotal + '/' + result.mcMax + ' \u2014 ' + band.label + '\n';
        md += '**Free-text questions:** ' + result.ftCount + ' (pending AI review)\n\n';
        md += '---\n\n';

        /* Section Breakdown */
        md += '## Section Breakdown\n\n';
        var sectionOrder = ['A', 'B', 'C', 'D', 'E', 'F'];
        sectionOrder.forEach(function(sid) {
            var sec = null;
            for (var i = 0; i < SECTIONS.length; i++) { if (SECTIONS[i].id === sid) { sec = SECTIONS[i]; break; } }
            var score = sectionScores[sid] || 0;
            var max = SECTION_MAXES[sid];
            var pct = max > 0 ? Math.round((score / max) * 100) : 0;
            var strength = pct >= 80 ? '\u2705 Strong' : pct >= 60 ? '\uD83D\uDFE1 Needs Work' : '\u26A0\uFE0F Weak';
            md += '- **' + sec.name + ': ' + sec.fullName + '** \u2014 ' + score + '/' + max + ' (' + pct + '%) ' + strength + '\n';
        });
        md += '\n---\n\n';

        /* Full Answers by Section (includes Section 0 warm-up) */
        md += '## Answers\n\n';
        var mdAnswerOrder = ['0', 'A', 'B', 'C', 'D', 'E', 'F'];
        mdAnswerOrder.forEach(function(sid) {
            var sec = null;
            for (var i = 0; i < SECTIONS.length; i++) { if (SECTIONS[i].id === sid) { sec = SECTIONS[i]; break; } }
            md += '### Section ' + sid + ': ' + sec.fullName + '\n\n';
            allQuestions.forEach(function(q) {
                if (q.sectionId !== sid) return;
                md += '**' + q.id.toUpperCase() + '.** ' + q.text + '\n\n';
                if (q.type === Q_FREETEXT) {
                    md += '> ' + (answers[q.id] || '(No answer)').replace(/\n/g, '\n> ') + '\n\n';
                    if (q.rubric) md += '_Rubric: ' + q.rubric + '_\n\n';
                } else if (q.type === Q_MC_EVIDENCE) {
                    var opt = q.id in answers ? q.options[answers[q.id]] : null;
                    md += '\u2192 **Selected:** ' + (opt ? opt.label + ' (Score: ' + opt.score + '/' + q.maxScore + ')' : '(No answer)') + '\n\n';
                    if (answers[q.id + '_evidence']) {
                        md += '**Evidence:** ' + answers[q.id + '_evidence'] + '\n\n';
                    }
                } else {
                    var opt = q.id in answers ? q.options[answers[q.id]] : null;
                    md += '\u2192 **Selected:** ' + (opt ? opt.label + ' (Score: ' + opt.score + '/' + q.maxScore + ')' : '(No answer)') + '\n\n';
                }
            });
        });

        /* Recommendations */
        md += '---\n\n## Recommendations\n\n';
        sectionOrder.forEach(function(sid) {
            var sec = null;
            for (var i = 0; i < SECTIONS.length; i++) { if (SECTIONS[i].id === sid) { sec = SECTIONS[i]; break; } }
            var score = sectionScores[sid] || 0;
            var max = SECTION_MAXES[sid];
            md += '### ' + sec.name + ': ' + sec.fullName + ' (' + score + '/' + max + ')\n\n';
            if (RECOMMENDATIONS[sid]) {
                RECOMMENDATIONS[sid].forEach(function(r) { md += '- ' + r + '\n'; });
            }
            md += '\n';
        });

        /* AI Analysis */
        if (aiData) {
            md += '---\n\n## Advanced Analysis\n\n';
            if (aiData.key_insight || aiData.keyInsight) md += '### Key Insight\n\n' + (aiData.key_insight || aiData.keyInsight) + '\n\n';
            if (aiData.thirty_day_plan || aiData.thirtyDayPlan || aiData['30_day_plan']) {
                var plan = aiData.thirty_day_plan || aiData.thirtyDayPlan || aiData['30_day_plan'];
                md += '### 30-Day Action Plan\n\n';
                if (typeof plan === 'string') md += plan + '\n\n';
                else if (Array.isArray(plan)) { plan.forEach(function(item) { md += '- ' + (typeof item === 'string' ? item : (item.action || item.text || JSON.stringify(item))) + '\n'; }); md += '\n'; }
            }
            if (aiData.recommendations || aiData.ai_recommendations) {
                var aiRecs = aiData.recommendations || aiData.ai_recommendations;
                md += '### AI Recommendations\n\n';
                if (Array.isArray(aiRecs)) { aiRecs.forEach(function(r) { md += '- ' + (typeof r === 'string' ? r : (r.text || r.recommendation || JSON.stringify(r))) + '\n'; }); md += '\n'; }
            }
        }

        /* AI Scoring Instructions */
        md += '---\n\n## AI Scoring Instructions\n\n';
        md += 'To score the free-text answers, copy this file into Claude.ai along with:\n';
        md += '- `project-files-scoring/SKILL.md`\n\n';
        md += 'Ask: "Score these Project Definition answers using the rubric provided. Return section scores and total."\n\n';

        var blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = 'project-definition-results-' + dateStr + '.md';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    /* ===================================
       PDF EXPORT (Print-Friendly Div)
       =================================== */
    function generatePdfExport() {
        var printDiv = document.createElement('div');
        printDiv.id = 'pdfPrintContainer';
        printDiv.style.cssText = 'position:absolute;left:-9999px;top:0;width:800px;background:#FFFFFF;color:#1A1A2E;padding:40px;font-family:Inter,sans-serif;';

        var source = document.getElementById('resultsContent');
        if (!source) return;
        var clone = source.cloneNode(true);

        /* Convert textareas to styled divs */
        var tas = clone.querySelectorAll('textarea');
        for (var i = 0; i < tas.length; i++) {
            var div = document.createElement('div');
            div.style.cssText = 'border:1px solid #E5E7EB;border-radius:8px;padding:12px;min-height:40px;white-space:pre-wrap;font-size:14px;color:#1A1A2E;background:#F9FAFB;margin-bottom:8px;';
            div.textContent = tas[i].value || '(No response)';
            tas[i].parentNode.replaceChild(div, tas[i]);
        }

        /* Fix colors for PDF readability */
        clone.style.color = '#1A1A2E';
        var allEls = clone.querySelectorAll('*');
        for (var j = 0; j < allEls.length; j++) {
            var el = allEls[j];
            var cs = el.currentStyle || window.getComputedStyle(el);
            if (cs.color === 'rgb(255, 255, 255)' || cs.color === '#ffffff' || cs.color === '#FFFFFF') {
                el.style.color = '#1A1A2E';
            }
            if (cs.backgroundColor && cs.backgroundColor.indexOf('26, 26, 46') !== -1) {
                el.style.backgroundColor = '#FFFFFF';
            }
        }

        printDiv.appendChild(clone);
        document.body.appendChild(printDiv);

        var dateStr = new Date().toISOString().split('T')[0];
        var opt = {
            margin: [10, 10, 10, 10],
            filename: 'project-definition-results-' + dateStr + '.pdf',
            image: { type: 'jpeg', quality: 0.95 },
            html2canvas: { scale: 2, useCORS: true, backgroundColor: '#FFFFFF' },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
            pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
        };

        html2pdf().set(opt).from(printDiv).save().then(function() {
            document.body.removeChild(printDiv);
        }).catch(function() {
            try { document.body.removeChild(printDiv); } catch (e) {}
        });
    }

    /* ===================================
       RETAKE
       =================================== */
    function retakeAssessment() {
        answers = {};
        currentIndex = 0;
        aiData = null;
        try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
        $emailInput.value = '';
        showScreen('screenEmail');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    /* ===================================
       BOOT
       =================================== */
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }

})();

/* RTL Toggle (global scope) */
function toggleRTL() {
    document.body.classList.toggle('rtl');
    var isRTL = document.body.classList.contains('rtl');
    document.documentElement.lang = isRTL ? 'ar' : 'en';
    document.documentElement.dir = isRTL ? 'rtl' : 'ltr';
    try { localStorage.setItem('eo-rtl', isRTL ? '1' : '0'); } catch(e) {}
}
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
