<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrepreneurs Oasis MENA — Project Definition Scoring</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root {
    --eo-dark: #050A12;
    --eo-orange: #FF6600;
    --eo-beige: #0C1220;
    --eo-card-bg: #111827;
    --eo-gray-text: #94A3B8;
    --eo-gray-border: rgba(255,255,255,0.06);
    --eo-shadow: 0 2px 8px rgba(0,0,0,0.3);
    --eo-radius: 14px;
    --eo-radius-sm: 8px;
    --eo-transition: 300ms ease;
    --green: #22C55E;
    --gold: #D97706;
    --red: #EF4444;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--eo-dark);
    color: #FFFFFF;
    min-height: 100vh;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
}

/* RTL Support */
body.rtl { direction: rtl; text-align: right; }
body.rtl .nav-buttons { flex-direction: row-reverse; }
body.rtl .section-bar-row { flex-direction: row-reverse; }
body.rtl .progress-meta { flex-direction: row-reverse; }
body.rtl .option-card { text-align: right; }

/* RTL Toggle */
.rtl-toggle {
    position: fixed;
    top: 12px;
    right: 12px;
    z-index: 999;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    padding: 6px 14px;
    border-radius: var(--eo-radius-sm);
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    transition: all var(--eo-transition);
}
.rtl-toggle:hover { background: rgba(255,255,255,0.2); }

/* Header */
.eo-header {
    text-align: center;
    padding: 28px 20px 12px;
}
.eo-header h1 {
    font-size: 22px;
    font-weight: 800;
    color: #FFFFFF;
}
.eo-header h1 span { color: var(--eo-orange); }

/* Section Label */
.section-label {
    font-size: 14px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #9CA3AF;
    text-align: center;
    margin-bottom: 4px;
}

/* Progress Bar */
.progress-wrapper {
    max-width: 640px;
    margin: 0 auto 24px;
    padding: 0 20px;
}
.progress-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
}
.progress-meta .section-label { margin-bottom: 0; text-align: left; }
.progress-counter {
    font-size: 13px;
    color: #9CA3AF;
    font-weight: 500;
}
.progress-track {
    width: 100%;
    height: 8px;
    background: #2D2D44;
    border-radius: 4px;
    overflow: hidden;
}
.progress-fill {
    height: 100%;
    background: var(--eo-orange);
    border-radius: 4px;
    transition: width var(--eo-transition);
    width: 0%;
}

/* Screens */
.screen { display: none; }
.screen.active { display: block; }

/* Auth Screen */
.auth-capture {
    max-width: 480px;
    margin: 60px auto;
    padding: 40px;
    text-align: center;
    background: var(--eo-beige);
    border-radius: var(--eo-radius);
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
.auth-capture h2 {
    font-size: 26px;
    font-weight: 800;
    color: #F1F5F9;
    margin-bottom: 8px;
}
.auth-capture .intro-badge {
    display: inline-block;
    background: var(--eo-orange);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 4px;
    letter-spacing: 0.5px;
    margin-bottom: 12px;
}
.auth-capture p {
    color: var(--eo-gray-text);
    margin-bottom: 24px;
    font-size: 15px;
}
.auth-capture label {
    display: block;
    text-align: left;
    font-size: 12px;
    font-weight: 700;
    color: #F1F5F9;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
    margin-top: 16px;
}
.auth-capture input {
    width: 100%;
    padding: 14px 16px;
    border: 2px solid var(--eo-gray-border);
    border-radius: var(--eo-radius-sm);
    font-size: 15px;
    font-family: inherit;
    outline: none;
    transition: border-color var(--eo-transition);
    color: #F1F5F9;
}
.auth-capture input:focus { border-color: var(--eo-orange); }
.auth-capture .q-hint {
    font-size: 12px;
    color: var(--eo-gray-text);
    text-align: left;
    margin-top: 6px;
}
.auth-capture .btn-primary { width: 100%; margin-top: 20px; }

/* Question Card */
.question-card {
    background: var(--eo-beige);
    border-radius: var(--eo-radius);
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    padding: 32px;
    max-width: 640px;
    margin: 0 auto;
    position: relative;
}

.question-text {
    font-size: 20px;
    font-weight: 700;
    color: var(--eo-orange);
    text-align: center;
    margin-bottom: 12px;
    line-height: 1.35;
}
.question-help {
    font-size: 13px;
    color: var(--eo-gray-text);
    text-align: center;
    margin-bottom: 20px;
    line-height: 1.5;
    font-style: italic;
}

/* Free-text Input */
.freetext-input {
    width: 100%;
    padding: 16px;
    border: 2px solid var(--eo-gray-border);
    border-radius: var(--eo-radius-sm);
    font-size: 15px;
    font-family: inherit;
    resize: vertical;
    min-height: 160px;
    outline: none;
    transition: border-color var(--eo-transition);
    color: #F1F5F9;
    line-height: 1.5;
    background: var(--eo-card-bg);
}
.freetext-input:focus { border-color: var(--eo-orange); }
.freetext-input::placeholder { color: #9CA3AF; font-size: 14px; }

.char-count {
    text-align: right;
    font-size: 12px;
    color: #9CA3AF;
    margin-top: 6px;
}

/* Nav Buttons */
.nav-buttons {
    display: flex;
    justify-content: space-between;
    align-items: center;
    max-width: 640px;
    margin: 24px auto 0;
    padding: 0 20px;
    gap: 12px;
}
.btn {
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    padding: 12px 28px;
    border-radius: var(--eo-radius-sm);
    cursor: pointer;
    transition: all var(--eo-transition);
    border: none;
    outline: none;
}
.btn-prev {
    background: transparent;
    border: 2px solid #FFFFFF;
    color: #FFFFFF;
}
.btn-prev:hover { background: rgba(255,255,255,0.15); }
.btn-prev.hidden { visibility: hidden; pointer-events: none; }
.btn-next {
    background: var(--eo-orange);
    color: #FFFFFF;
}
.btn-next:hover { background: #d4441a; }
.btn-next:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-primary {
    background: var(--eo-orange);
    color: #FFFFFF;
    font-size: 16px;
    font-weight: 700;
    padding: 14px 32px;
    border: none;
    border-radius: var(--eo-radius-sm);
    cursor: pointer;
    font-family: inherit;
    transition: all var(--eo-transition);
}
.btn-primary:hover { background: #d4441a; }

/* Toast */
.toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-100px);
    background: var(--eo-dark);
    color: #fff;
    padding: 12px 24px;
    border-radius: var(--eo-radius-sm);
    font-size: 14px;
    font-weight: 500;
    z-index: 1000;
    transition: transform 0.4s ease;
    white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* Loading */
.loading-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26,26,46,0.9);
    z-index: 2000;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    gap: 20px;
}
.loading-overlay.active { display: flex; }
.spinner {
    width: 48px;
    height: 48px;
    border: 4px solid #2D2D44;
    border-top-color: var(--eo-orange);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-overlay p { font-size: 16px; font-weight: 500; }

/* Results */
.results-container {
    max-width: 720px;
    margin: 0 auto;
    padding: 0 20px 60px;
}
.score-hero {
    text-align: center;
    padding: 40px 20px 32px;
}
.score-gauge {
    width: 160px;
    height: 160px;
    margin: 0 auto 16px;
    position: relative;
}
.score-gauge svg { width: 100%; height: 100%; }
.score-gauge-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
}
.score-gauge-number { font-size: 42px; font-weight: 800; display: block; }
.score-gauge-label { font-size: 12px; color: #9CA3AF; }
.band-label {
    font-size: 18px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 4px;
}
.band-subtitle { font-size: 14px; color: #9CA3AF; }

.results-card {
    background: rgba(255,255,255,0.06);
    border-radius: var(--eo-radius);
    padding: 24px;
    margin-bottom: 20px;
}
.results-card h3 {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 16px;
    color: #FFFFFF;
}

/* Polished Output */
.polished-card {
    background: linear-gradient(135deg, rgba(255,102,0,0.08), rgba(255,102,0,0.02));
    border: 1px solid rgba(255,102,0,0.2);
    border-radius: var(--eo-radius);
    padding: 28px;
    margin-bottom: 20px;
}
.polished-card h3 {
    font-size: 15px;
    font-weight: 700;
    color: var(--eo-orange);
    margin-bottom: 12px;
}
.polished-section {
    margin-bottom: 16px;
}
.polished-section h4 {
    font-size: 12px;
    font-weight: 700;
    color: var(--eo-orange);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
}
.polished-section p {
    font-size: 14px;
    color: #D1D5DB;
    line-height: 1.6;
}

/* Sharpen These Cards */
.sharpen-card {
    background: rgba(255,255,255,0.04);
    border-left: 4px solid var(--gold);
    border-radius: 0 var(--eo-radius-sm) var(--eo-radius-sm) 0;
    padding: 16px 20px;
    margin-bottom: 12px;
}
.sharpen-card h4 {
    font-size: 14px;
    font-weight: 700;
    color: #FFFFFF;
    margin-bottom: 6px;
}
.sharpen-card p {
    font-size: 13px;
    color: #D1D5DB;
    line-height: 1.5;
}

/* Section bars */
.section-bar-row {
    display: flex;
    align-items: center;
    margin-bottom: 14px;
    gap: 12px;
}
.section-bar-label {
    width: 120px;
    font-size: 13px;
    font-weight: 600;
    color: #D1D5DB;
    flex-shrink: 0;
}
.section-bar-track {
    flex: 1;
    height: 12px;
    background: #2D2D44;
    border-radius: 6px;
    overflow: hidden;
}
.section-bar-fill {
    height: 100%;
    border-radius: 6px;
    transition: width 0.5s ease;
}
.section-bar-score {
    width: 50px;
    text-align: right;
    font-size: 13px;
    font-weight: 600;
    color: #D1D5DB;
    flex-shrink: 0;
}

/* CTA */
.results-cta {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    margin-top: 32px;
}
.btn-download-md {
    background: transparent;
    border: 2px solid var(--eo-orange);
    color: var(--eo-orange);
    padding: 12px 28px;
    border-radius: var(--eo-radius-sm);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: all var(--eo-transition);
    min-width: 280px;
}
.btn-download-md:hover { background: var(--eo-orange); color: #FFFFFF; }
.btn-retake {
    background: transparent;
    border: 2px solid #FFFFFF;
    color: #FFFFFF;
    padding: 12px 28px;
    border-radius: var(--eo-radius-sm);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: all var(--eo-transition);
    min-width: 280px;
}
.btn-retake:hover { background: rgba(255,255,255,0.15); }

/* Engagement Breaks */
.engagement-break {
    max-width: 640px;
    margin: 0 auto 24px;
    padding: 0 20px;
}
.engagement-break-card {
    background: linear-gradient(135deg, #1a1a1a, #0f0f0f);
    border-left: 4px solid var(--eo-orange);
    border-radius: var(--eo-radius-sm);
    padding: 16px 20px;
}
.engagement-break-card p {
    font-size: 14px;
    color: #D1D5DB;
    line-height: 1.6;
    font-style: italic;
}

/* Retrieval Banner */
.retrieval-banner {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-left: 4px solid var(--green);
    border-radius: var(--eo-radius-sm);
    padding: 16px 20px;
    margin-top: 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
}
.retrieval-score {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: rgba(255,102,0,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 800;
    color: var(--eo-orange);
    flex-shrink: 0;
}
.retrieval-info { flex: 1; min-width: 120px; }
.retrieval-info strong { display: block; font-size: 14px; color: #fff; }
.retrieval-info span { font-size: 12px; color: #9CA3AF; }
.retrieval-actions { display: flex; gap: 8px; }
.retrieval-actions button {
    padding: 8px 16px;
    border-radius: var(--eo-radius-sm);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    border: none;
    transition: all var(--eo-transition);
}
.btn-view-results { background: transparent; border: 1px solid var(--eo-orange); color: var(--eo-orange); }
.btn-view-results:hover { background: var(--eo-orange); color: #fff; }
.btn-start-fresh { background: var(--eo-orange); color: #fff; }
.btn-start-fresh:hover { background: #d4441a; }

/* Mobile */
@media (max-width: 680px) {
    .question-card { margin: 0 16px; padding: 24px 20px; }
    .nav-buttons { padding: 0 16px; }
    .question-text { font-size: 18px; }
    .progress-wrapper { padding: 0 16px; }
    .freetext-input { min-height: 120px; }
    .auth-capture { margin: 40px 16px; padding: 28px 20px; }
    .retrieval-banner { flex-direction: column; text-align: center; }
    .scroll-margin { scroll-margin-top: 120px; }
}
</style>
</head>
<body>

<button class="rtl-toggle" onclick="toggleRTL()">EN / عربي</button>
<div class="toast" id="toast"></div>
<div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <p>Generating your clarity analysis...</p>
</div>

<div class="eo-header">
    <h1>Entrepreneurs <span>Oasis MENA</span></h1>
</div>

<!-- AUTH SCREEN -->
<div class="screen active" id="screenAuth">
    <div class="auth-capture">
        <div class="intro-badge">STEP 1 OF 5</div>
        <h2>Project Definition</h2>
        <p>7 questions. ~15 minutes. Build your venture foundation.</p>

        <label>Your Email</label>
        <input type="email" id="auth-email" placeholder="founder@company.com" autocomplete="email">

        <label>Venture Name</label>
        <input type="text" id="auth-venture" placeholder="e.g., Dubai Real Estate CRM" minlength="3">
        <div class="q-hint">Give your venture a working name. This identifies your assessment across all 5 scorecards.</div>

        <button class="btn-primary" onclick="handleAuth()">Begin Assessment →</button>
        <div id="auth-error" style="color:var(--red);font-size:13px;margin-top:12px;display:none"></div>
        <div id="retrieval-banner" style="display:none"></div>
    </div>
</div>

<!-- QUESTION SCREEN -->
<div class="screen" id="screenStepper">
    <div class="progress-wrapper">
        <div class="progress-meta">
            <div class="section-label" id="sectionLabel">Your Venture</div>
            <div class="progress-counter" id="progressCounter">Question 1 of 7</div>
        </div>
        <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
        </div>
    </div>
    <div id="engagementSlot"></div>
    <div class="question-card" id="questionCard">
        <div class="question-text" id="questionText"></div>
        <div class="question-help" id="questionHelp" style="display:none"></div>
        <div id="answerArea"></div>
    </div>
    <div class="nav-buttons">
        <button class="btn btn-prev hidden" id="btnPrev" onclick="prevQuestion()">← Previous</button>
        <button class="btn btn-next" id="btnNext" onclick="nextQuestion()" disabled>Next →</button>
    </div>
</div>

<!-- RESULTS SCREEN -->
<div class="screen" id="screenResults">
    <div class="results-container" id="resultsContent"></div>
</div>

<script>
// ========================================
// SHARED PATTERNS (from SHARED-PATTERNS.md)
// ========================================

function slugify(text) {
  return text
    .toString()
    .toLowerCase()
    .trim()
    .replace(/\s+/g, '-')
    .replace(/[^\w\-]+/g, '')
    .replace(/\-\-+/g, '-')
    .replace(/^-+/, '')
    .replace(/-+$/, '');
}

function getVentures(email) {
  try { return JSON.parse(localStorage.getItem('eo_ventures_' + email) || '[]'); }
  catch(e) { return []; }
}

function saveVenture(email, ventureName) {
  var slug = slugify(ventureName);
  if (slug.length < 2) slug = 'venture-' + Date.now().toString(36);
  var ventures = getVentures(email);
  var existing = ventures.find(function(v) { return v.venture_slug === slug; });
  if (existing) {
    existing.last_active = new Date().toISOString().split('T')[0];
    localStorage.setItem('eo_ventures_' + email, JSON.stringify(ventures));
    return { venture_name: existing.venture_name, venture_slug: slug, isNew: false };
  }
  var venture = {
    venture_name: ventureName.trim(),
    venture_slug: slug,
    created_at: new Date().toISOString().split('T')[0],
    last_active: new Date().toISOString().split('T')[0]
  };
  ventures.push(venture);
  localStorage.setItem('eo_ventures_' + email, JSON.stringify(ventures));
  return { venture_name: venture.venture_name, venture_slug: slug, isNew: true };
}

function updateVentureActivity(email, slug) {
  var ventures = getVentures(email);
  var venture = ventures.find(function(v) { return v.venture_slug === slug; });
  if (venture) {
    venture.last_active = new Date().toISOString().split('T')[0];
    localStorage.setItem('eo_ventures_' + email, JSON.stringify(ventures));
  }
}

function storageKey(type, scNumber, email, ventureSlug) {
  return 'eo_sc' + scNumber + '_' + type + '_' + email + '_' + ventureSlug;
}

function getScores(email, ventureSlug) {
  try { return JSON.parse(localStorage.getItem('eo_scores_' + email + '_' + ventureSlug) || '{}'); }
  catch(e) { return {}; }
}

function saveScore(email, ventureSlug, scNumber, score) {
  var scores = getScores(email, ventureSlug);
  scores['sc' + scNumber] = score;
  localStorage.setItem('eo_scores_' + email + '_' + ventureSlug, JSON.stringify(scores));
}

function getUpstreamAnswers(scNumber, email, ventureSlug) {
  try { return JSON.parse(localStorage.getItem(storageKey('answers', scNumber, email, ventureSlug)) || '{}'); }
  catch(e) { return {}; }
}

function getUpstreamResult(scNumber, email, ventureSlug) {
  try { return JSON.parse(localStorage.getItem(storageKey('result', scNumber, email, ventureSlug)) || 'null'); }
  catch(e) { return null; }
}

// Migration
function migrateOldData() {
  for (var i = 0; i < localStorage.length; i++) {
    var key = localStorage.key(i);
    var match = key ? key.match(/^eo_sc(\d)_answers_([^_]+@[^_]+\.[^_]+)$/) : null;
    if (match) {
      var migrationNeeded = {};
      try { migrationNeeded = JSON.parse(localStorage.getItem('eo_migration_pending') || '{}'); } catch(e) {}
      if (!migrationNeeded[match[2]]) migrationNeeded[match[2]] = [];
      if (migrationNeeded[match[2]].indexOf(parseInt(match[1])) === -1) migrationNeeded[match[2]].push(parseInt(match[1]));
      localStorage.setItem('eo_migration_pending', JSON.stringify(migrationNeeded));
    }
  }
}

function executeMigration(email, ventureName) {
  var slug = slugify(ventureName);
  for (var sc = 1; sc <= 5; sc++) {
    var oldA = localStorage.getItem('eo_sc' + sc + '_answers_' + email);
    if (oldA) { localStorage.setItem(storageKey('answers', sc, email, slug), oldA); localStorage.removeItem('eo_sc' + sc + '_answers_' + email); }
    var oldR = localStorage.getItem('eo_sc' + sc + '_result');
    if (oldR) { localStorage.setItem(storageKey('result', sc, email, slug), oldR); localStorage.removeItem('eo_sc' + sc + '_result'); }
  }
  var oldS = localStorage.getItem('eo-scores');
  if (oldS) { localStorage.setItem('eo_scores_' + email + '_' + slug, oldS); localStorage.removeItem('eo-scores'); }
  saveVenture(email, ventureName);
  var pending = {};
  try { pending = JSON.parse(localStorage.getItem('eo_migration_pending') || '{}'); } catch(e) {}
  delete pending[email];
  if (Object.keys(pending).length === 0) localStorage.removeItem('eo_migration_pending');
  else localStorage.setItem('eo_migration_pending', JSON.stringify(pending));
}

function nextQuestion() {
  var val = document.getElementById('currentAnswer').value.trim();

  answers[questions[currentQ].id] = val;

    currentQ++;

    window.scrollTo({ top: 0, behavior: 'smooth' });

// ========================================
// SCORING (AI Heuristic - client-side)
// ========================================

function scoreAnswer(text, id) {
  var score = 30; // base
  var words = countWords(text);

  // Length/depth
  if (words >= 20) score += 5;
  if (words >= 50) score += 5;
  if (words >= 100) score += 10;
  if (words >= 150) score += 5;

  // Specificity signals
  var specificity = 0;
  if (/\d+/.test(text)) specificity += 8; // numbers
  if (/\$|\bUSD|\bAED|\bSAR/.test(text)) specificity += 5; // currency
  if (/\b(dubai|abu dhabi|riyadh|jeddah|cairo|bahrain|kuwait|oman|qatar|saudi|uae|emirates|mena|gulf|gcc)\b/i.test(text)) specificity += 8; // MENA
  if (/\b(whatsapp|arabic|ramadan|arabic)\b/i.test(text)) specificity += 5; // MENA culture
  if (/"[^"]+"|'[^']+'/.test(text)) specificity += 3; // quoted specifics
  if (/\b\d+[-–]\d+\b/.test(text)) specificity += 3; // ranges

  // Competitive awareness
  if (/\b(competitor|alternative|vs|compared to|unlike|instead of|currently use|switch)\b/i.test(text)) specificity += 5;
  // Named companies
  if (/\b(zoho|hubspot|salesforce|freshworks|pipedrive|notion|slack|asana|stripe|paypal)\b/i.test(text)) specificity += 3;

  // Evidence
  if (/\b(interview|survey|pilot|tested|validated|customers? told|feedback|data shows)\b/i.test(text)) specificity += 8;
  if (/\b(revenue|mrr|arr|users|customers|clients|subscribers)\b/i.test(text)) specificity += 5;

  // Framework
  if (/\b(positioning|niche|mvp|pmf|product.market.fit|value prop|unfair advantage)\b/i.test(text)) specificity += 3;

  score += Math.min(specificity, 30);
  return Math.min(score, 100);
}

function calculateScores() {
  var sectionScores = {};
  var total = 0;

  questions.forEach(function(q) {
    var text = answers[q.id] || '';
    var s = scoreAnswer(text, q.id);
    sectionScores[q.id] = s;
    total += s;
  });

  var avgScore = Math.round(total / questions.length);

  return {
    total: avgScore,
    sections: sectionScores
  };
}

function getBand(score) {
  if (score >= 85) return { band: 'Launch Ready', color: 'var(--green)', cls: 'band-ready' };
  if (score >= 70) return { band: 'Almost There', color: 'var(--eo-orange)', cls: 'band-partial' };
  if (score >= 55) return { band: 'Needs Work', color: 'var(--gold)', cls: 'band-gaps' };
  if (score >= 40) return { band: 'Early Stage', color: 'var(--red)', cls: 'band-startover' };
  return { band: 'Reset', color: 'var(--red)', cls: 'band-startover' };
}

// ========================================
// POLISHED OUTPUT GENERATION
// ========================================

function generatePolishedOutput() {
  var a = answers;

  // Extract key phrases from answers
  var ventureDesc = (a.venture_intro || '').substring(0, 300);
  var nicheText = (a.niche || '').substring(0, 200);
  var posText = (a.positioning || '').substring(0, 200);
  var mvpText = (a.product_vision || '').substring(0, 200);

  return {
    venture_description: ventureDesc || 'No venture description provided.',
    niche_definition: nicheText || 'No niche defined.',
    positioning_statement: posText || 'No positioning statement provided.',
    mvp_scope: mvpText || 'No MVP scope defined.',
    founder_story: (a.founder_story || '').substring(0, 200),
    mena_context: (a.mena_context || '').substring(0, 200)
  };
}

function findWeakestAreas(sectionScores) {
  var sorted = Object.keys(sectionScores).map(function(k) {
    return { id: k, score: sectionScores[k] };
  }).sort(function(a, b) { return a.score - b.score; });

  var weakest = sorted.slice(0, 3);
  var labels = {
    venture_intro: { name: 'Venture Description', advice: 'Be more specific about the problem you solve, who experiences it, and the measurable cost of the status quo.' },
    founder_fit: { name: 'Founder Advantage', advice: 'Clarify your unique edge. Name specific experience, relationships, or insights that competitors lack.' },
    niche: { name: 'Niche Definition', advice: 'Your niche is too broad. Get specific: exact role, company size, geography, and current behavior.' },
    positioning: { name: 'Positioning', advice: 'Name your competitors explicitly and articulate what you do differently. Use the template: "[Product] is a _____ for _____ that _____ unlike _____."' },
    product_vision: { name: 'Product Vision', advice: 'Define your MVP more concretely. List 3-5 features and how quickly a user gets value.' },
    founder_story: { name: 'Founder Story', advice: 'Your story needs a personal hook. Why do YOU care about this problem? What happened to you?' },
    mena_context: { name: 'MENA Context', advice: 'Mention specific regional adaptations: Arabic language, WhatsApp integration, local payment methods, cultural timing (Ramadan, etc).' }
  };

  return weakest.map(function(w) {
    var info = labels[w.id] || { name: w.id, advice: 'Add more specificity and evidence.' };
    return { name: info.name, score: w.score, advice: info.advice };
  });
}

function finishAssessment() {
  document.getElementById('loadingOverlay').classList.add('active');

  setTimeout(function() {
    var scores = calculateScores();
    var bandInfo = getBand(scores.total);
    var polished = generatePolishedOutput();
    var weakAreas = findWeakestAreas(scores.sections);

    var resultObj = {
      score: scores.total,
      band: bandInfo.band,
      sections: scores.sections,
      polished_output: polished,
      weak_areas: weakAreas,
      completed_at: new Date().toISOString().split('T')[0]
    };

    // Save
    localStorage.setItem(storageKey('result', SC_NUMBER, userEmail, ventureSlug), JSON.stringify(resultObj));
    saveScore(userEmail, ventureSlug, SC_NUMBER, scores.total);
    saveAnswersToStorage();

    // Webhook
    sendToWebhook(scores, resultObj);

    document.getElementById('loadingOverlay').classList.remove('active');

  }, 1500);
}

function showScreen(id) {

  screens.forEach(function(s) { s.classList.remove('active'); });
  document.getElementById(id).classList.add('active');

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 3000);
}

function countWords(text) {
  if (!text || !text.trim()) return 0;
  return text.trim().split(/\s+/).length;
}

function escapeHtml(text) {
  if (!text) return '';
  return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function toggleRTL() {
  document.body.classList.toggle('rtl');
  var isRTL = document.body.classList.contains('rtl');
  document.documentElement.lang = isRTL ? 'ar' : 'en';
  document.documentElement.dir = isRTL ? 'rtl' : 'ltr';
  try { localStorage.setItem('eo-rtl', isRTL ? '1' : '0'); } catch(e) {}
}
