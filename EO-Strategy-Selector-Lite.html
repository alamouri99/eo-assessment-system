<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrepreneurs Oasis MENA — Strategy Selector Lite</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
    --eo-dark: #1A1A2E;
    --eo-orange: #E94D1B;
    --eo-beige: #FAF5EF;
    --eo-card-bg: #FFFFFF;
    --eo-gray-text: #6B7280;
    --eo-gray-border: #E5E7EB;
    --eo-shadow: 0 2px 8px rgba(0,0,0,0.08);
    --eo-radius: 12px;
    --eo-radius-sm: 8px;
    --eo-transition: 300ms ease;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--eo-dark);
    color: #FFFFFF;
    min-height: 100vh;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
}

/* Header */
.eo-header {
    text-align: center;
    padding: 28px 20px 12px;
}
.eo-header h1 {
    font-size: 22px;
    font-weight: 800;
    color: #FFFFFF;
}
.eo-header h1 span { color: var(--eo-orange); }

/* Section Label */
.section-label {
    font-size: 14px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #9CA3AF;
    text-align: center;
    margin-bottom: 4px;
}

/* Progress Bar */
.progress-wrapper {
    max-width: 640px;
    margin: 0 auto 24px;
    padding: 0 20px;
}
.progress-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
}
.progress-meta .section-label { margin-bottom: 0; text-align: left; }
.progress-counter {
    font-size: 13px;
    color: #9CA3AF;
    font-weight: 500;
}
.progress-track {
    width: 100%;
    height: 8px;
    background: #2D2D44;
    border-radius: 4px;
    overflow: hidden;
}
.progress-fill {
    height: 100%;
    background: var(--eo-orange);
    border-radius: 4px;
    transition: width var(--eo-transition);
    width: 0%;
}

/* Screens */
.screen { display: none; }
.screen.active { display: block; }

/* Welcome Screen */
.welcome-screen {
    max-width: 520px;
    margin: 40px auto;
    padding: 40px;
    text-align: center;
    background: var(--eo-beige);
    border-radius: var(--eo-radius);
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
.welcome-screen h2 {
    font-size: 28px;
    font-weight: 800;
    color: var(--eo-dark);
    margin-bottom: 10px;
    line-height: 1.25;
}
.welcome-screen .subtitle {
    color: var(--eo-gray-text);
    margin-bottom: 32px;
    font-size: 15px;
    line-height: 1.6;
}
.welcome-screen .btn-primary { min-width: 240px; }

/* Question Card */
.question-card {
    background: var(--eo-beige);
    border-radius: var(--eo-radius);
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    padding: 32px;
    max-width: 640px;
    margin: 0 auto;
    position: relative;
}
.question-card.shake {
    animation: shake 0.4s ease;
}
@keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-6px); }
    80% { transform: translateX(6px); }
}

.question-text {
    font-size: 22px;
    font-weight: 700;
    color: var(--eo-orange);
    text-align: center;
    margin-bottom: 28px;
    line-height: 1.35;
}

/* Options */
.options-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
}
.option-card {
    border: 2px solid var(--eo-gray-border);
    border-radius: var(--eo-radius-sm);
    padding: 16px 20px;
    cursor: pointer;
    font-size: 15px;
    font-weight: 500;
    color: var(--eo-dark);
    transition: border-color var(--eo-transition), background var(--eo-transition), color var(--eo-transition);
    user-select: none;
    line-height: 1.4;
}
.option-card:hover {
    border-color: var(--eo-orange);
}
.option-card.selected {
    background: var(--eo-orange);
    border-color: var(--eo-orange);
    color: #FFFFFF;
}
.option-card.focused {
    outline: 2px solid var(--eo-orange);
    outline-offset: 2px;
}

/* Nav Buttons */
.nav-buttons {
    display: flex;
    justify-content: space-between;
    align-items: center;
    max-width: 640px;
    margin: 24px auto 0;
    padding: 0 20px;
    gap: 12px;
}
.btn {
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    padding: 12px 28px;
    border-radius: var(--eo-radius-sm);
    cursor: pointer;
    transition: all var(--eo-transition);
    border: none;
    outline: none;
}
.btn-prev {
    background: transparent;
    border: 2px solid #FFFFFF;
    color: #FFFFFF;
}
.btn-prev:hover { background: rgba(255,255,255,0.15); color: #FFFFFF; }
.btn-prev.hidden { visibility: hidden; pointer-events: none; }
.btn-next {
    background: var(--eo-orange);
    color: #FFFFFF;
}
.btn-next:hover { background: #d4441a; }
.btn-next:disabled {
    opacity: 0.4;
    cursor: not-allowed;
}
.btn-primary {
    background: var(--eo-orange);
    color: #FFFFFF;
    font-size: 16px;
    font-weight: 700;
    padding: 14px 32px;
    border: none;
    border-radius: var(--eo-radius-sm);
    cursor: pointer;
    font-family: inherit;
    transition: all var(--eo-transition);
}
.btn-primary:hover { background: #d4441a; }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

/* Results Screen */
.results-screen {
    max-width: 640px;
    margin: 40px auto;
    padding: 0 20px 60px;
}

/* Path Card (Primary + Secondary) */
.path-card {
    background: var(--eo-beige);
    border-radius: var(--eo-radius);
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    padding: 32px;
    margin-bottom: 24px;
}
.path-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    padding: 4px 14px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 16px;
}
.path-badge.primary {
    background: var(--eo-orange);
    color: #FFFFFF;
}
.path-badge.secondary {
    background: var(--eo-gray-border);
    color: var(--eo-gray-text);
}
.path-name {
    font-size: 24px;
    font-weight: 800;
    color: var(--eo-dark);
    margin-bottom: 6px;
}
.path-subtitle {
    font-size: 14px;
    color: var(--eo-gray-text);
    margin-bottom: 20px;
    line-height: 1.5;
}

/* Path Score Bar (results) */
.path-score-bar {
    margin-bottom: 20px;
}
.path-score-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
}
.path-score-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--eo-dark);
}
.path-score-value {
    font-size: 13px;
    font-weight: 600;
    color: var(--eo-gray-text);
}
.path-score-track {
    width: 100%;
    height: 12px;
    background: var(--eo-gray-border);
    border-radius: 6px;
    overflow: hidden;
}
.path-score-fill {
    height: 100%;
    border-radius: 6px;
    transition: width 0.6s ease;
}
.path-score-fill.orange { background: var(--eo-orange); }
.path-score-fill.gray { background: #9CA3AF; }

/* Path Description */
.path-description {
    font-size: 15px;
    line-height: 1.6;
    color: var(--eo-dark);
    margin-bottom: 20px;
}

/* Risk Box */
.risk-box {
    border-left: 4px solid #EF4444;
    background: #FEF2F2;
    border-radius: 0 var(--eo-radius-sm) var(--eo-radius-sm) 0;
    padding: 14px 18px;
    margin-bottom: 20px;
}
.risk-box-title {
    font-size: 13px;
    font-weight: 700;
    color: #EF4444;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
}
.risk-box-text {
    font-size: 14px;
    color: var(--eo-dark);
    line-height: 1.5;
}

/* Proof Points */
.proof-section-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--eo-dark);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 12px;
}
.proof-list {
    list-style: none;
    padding: 0;
}
.proof-list li {
    font-size: 14px;
    color: var(--eo-gray-text);
    padding: 8px 0 8px 20px;
    position: relative;
    line-height: 1.5;
    border-bottom: 1px solid var(--eo-gray-border);
}
.proof-list li:last-child { border-bottom: none; }
.proof-list li::before {
    content: '\2794';
    position: absolute;
    left: 0;
    color: var(--eo-orange);
}
.proof-name {
    font-weight: 600;
    color: var(--eo-dark);
}

/* Secondary Why This Could Work */
.secondary-why {
    font-size: 14px;
    line-height: 1.6;
    color: var(--eo-gray-text);
    font-style: italic;
}

/* All Paths Ranked */
.results-card {
    background: var(--eo-beige);
    border-radius: var(--eo-radius);
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    padding: 28px;
    margin-bottom: 24px;
}
.results-card h3 {
    font-size: 17px;
    font-weight: 700;
    color: var(--eo-dark);
    margin-bottom: 20px;
}
.section-bar-row {
    display: flex;
    align-items: center;
    margin-bottom: 14px;
    gap: 12px;
}
.section-bar-label {
    font-size: 13px;
    font-weight: 600;
    min-width: 130px;
    color: var(--eo-dark);
}
.section-bar-track {
    flex: 1;
    height: 12px;
    background: var(--eo-gray-border);
    border-radius: 6px;
    overflow: hidden;
    position: relative;
}
.section-bar-fill {
    height: 100%;
    border-radius: 6px;
    transition: width 0.6s ease;
}
.section-bar-score {
    font-size: 13px;
    font-weight: 600;
    min-width: 50px;
    text-align: right;
    color: var(--eo-gray-text);
}

/* CTA */
.results-cta {
    text-align: center;
    margin-top: 32px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    align-items: center;
}
.results-cta .btn-primary { min-width: 280px; }
.results-cta .btn-retake {
    background: transparent;
    border: 2px solid #FFFFFF;
    color: #FFFFFF;
    padding: 12px 28px;
    border-radius: var(--eo-radius-sm);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: all var(--eo-transition);
    min-width: 280px;
}
.results-cta .btn-retake:hover { background: rgba(255,255,255,0.15); color: #FFFFFF; }

/* Mobile */
@media (max-width: 680px) {
    .question-card { margin: 0 16px; padding: 24px 20px; }
    .nav-buttons { padding: 0 16px; }
    .question-text { font-size: 19px; }
    .progress-wrapper { padding: 0 16px; }
    .section-bar-label { min-width: 100px; font-size: 12px; }
}
@media (max-width: 400px) {
    .nav-buttons { flex-direction: column; }
    .btn-prev.hidden { display: none; }
    .option-card { padding: 14px 16px; font-size: 14px; }
    .question-text { font-size: 18px; }
}
</style>
</head>
<body>

<!-- Header -->
<div class="eo-header">
    <h1>Entrepreneurs <span>Oasis MENA</span></h1>
</div>

<!-- Screen 1: Welcome -->
<div class="screen active" id="screenWelcome">
    <div class="welcome-screen">
        <h2>Quick Strategy Selector</h2>
        <p class="subtitle">7 questions. 4 strategy paths. Find your highest-probability path in under 3 minutes.</p>
        <button class="btn-primary" id="btnStartAssessment">Start Assessment</button>
    </div>
</div>

<!-- Screen 2: Stepper Questions -->
<div class="screen" id="screenStepper">
    <div class="progress-wrapper">
        <div class="progress-meta">
            <div class="section-label" id="sectionLabel">STRATEGY DIMENSIONS</div>
            <div class="progress-counter" id="progressCounter">Question 1 of 7</div>
        </div>
        <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
        </div>
    </div>
    <div class="question-card" id="questionCard">
        <div class="question-text" id="questionText"></div>
        <div class="options-list" id="optionsList"></div>
    </div>
    <div class="nav-buttons">
        <button class="btn btn-prev hidden" id="btnPrev">Previous</button>
        <button class="btn btn-next" id="btnNext" disabled>Next</button>
    </div>
</div>

<!-- Screen 3: Results -->
<div class="screen" id="screenResults">
    <div class="results-screen" id="resultsContent"></div>
</div>

<script>
(function() {
    'use strict';

    /* =======================================
       PATHS CONFIG
       ======================================= */
    var PATHS = [
        { id: 'replicate', name: 'Replicate & Localize', max: 35 },
        { id: 'consulting', name: 'Consulting-First SaaS', max: 35 },
        { id: 'boring', name: 'Boring Micro-SaaS', max: 35 },
        { id: 'hammering', name: 'Hammering Deep', max: 35 }
    ];

    var PATH_DETAILS = {
        replicate: {
            subtitle: 'Language & geo arbitrage. Find what works globally, build the Arabic/MENA version.',
            full: 'You spotted a proven SaaS product that has no Arabic-native version. Your advantage is speed of localization and deep understanding of MENA market dynamics. The model is validated \u2014 you just need to execute the adaptation faster than the incumbent can localize.',
            risk: 'Incumbents may localize before you scale. Speed is your moat.',
            proofs: [
                { name: 'Teachizy', desc: 'Arabic LMS', metric: 'Growing MRR' },
                { name: 'SaaSFast', desc: 'MENA-native SaaS toolkit', metric: 'Active users' },
                { name: 'EO Platform', desc: 'AppSumo model for MENA', metric: 'In development' }
            ]
        },
        consulting: {
            subtitle: 'Start with services. Productize what repeats. SaaS emerges from your expertise.',
            full: 'You have deep domain expertise and existing client relationships. Instead of guessing what to build, you start with consulting \u2014 solving the problem manually. When you find the repeatable part, you productize it. This is the lowest-risk path because you generate revenue from day 1.',
            risk: 'Getting stuck in service mode and never shipping the product.',
            proofs: [
                { name: 'Entrepreneurs Oasis MENA', desc: 'Avaya/Cisco consulting to signal engine', metric: '$3,500/mo engine' },
                { name: 'SparkLine', desc: 'Service-to-product in content marketing', metric: 'Profitable SaaS' },
                { name: 'CXMfast AI', desc: 'Contact center consulting to AI-native platform', metric: 'Enterprise clients' }
            ]
        },
        boring: {
            subtitle: 'One unsexy problem. $20-200/month. Patient compounding through volume.',
            full: 'You don\u2019t need to build the next big thing. Find one painful, unsexy problem that people will pay $20-200/month to solve. Stack revenue through volume and patience. This path works best when you\u2019re comfortable with niche markets and have the discipline to resist feature creep.',
            risk: 'Market may be too small if not properly scoped.',
            proofs: [
                { name: 'Curator.io', desc: 'Social media aggregation tool', metric: '$50K+ MRR' },
                { name: 'Frill.co', desc: 'Feature request tracking', metric: 'Steady growth' },
                { name: 'Mike Hill Portfolio', desc: 'Multiple boring tools stacked', metric: '$200K MRR' }
            ]
        },
        hammering: {
            subtitle: 'One feature. One persona. Relentless depth. Undisputed best at one thing.',
            full: 'You resist the temptation to add features. You pick one persona with one burning problem and you become the undisputed best solution. This path requires obsessive focus and the courage to say no to adjacent opportunities. When it works, it creates a defensible moat through depth, not breadth.',
            risk: 'Market may not be deep enough for one-feature dominance.',
            proofs: [
                { name: 'Tibo', desc: 'LinkedIn posting tool', metric: '~$700K MRR' },
                { name: 'Revit.ai', desc: 'Deep focus one vertical', metric: '$400K MRR' },
                { name: 'ShipFast by Marc Lou', desc: 'Ship Next.js SaaS fast', metric: '$250K+ MRR' }
            ]
        }
    };

    /* =======================================
       QUESTIONS DATA
       ======================================= */
    var QUESTIONS = [
        {
            id: 'q1',
            text: 'How deep is your domain expertise in your target market?',
            options: [
                { label: 'I have 5+ years in this exact industry', scores: [2, 5, 3, 4] },
                { label: 'I have adjacent experience', scores: [4, 3, 3, 3] },
                { label: 'I\u2019ve done research but no direct experience', scores: [3, 1, 4, 2] },
                { label: 'Starting fresh \u2014 this is a new market for me', scores: [5, 1, 3, 2] }
            ]
        },
        {
            id: 'q2',
            text: 'How much runway can you commit to building this?',
            options: [
                { label: 'I can self-fund 6-12 months of development', scores: [4, 2, 3, 5] },
                { label: 'I have 3-6 months of savings to commit', scores: [3, 3, 4, 3] },
                { label: 'I need revenue within 30-60 days', scores: [2, 5, 2, 1] },
                { label: 'I have a job \u2014 this is a side project', scores: [3, 2, 5, 4] }
            ]
        },
        {
            id: 'q3',
            text: 'How do you handle uncertainty in business?',
            options: [
                { label: 'I\u2019ll ship fast and iterate \u2014 speed over perfection', scores: [4, 2, 3, 5] },
                { label: 'I prefer validating before building', scores: [3, 4, 4, 2] },
                { label: 'I follow proven models and adapt them', scores: [5, 3, 3, 1] },
                { label: 'I invest deeply in one bet and go all-in', scores: [2, 4, 2, 5] }
            ]
        },
        {
            id: 'q4',
            text: 'How well do you understand MENA buyer behavior?',
            options: [
                { label: 'I\u2019ve sold B2B in MENA for years', scores: [3, 5, 3, 4] },
                { label: 'I live in MENA but haven\u2019t sold B2B here', scores: [4, 3, 4, 3] },
                { label: 'I\u2019m targeting MENA from outside the region', scores: [5, 2, 3, 2] },
                { label: 'I\u2019m focused on global markets, MENA is secondary', scores: [3, 2, 4, 4] }
            ]
        },
        {
            id: 'q5',
            text: 'What does the competition look like in your space?',
            options: [
                { label: 'Global players exist but no Arabic/MENA version', scores: [5, 1, 2, 2] },
                { label: 'Competitors exist but they\u2019re mediocre', scores: [2, 3, 4, 5] },
                { label: 'It\u2019s a crowded space \u2014 many solutions available', scores: [1, 2, 3, 5] },
                { label: 'Almost no competition \u2014 new category', scores: [3, 4, 4, 3] }
            ]
        },
        {
            id: 'q6',
            text: 'How do you prefer to build products?',
            options: [
                { label: 'I build with AI tools (Claude, bolt.new, Cursor)', scores: [4, 2, 4, 5] },
                { label: 'I hire developers or use agencies', scores: [5, 3, 3, 3] },
                { label: 'I start with manual processes, then automate', scores: [2, 5, 3, 2] },
                { label: 'I use no-code / low-code platforms', scores: [4, 3, 5, 2] }
            ]
        },
        {
            id: 'q7',
            text: 'What\u2019s your 12-month revenue target?',
            options: [
                { label: '$1K - $5K MRR', scores: [3, 3, 5, 2] },
                { label: '$5K - $20K MRR', scores: [4, 3, 4, 4] },
                { label: '$20K - $50K MRR', scores: [4, 4, 3, 4] },
                { label: '$50K+ MRR', scores: [3, 3, 2, 5] }
            ]
        }
    ];

    /* =======================================
       STATE
       ======================================= */
    var STORAGE_KEY = 'eo_strategy-selector-lite_answers';
    var answers = {};
    var currentIndex = 0;
    var autoAdvanceTimer = null;
    var focusedOptionIndex = -1;

    /* =======================================
       DOM REFS
       ======================================= */
    var $sectionLabel, $progressCounter, $progressFill, $questionText;
    var $optionsList, $questionCard, $btnPrev, $btnNext;
    var $btnStart, $resultsContent;

    /* =======================================
       INIT
       ======================================= */
    function init() {
        $sectionLabel = document.getElementById('sectionLabel');
        $progressCounter = document.getElementById('progressCounter');
        $progressFill = document.getElementById('progressFill');
        $questionText = document.getElementById('questionText');
        $optionsList = document.getElementById('optionsList');
        $questionCard = document.getElementById('questionCard');
        $btnPrev = document.getElementById('btnPrev');
        $btnNext = document.getElementById('btnNext');
        $btnStart = document.getElementById('btnStartAssessment');
        $resultsContent = document.getElementById('resultsContent');

        loadAnswers();
        bindEvents();
    }

    function loadAnswers() {
        try {
            var saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                answers = JSON.parse(saved);
            }
        } catch (e) {
            answers = {};
        }
    }

    function saveAnswers() {
        try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(answers));
        } catch (e) { /* silent */ }
    }

    function findFirstUnanswered() {
        for (var i = 0; i < QUESTIONS.length; i++) {
            if (!(QUESTIONS[i].id in answers)) return i;
        }
        return QUESTIONS.length - 1;
    }

    /* =======================================
       EVENT BINDING
       ======================================= */
    function bindEvents() {
        $btnStart.addEventListener('click', startAssessment);
        $btnPrev.addEventListener('click', prevQuestion);
        $btnNext.addEventListener('click', nextQuestion);

        document.addEventListener('keydown', handleKeyboard);
    }

    /* =======================================
       SCREEN NAVIGATION
       ======================================= */
    function showScreen(id) {
        var screens = document.querySelectorAll('.screen');
        for (var i = 0; i < screens.length; i++) {
            screens[i].classList.remove('active');
        }
        document.getElementById(id).classList.add('active');
    }

    /* =======================================
       START ASSESSMENT
       ======================================= */
    function startAssessment() {
        if (Object.keys(answers).length > 0) {
            currentIndex = findFirstUnanswered();
        } else {
            currentIndex = 0;
        }

        showScreen('screenStepper');
        renderQuestion();
    }

    /* =======================================
       RENDER QUESTION
       ======================================= */
    function renderQuestion() {
        var q = QUESTIONS[currentIndex];
        focusedOptionIndex = -1;

        $sectionLabel.textContent = 'STRATEGY DIMENSIONS';
        $progressCounter.textContent = 'Question ' + (currentIndex + 1) + ' of ' + QUESTIONS.length;
        $progressFill.style.width = ((currentIndex + 1) / QUESTIONS.length * 100) + '%';
        $questionText.textContent = q.text;

        $optionsList.innerHTML = '';
        q.options.forEach(function(opt, idx) {
            var div = document.createElement('div');
            div.className = 'option-card';
            div.textContent = opt.label;
            div.setAttribute('data-index', idx);
            if (answers[q.id] === idx) {
                div.classList.add('selected');
            }
            div.addEventListener('click', function() { selectOption(idx); });
            $optionsList.appendChild(div);
        });

        if (currentIndex === 0) {
            $btnPrev.classList.add('hidden');
        } else {
            $btnPrev.classList.remove('hidden');
        }

        var isLast = currentIndex === QUESTIONS.length - 1;
        $btnNext.textContent = isLast ? 'See My Results' : 'Next';
        $btnNext.disabled = !(q.id in answers);
    }

    /* =======================================
       SELECT OPTION
       ======================================= */
    function selectOption(idx) {
        var q = QUESTIONS[currentIndex];
        answers[q.id] = idx;
        saveAnswers();

        var cards = $optionsList.querySelectorAll('.option-card');
        for (var i = 0; i < cards.length; i++) {
            cards[i].classList.remove('selected');
        }
        cards[idx].classList.add('selected');
        focusedOptionIndex = idx;

        $btnNext.disabled = false;

        var isLast = currentIndex === QUESTIONS.length - 1;
        if (!isLast) {
            clearAutoAdvance();
            autoAdvanceTimer = setTimeout(function() { nextQuestion(); }, 300);
        }
    }

    function clearAutoAdvance() {
        if (autoAdvanceTimer) {
            clearTimeout(autoAdvanceTimer);
            autoAdvanceTimer = null;
        }
    }

    /* =======================================
       NAVIGATION
       ======================================= */
    function nextQuestion() {
        var q = QUESTIONS[currentIndex];
        if (!(q.id in answers)) {
            $questionCard.classList.add('shake');
            setTimeout(function() { $questionCard.classList.remove('shake'); }, 400);
            return;
        }

        if (currentIndex === QUESTIONS.length - 1) {
            showResults();
            return;
        }

        currentIndex++;
        renderQuestion();
    }

    function prevQuestion() {
        clearAutoAdvance();
        if (currentIndex > 0) {
            currentIndex--;
            renderQuestion();
        }
    }

    /* =======================================
       KEYBOARD
       ======================================= */
    function handleKeyboard(e) {
        if (!document.getElementById('screenStepper').classList.contains('active')) return;

        var cards = $optionsList.querySelectorAll('.option-card');
        var numOpts = cards.length;
        if (numOpts === 0) return;

        switch (e.key) {
            case 'ArrowDown':
                e.preventDefault();
                focusedOptionIndex = (focusedOptionIndex + 1) % numOpts;
                updateFocus(cards);
                break;
            case 'ArrowUp':
                e.preventDefault();
                focusedOptionIndex = focusedOptionIndex <= 0 ? numOpts - 1 : focusedOptionIndex - 1;
                updateFocus(cards);
                break;
            case 'Enter':
                e.preventDefault();
                if (focusedOptionIndex >= 0 && focusedOptionIndex < numOpts) {
                    selectOption(focusedOptionIndex);
                }
                break;
            case 'ArrowRight':
                e.preventDefault();
                nextQuestion();
                break;
            case 'ArrowLeft':
                e.preventDefault();
                prevQuestion();
                break;
        }
    }

    function updateFocus(cards) {
        for (var i = 0; i < cards.length; i++) {
            cards[i].classList.remove('focused');
        }
        if (focusedOptionIndex >= 0 && focusedOptionIndex < cards.length) {
            cards[focusedOptionIndex].classList.add('focused');
            cards[focusedOptionIndex].scrollIntoView({ block: 'nearest' });
        }
    }

    /* =======================================
       SCORING
       ======================================= */
    function calculatePathScores() {
        var scores = [0, 0, 0, 0]; // [replicate, consulting, boring, hammering]
        QUESTIONS.forEach(function(q) {
            if (q.id in answers) {
                var optScores = q.options[answers[q.id]].scores;
                for (var i = 0; i < 4; i++) {
                    scores[i] += optScores[i];
                }
            }
        });
        return scores;
    }

    function getRankedPaths() {
        var scores = calculatePathScores();
        var ranked = PATHS.map(function(path, idx) {
            return {
                id: path.id,
                name: path.name,
                max: path.max,
                score: scores[idx],
                pct: Math.round((scores[idx] / path.max) * 100)
            };
        });
        ranked.sort(function(a, b) { return b.score - a.score; });
        return ranked;
    }

    /* =======================================
       RESULTS DISPLAY
       ======================================= */
    function showResults() {
        var ranked = getRankedPaths();
        var primary = ranked[0];
        var secondary = ranked[1];
        var html = '';

        /* ---- Primary Path Card ---- */
        var pd = PATH_DETAILS[primary.id];
        html += '<div class="path-card">';
        html += '<span class="path-badge primary">YOUR PRIMARY PATH</span>';
        html += '<div class="path-name">' + escapeHtml(primary.name) + '</div>';
        html += '<div class="path-subtitle">' + escapeHtml(pd.subtitle) + '</div>';

        /* Score bar */
        html += '<div class="path-score-bar">';
        html += '<div class="path-score-meta">';
        html += '<span class="path-score-label">Path Score</span>';
        html += '<span class="path-score-value">' + primary.score + ' / ' + primary.max + ' (' + primary.pct + '%)</span>';
        html += '</div>';
        html += '<div class="path-score-track">';
        html += '<div class="path-score-fill orange" style="width:' + primary.pct + '%"></div>';
        html += '</div></div>';

        /* Full description */
        html += '<div class="path-description">' + escapeHtml(pd.full) + '</div>';

        /* Risk box */
        html += '<div class="risk-box">';
        html += '<div class="risk-box-title">Key Risk</div>';
        html += '<div class="risk-box-text">' + escapeHtml(pd.risk) + '</div>';
        html += '</div>';

        /* Proof points */
        html += '<div class="proof-section-title">MENA Proof Points</div>';
        html += '<ul class="proof-list">';
        pd.proofs.forEach(function(p) {
            html += '<li><span class="proof-name">' + escapeHtml(p.name) + '</span> \u2014 ' + escapeHtml(p.desc) + ' (' + escapeHtml(p.metric) + ')</li>';
        });
        html += '</ul>';
        html += '</div>';

        /* ---- Secondary Path Card ---- */
        var sd = PATH_DETAILS[secondary.id];
        html += '<div class="path-card">';
        html += '<span class="path-badge secondary">SECONDARY PATH</span>';
        html += '<div class="path-name">' + escapeHtml(secondary.name) + '</div>';
        html += '<div class="path-subtitle">' + escapeHtml(sd.subtitle) + '</div>';

        /* Score bar */
        html += '<div class="path-score-bar">';
        html += '<div class="path-score-meta">';
        html += '<span class="path-score-label">Path Score</span>';
        html += '<span class="path-score-value">' + secondary.score + ' / ' + secondary.max + ' (' + secondary.pct + '%)</span>';
        html += '</div>';
        html += '<div class="path-score-track">';
        html += '<div class="path-score-fill gray" style="width:' + secondary.pct + '%"></div>';
        html += '</div></div>';

        /* Why this could work too */
        html += '<div class="secondary-why">"Why This Could Work Too" \u2014 ' + escapeHtml(sd.full) + '</div>';
        html += '</div>';

        /* ---- All Paths Ranked ---- */
        html += '<div class="results-card">';
        html += '<h3>All Paths Ranked</h3>';
        ranked.forEach(function(r) {
            var isWinner = r.id === primary.id;
            var barColor = isWinner ? 'var(--eo-orange)' : '#9CA3AF';
            var labelColor = isWinner ? 'color:var(--eo-orange);' : '';
            html += '<div class="section-bar-row">';
            html += '<div class="section-bar-label" style="' + labelColor + '">' + escapeHtml(r.name) + '</div>';
            html += '<div class="section-bar-track">';
            html += '<div class="section-bar-fill" style="width:' + r.pct + '%;background:' + barColor + '"></div>';
            html += '</div>';
            html += '<div class="section-bar-score">' + r.score + ' / ' + r.max + '</div>';
            html += '</div>';
        });
        html += '</div>';

        /* ---- CTA ---- */
        html += '<div class="results-cta">';
        html += '<a href="https://www.linkedin.com/groups/13121095/" target="_blank" class="btn-primary" style="display:inline-block;text-decoration:none;text-align:center;">Join MENA MicroSaaS Movement</a>';
        html += '<button class="btn-retake" id="btnRetake">Retake Assessment</button>';
        html += '</div>';

        $resultsContent.innerHTML = html;
        showScreen('screenResults');
        window.scrollTo({ top: 0, behavior: 'smooth' });

        /* Bind retake */
        document.getElementById('btnRetake').addEventListener('click', retakeAssessment);
    }

    function escapeHtml(text) {
        var div = document.createElement('div');
        div.appendChild(document.createTextNode(text));
        return div.innerHTML;
    }

    function retakeAssessment() {
        answers = {};
        currentIndex = 0;
        try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
        showScreen('screenWelcome');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    /* =======================================
       BOOT
       ======================================= */
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }

})();
</script>
</body>
</html>
